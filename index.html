// ── GOALS TAB ──
function renderGoals(){
  const now=new Date();
  const sections=[
    {type:'weekly',label:'Weekly Goals',emoji:'📅',color:'blue',note:`Resets each Monday — week of ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`},
    {type:'monthly',label:'Monthly Goals',emoji:'📆',color:'amber',note:MONTHS[now.getMonth()]+' '+now.getFullYear()},
    {type:'yearly',label:'Yearly Goals',emoji:'🎯',color:'green',note:now.getFullYear()+' goals'},
  ];

  // Overall stats
  const allGoals=[...(goals.weekly||[]),...(goals.monthly||[]),...(goals.yearly||[])];
  const totalG=allGoals.length,doneG=allGoals.filter(g=>g.done).length;
  const highP=allGoals.filter(g=>g.priority==='high'&&!g.done).length;
  let h=`<div class="goals-stats">
    <div class="goals-stat"><div class="goals-stat-val" style="color:var(--blue)">${totalG}</div><div class="goals-stat-lbl">Total goals</div></div>
    <div class="goals-stat"><div class="goals-stat-val" style="color:var(--green)">${doneG}</div><div class="goals-stat-lbl">Completed</div></div>
    <div class="goals-stat"><div class="goals-stat-val" style="color:${highP?'var(--red)':'var(--text3)'}">${highP||'—'}</div><div class="goals-stat-lbl">High priority</div></div>
    <div class="goals-stat"><div class="goals-stat-val" style="color:var(--orange)">${totalG?Math.round(doneG/totalG*100)+'%':'—'}</div><div class="goals-stat-lbl">Completion</div></div>
  </div>`;

  sections.forEach(({type,label,emoji,color,note})=>{
    const list=goals[type]||[];
    const done=list.filter(g=>g.done).length;
    const pct=list.length?done/list.length:0;
    // Sort: undone first (high priority first), then done
    const sorted=[...list].sort((a,b)=>{
      if(a.done!==b.done)return a.done?1:-1;
      const po={high:0,normal:1,low:2};
      return(po[a.priority]||1)-(po[b.priority]||1);
    });

    h+=`<div class="goals-section">
      <div class="goals-header">
        <div class="goals-title">${emoji} ${label} <span class="goals-badge goals-badge-${color}">${done}/${list.length}</span></div>
        <button class="add-goal-btn" onclick="startAddGoal('${type}')">+ Add</button>
      </div>
      ${list.length>0?`<div class="goals-progress"><div class="goals-progress-fill ${color}" style="width:${Math.round(pct*100)}%"></div></div>`:''}
      ${sorted.map(g=>{
        const pri=g.priority||'normal';
        const priLabel=pri==='high'?'High':pri==='low'?'Low':'';
        const priClass=`goal-priority-${pri}`;
        const dateStr=g.created?new Date(g.created+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
        return`<div class="goal-item${g.done?' done':''} priority-${pri}" onclick="toggleGoal('${type}',${g.id})">
          <div class="goal-cb${g.done?' checked':''}">${g.done?'<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
          <div class="goal-content">
            <div class="goal-text${g.done?' done':''}">${g.text}</div>
            <div class="goal-meta">
              ${dateStr?`<span class="goal-date">${dateStr}</span>`:''}
              ${priLabel?`<span class="goal-priority-tag ${priClass}" onclick="event.stopPropagation();cycleGoalPriority('${type}',${g.id})">${priLabel}</span>`:''}
              ${g.notes?`<span class="goal-date" style="color:var(--blue)">has note</span>`:''}
            </div>
            ${g.notes?`<div class="goal-note">${esc(g.notes)}</div>`:''}
          </div>
          <div class="goal-actions">
            <button class="goal-act-btn" onclick="event.stopPropagation();openGoalNote('${type}',${g.id})" title="Add note">edit</button>
            <button class="goal-act-btn del" onclick="event.stopPropagation();deleteGoal('${type}',${g.id})" title="Delete">×</button>
          </div>
        </div>`;
      }).join('')}
      ${list.length===0?`<div class="goals-empty"><div class="goals-empty-icon">${emoji}</div><div class="goals-empty-text">No ${type} goals yet. Set one to get started.</div></div>`:''}
      ${addingGoal===type?`<div class="goal-add-row"><input class="goal-inp" id="goal-inp-${type}" placeholder="What do you want to achieve?" onkeydown="if(event.key==='Enter')addGoal('${type}')"><button class="goal-save-btn" onclick="addGoal('${type}')">Add</button></div>`:''}
      <div class="goals-reset-note">${note}</div>
    </div>`;
  });
  return h;
}

// ── WEEK / MONTH ──
function getWeekDates(offset){const now=new Date(),day=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-day+1+(offset*7));return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}

function renderWeek(){
  const dates=getWeekDates(weekOffset),tk=todayKey();
  const label=`${dates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${dates[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
  const hasData=dates.some(d=>allHistory[dateKey(d)]);
  const streak=calcStreak();
  const activeDays=dates.filter(d=>{const r=allHistory[dateKey(d)];return r&&!r.restDay;});
  const won=dates.filter(d=>{const r=allHistory[dateKey(d)];if(!r)return false;return r.pct>=(r.restDay?restSettings.win/100:WIN);}).length;
  const avg=activeDays.length?activeDays.reduce((s,d)=>s+(allHistory[dateKey(d)]?.pct||0),0)/activeDays.length:0;
  let h=`<div class="history-nav"><button class="nav-btn" onclick="shiftWeek(-1)">←</button><span class="nav-title">${label}</span><button class="nav-btn" onclick="shiftWeek(1)">→</button></div>`;
  if(!hasData)return h+`<div class="no-data"><p>No data for this week yet.</p><button class="btn-ghost" onclick="setTab('today')">Go to Today</button></div>`;
  h+=`<div class="summary-row"><div class="summary-card"><div class="summary-val">${won}/7</div><div class="summary-lbl">Days won</div></div><div class="summary-card"><div class="summary-val">${activeDays.length?Math.round(avg*100)+'%':'—'}</div><div class="summary-lbl">Avg (${activeDays.length} active)</div></div><div class="summary-card"><div class="summary-val">${streak} 🔥</div><div class="summary-lbl">Streak</div></div></div><div class="day-grid">`;
  dates.forEach(d=>{const key=dateKey(d),rec=allHistory[key],isToday=key===tk,isFuture=d>new Date()&&!isToday;const pct=rec?rec.pct:null,rest=rec&&rec.restDay;const col=pct!==null?statusColor(pct,rest):'var(--border)';h+=`<div class="day-cell${isToday?' today':''}${isFuture?' future':''}" ${!isToday&&!isFuture?`onclick="openEditDay('`+key+`')" style="cursor:pointer"`:''}><div class="day-label">${DAYS[d.getDay()]}</div><div class="day-pct" style="color:${pct!==null?col:'var(--text3)'}">${rest?'R':pct!==null?Math.round(pct*100)+'%':'—'}</div><div class="day-dot" style="background:${col}"></div>${rec&&rec.reflection?`<div style="font-size:9px;color:var(--text3);margin-top:2px">note</div>`:''}</div>`;});
  h+=`</div><div style="margin-bottom:1.25rem">`;
  dates.map(d=>({d,rec:allHistory[dateKey(d)]})).filter(e=>e.rec).forEach(({d,rec})=>{const pct=rec.pct||0,col=statusColor(pct,rec.restDay);h+=`<div class="week-row"><span style="font-size:13px;color:var(--text2)">${d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}${rec.restDay?' <span style="font-size:10px;color:var(--blue)">R</span>':''}</span><div class="week-bar-track"><div class="week-bar-fill" style="width:${Math.round(pct*100)}%;background:${col}"></div></div><span style="font-size:13px;font-weight:500;color:${col};text-align:right">${Math.round(pct*100)}%</span></div>`;});
  h+=`</div><div style="border-top:.5px solid var(--border);padding-top:1.25rem"><div class="reflect-label" style="margin-bottom:1rem">Reflections this week</div>${reflectionCards(dates.map(d=>({d,rec:allHistory[dateKey(d)]})))}</div>`;
  // Weekly Report
  h+=generateWeeklyReport(dates,won,avg,activeDays,streak);
  return h;
}

function getMonthDates(offset){const now=new Date(),y=now.getFullYear(),m=now.getMonth()+offset;const first=new Date(y,m,1),last=new Date(y,m+1,0);return{first,last,year:first.getFullYear(),month:first.getMonth()};}
function getStreakRanges(){const ranges=[];let start=null;const sorted=Object.keys(allHistory).sort();sorted.forEach((key,i)=>{const rec=allHistory[key],w=rec&&rec.restDay?restSettings.win/100:WIN,counts=rec&&rec.pct>=w;if(counts&&!start)start=key;else if(!counts&&start){ranges.push({start,end:sorted[i-1]});start=null;}});if(start)ranges.push({start,end:sorted[sorted.length-1]});return ranges;}

function renderMonth(){
  const{first,last,year,month}=getMonthDates(monthOffset);
  const tk=todayKey(),daysInMonth=last.getDate(),startDay=first.getDay();
  const daysData=Array.from({length:daysInMonth},(_,i)=>{const d=new Date(year,month,i+1);return{day:i+1,key:dateKey(d),rec:allHistory[dateKey(d)],d};});
  const hasData=daysData.some(({rec})=>rec);
  const streak=calcStreak();const activeDays=daysData.filter(({rec})=>rec&&!rec.restDay);
  const won=daysData.filter(({rec})=>{if(!rec)return false;return rec.pct>=(rec.restDay?restSettings.win/100:WIN);}).length;
  const avg=activeDays.length?activeDays.reduce((s,{rec})=>s+(rec?.pct||0),0)/activeDays.length:0;
  const streakRanges=getStreakRanges();const isInStreak=key=>streakRanges.some(r=>key>=r.start&&key<=r.end);
  let h=`<div class="history-nav"><button class="nav-btn" onclick="shiftMonth(-1)">←</button><span class="nav-title">${MONTHS[month]} ${year}</span><button class="nav-btn" onclick="shiftMonth(1)">→</button></div>`;
  if(!hasData)return h+`<div class="no-data"><p>No data for ${MONTHS[month]} yet.</p><button class="btn-ghost" onclick="setTab('today')">Go to Today</button></div>`;
  h+=`<div class="summary-row"><div class="summary-card"><div class="summary-val">${won}</div><div class="summary-lbl">Days won</div></div><div class="summary-card"><div class="summary-val">${activeDays.length?Math.round(avg*100)+'%':'—'}</div><div class="summary-lbl">Avg (${activeDays.length} active)</div></div><div class="summary-card"><div class="summary-val">${streak} 🔥</div><div class="summary-lbl">Streak</div></div></div><div class="month-grid">`;
  DAYS.forEach(d=>{h+=`<div class="month-hdr">${d[0]}</div>`;});
  for(let i=0;i<startDay;i++)h+=`<div class="month-cell empty"></div>`;
  daysData.forEach(({day,key,rec,d})=>{const isToday=key===tk,isFuture=d>new Date()&&!isToday;const pct=rec?rec.pct:null,rest=rec&&rec.restDay,inStreak=isInStreak(key);let bg='var(--bg2)',color='var(--text3)';if(pct!==null&&!isFuture){const sc=statusColor(pct,rest);bg=sc+'22';color=sc;}h+=`<div class="month-cell${rec?' has-data':''}${isToday?' today-cell':''}" style="background:${bg};opacity:${isFuture?0.3:1}"><span style="color:${color}">${rest?'R':day}</span>${inStreak&&!isFuture?`<div class="streak-dot"></div>`:''}</div>`;});
  h+=`</div><div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem;row-gap:5px"><div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#2E9E5B22;border:.5px solid #2E9E5B"></div><span style="font-size:11px;color:var(--text3)">Crushing it</span></div><div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#3A7EC422;border:.5px solid #3A7EC4"></div><span style="font-size:11px;color:var(--text3)">Day won</span></div><div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#C8891A22;border:.5px solid #C8891A"></div><span style="font-size:11px;color:var(--text3)">Building</span></div><div style="display:flex;align-items:center;gap:5px"><div style="width:4px;height:4px;border-radius:50%;background:#E8A020"></div><span style="font-size:11px;color:var(--text3)">Streak</span></div></div><div style="border-top:.5px solid var(--border);padding-top:1.25rem"><div class="reflect-label" style="margin-bottom:1rem">Reflections this month</div>${reflectionCards(daysData.map(({d,rec})=>({d,rec})))}</div>`;
  // Monthly Report
  h+=generateMonthlyReport(daysData,won,avg,activeDays,streak);
  return h;
}

// ── REPORT GENERATION ──

function getTaskMissStats(datesList){
  // datesList: array of {key, rec} or Date objects
  const allT=allTasks();
  const stats={};
  allT.forEach(t=>{stats[t.id]={name:t.name,tier:t.tier,done:0,missed:0,total:0};});
  datesList.forEach(item=>{
    const key=item.key||dateKey(item);
    const rec=item.rec||allHistory[key];
    if(!rec)return;
    allT.forEach(t=>{
      stats[t.id].total++;
      if(rec.checked&&rec.checked[t.id])stats[t.id].done++;
      else stats[t.id].missed++;
    });
  });
  return stats;
}

function generateWeeklyReport(dates,won,avg,activeDays,streak){
  const daysWithData=dates.filter(d=>allHistory[dateKey(d)]);
  if(daysWithData.length<2)return''; // Not enough data for a report

  // Best and worst day
  let bestDay=null,worstDay=null,bestPct=-1,worstPct=2;
  daysWithData.forEach(d=>{
    const rec=allHistory[dateKey(d)];
    if(!rec)return;
    const pct=rec.pct||0;
    if(pct>bestPct){bestPct=pct;bestDay=d;}
    if(pct<worstPct){worstPct=pct;worstDay=d;}
  });

  // Most skipped tasks (top 3)
  const taskStats=getTaskMissStats(dates.map(d=>({key:dateKey(d),rec:allHistory[dateKey(d)]})));
  const skipped=Object.values(taskStats).filter(s=>s.total>0&&s.missed>0).sort((a,b)=>b.missed-a.missed).slice(0,3);

  // Tasks completed vs missed
  let totalDone=0,totalMissed=0;
  Object.values(taskStats).forEach(s=>{totalDone+=s.done;totalMissed+=s.missed;});

  // Previous week comparison
  const prevDates=getWeekDates(weekOffset-1);
  const prevActiveDays=prevDates.filter(d=>{const r=allHistory[dateKey(d)];return r&&!r.restDay;});
  const prevWon=prevDates.filter(d=>{const r=allHistory[dateKey(d)];if(!r)return false;return r.pct>=(r.restDay?restSettings.win/100:WIN);}).length;
  const prevAvg=prevActiveDays.length?prevActiveDays.reduce((s,d)=>s+(allHistory[dateKey(d)]?.pct||0),0)/prevActiveDays.length:0;

  const avgDiff=avg-prevAvg;
  const wonDiff=won-prevWon;
  const compareArrow=(diff,suffix='')=>{
    if(diff>0)return`<div class="report-compare up">+${typeof diff==='number'&&suffix==='%'?Math.round(diff*100):diff}${suffix}</div>`;
    if(diff<0)return`<div class="report-compare down">${typeof diff==='number'&&suffix==='%'?Math.round(diff*100):diff}${suffix}</div>`;
    return`<div class="report-compare flat">no change</div>`;
  };

  // Reflections count
  const reflections=daysWithData.filter(d=>{const r=allHistory[dateKey(d)];return r&&(r.reflection||r.winOfDay);}).length;

  let h=`<div class="report-section">
    <div class="report-title">Weekly Report</div>
    <div class="report-grid">
      <div class="report-card success">
        <div class="report-card-val">${won}/7</div>
        <div class="report-card-lbl">Win rate</div>
        ${compareArrow(wonDiff,' days')}
      </div>
      <div class="report-card highlight">
        <div class="report-card-val">${activeDays.length?Math.round(avg*100)+'%':'--'}</div>
        <div class="report-card-lbl">Avg score</div>
        ${compareArrow(avgDiff,'%')}
      </div>
      <div class="report-card">
        <div class="report-card-val">${bestDay?bestDay.toLocaleDateString('en-US',{weekday:'short'}):'--'}</div>
        <div class="report-card-lbl">Best day</div>
        <div class="report-card-sub">${bestPct>=0?Math.round(bestPct*100)+'%':''}</div>
      </div>
      <div class="report-card">
        <div class="report-card-val">${worstDay?worstDay.toLocaleDateString('en-US',{weekday:'short'}):'--'}</div>
        <div class="report-card-lbl">Worst day</div>
        <div class="report-card-sub">${worstPct<=1?Math.round(worstPct*100)+'%':''}</div>
      </div>
      <div class="report-card">
        <div class="report-card-val">${streak}</div>
        <div class="report-card-lbl">Current streak</div>
      </div>
      <div class="report-card">
        <div class="report-card-val">${totalDone}/${totalDone+totalMissed}</div>
        <div class="report-card-lbl">Tasks completed</div>
      </div>
    </div>`;

  if(skipped.length){
    h+=`<div class="report-list"><div class="report-list-title">Most skipped tasks</div>`;
    skipped.forEach(s=>{
      const rate=s.total>0?Math.round(s.missed/s.total*100):0;
      h+=`<div class="report-list-item"><span>${s.name} <span style="font-size:10px;color:${s.tier==='S'?'var(--orange)':s.tier==='A'?'var(--blue)':'var(--text3)'}">${s.tier}</span></span><span class="report-pct" style="color:var(--red)">${rate}% missed</span></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="report-card full" style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:12px;color:var(--text2)">${reflections} reflection${reflections!==1?'s':''} written</span>
  </div>`;

  h+=`<button class="report-email-btn" onclick="emailReport('weekly')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
    Email this report
  </button>`;

  h+=`</div>`;
  return h;
}

function generateMonthlyReport(daysData,won,avg,activeDays,streak){
  const daysWithData=daysData.filter(({rec})=>rec);
  if(daysWithData.length<3)return''; // Not enough data

  const daysTracked=daysWithData.length;
  const totalDaysInMonth=daysData.length;
  const consistencyPct=Math.round(daysTracked/totalDaysInMonth*100);

  // Best and worst week (sliding 7-day windows within the month)
  let bestWeekAvg=-1,worstWeekAvg=2,bestWeekLabel='',worstWeekLabel='';
  for(let i=0;i<=daysData.length-7;i++){
    const wk=daysData.slice(i,i+7);
    const wkActive=wk.filter(({rec})=>rec&&!rec.restDay);
    if(wkActive.length<2)continue;
    const wkAvg=wkActive.reduce((s,{rec})=>s+(rec?.pct||0),0)/wkActive.length;
    const label=`${wk[0].d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
    if(wkAvg>bestWeekAvg){bestWeekAvg=wkAvg;bestWeekLabel=label;}
    if(wkAvg<worstWeekAvg){worstWeekAvg=wkAvg;worstWeekLabel=label;}
  }

  // Most skipped and most improved tasks
  const taskStats=getTaskMissStats(daysData);
  const sortedByMiss=Object.values(taskStats).filter(s=>s.total>0).sort((a,b)=>(b.missed/b.total)-(a.missed/a.total));
  const mostSkipped=sortedByMiss[0];

  // Most improved: compare first half vs second half of month
  const half=Math.floor(daysData.length/2);
  const firstHalf=daysData.slice(0,half);
  const secondHalf=daysData.slice(half);
  const statsFirst=getTaskMissStats(firstHalf);
  const statsSecond=getTaskMissStats(secondHalf);
  let mostImproved=null,bestImprovement=-1;
  Object.keys(statsFirst).forEach(id=>{
    const f=statsFirst[id],s=statsSecond[id];
    if(!f||!s||f.total<2||s.total<2)return;
    const fRate=f.done/f.total;
    const sRate=s.done/s.total;
    const improvement=sRate-fRate;
    if(improvement>bestImprovement){bestImprovement=improvement;mostImproved=s;}
  });

  // Streak history
  const bestStr=calcBestStreak();

  // Goal completion rate
  let goalsDone=0,goalsTotal=0;
  ['weekly','monthly'].forEach(type=>{
    (goals[type]||[]).forEach(g=>{goalsTotal++;if(g.done)goalsDone++;});
  });
  const goalRate=goalsTotal>0?Math.round(goalsDone/goalsTotal*100):null;

  let h=`<div class="report-section">
    <div class="report-title">Monthly Report</div>
    <div class="report-grid">
      <div class="report-card success">
        <div class="report-card-val">${won}/${daysTracked}</div>
        <div class="report-card-lbl">Days won / tracked</div>
      </div>
      <div class="report-card highlight">
        <div class="report-card-val">${activeDays.length?Math.round(avg*100)+'%':'--'}</div>
        <div class="report-card-lbl">Avg daily score</div>
      </div>
      <div class="report-card">
        <div class="report-card-val">${consistencyPct}%</div>
        <div class="report-card-lbl">Consistency</div>
        <div class="report-card-sub">${daysTracked}/${totalDaysInMonth} days tracked</div>
      </div>
      <div class="report-card">
        <div class="report-card-val">${streak} / ${bestStr}</div>
        <div class="report-card-lbl">Streak (current / best)</div>
      </div>
      <div class="report-card">
        <div class="report-card-val">${bestWeekLabel||'--'}</div>
        <div class="report-card-lbl">Best week</div>
        <div class="report-card-sub">${bestWeekAvg>=0?Math.round(bestWeekAvg*100)+'% avg':''}</div>
      </div>
      <div class="report-card">
        <div class="report-card-val">${worstWeekLabel||'--'}</div>
        <div class="report-card-lbl">Worst week</div>
        <div class="report-card-sub">${worstWeekAvg<=1?Math.round(worstWeekAvg*100)+'% avg':''}</div>
      </div>`;

  if(goalRate!==null){
    h+=`<div class="report-card">
      <div class="report-card-val">${goalRate}%</div>
      <div class="report-card-lbl">Goal completion</div>
      <div class="report-card-sub">${goalsDone}/${goalsTotal} goals</div>
    </div>`;
  }

  h+=`</div>`;

  // Most skipped task
  if(mostSkipped&&mostSkipped.missed>0){
    const rate=Math.round(mostSkipped.missed/mostSkipped.total*100);
    h+=`<div class="report-list"><div class="report-list-title">Most skipped task</div>
      <div class="report-list-item"><span>${mostSkipped.name} <span style="font-size:10px;color:${mostSkipped.tier==='S'?'var(--orange)':'var(--text3)'}">${mostSkipped.tier}</span></span><span class="report-pct" style="color:var(--red)">${rate}% missed</span></div>
    </div>`;
  }

  // Most improved task
  if(mostImproved&&bestImprovement>0.1){
    h+=`<div class="report-list"><div class="report-list-title">Most improved task</div>
      <div class="report-list-item"><span>${mostImproved.name}</span><span class="report-pct" style="color:var(--green)">+${Math.round(bestImprovement*100)}%</span></div>
    </div>`;
  }

  h+=`<button class="report-email-btn" onclick="emailReport('monthly')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
    Email this report
  </button>`;

  // Email report toggles
  h+=`<div class="report-toggle-row">
    <span class="report-toggle-label">Email me weekly reports</span>
    <label class="toggle"><input type="checkbox" ${weeklyReportEnabled?'checked':''} onchange="toggleReportPref('weekly',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
  </div>`;
  h+=`<div class="report-toggle-row" style="border-top:none;padding-top:0">
    <span class="report-toggle-label">Email me monthly reports</span>
    <label class="toggle"><input type="checkbox" ${monthlyReportEnabled?'checked':''} onchange="toggleReportPref('monthly',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>
  </div>`;

  h+=`</div>`;
  return h;
}

// Build report data object for email
function buildReportData(type){
  if(type==='weekly'){
    const dates=getWeekDates(weekOffset);
    const activeDays=dates.filter(d=>{const r=allHistory[dateKey(d)];return r&&!r.restDay;});
    const won=dates.filter(d=>{const r=allHistory[dateKey(d)];if(!r)return false;return r.pct>=(r.restDay?restSettings.win/100:WIN);}).length;
    const avg=activeDays.length?activeDays.reduce((s,d)=>s+(allHistory[dateKey(d)]?.pct||0),0)/activeDays.length:0;
    const streak=calcStreak();
    const taskStats=getTaskMissStats(dates.map(d=>({key:dateKey(d),rec:allHistory[dateKey(d)]})));
    const skipped=Object.values(taskStats).filter(s=>s.total>0&&s.missed>0).sort((a,b)=>b.missed-a.missed).slice(0,3);
    const label=`${dates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} - ${dates[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
    return{type:'weekly',label,won,total:7,avg:Math.round(avg*100),streak,skipped:skipped.map(s=>({name:s.name,tier:s.tier,missRate:Math.round(s.missed/s.total*100)})),email:currentUser?.email};
  } else {
    const{first,last,year,month}=getMonthDates(monthOffset);
    const daysData=Array.from({length:last.getDate()},(_,i)=>{const d=new Date(year,month,i+1);return{day:i+1,key:dateKey(d),rec:allHistory[dateKey(d)],d};});
    const daysWithData=daysData.filter(({rec})=>rec);
    const activeDays=daysData.filter(({rec})=>rec&&!rec.restDay);
    const won=daysData.filter(({rec})=>{if(!rec)return false;return rec.pct>=(rec.restDay?restSettings.win/100:WIN);}).length;
    const avg=activeDays.length?activeDays.reduce((s,{rec})=>s+(rec?.pct||0),0)/activeDays.length:0;
    const streak=calcStreak();
    const bestStr=calcBestStreak();
    const label=`${MONTHS[month]} ${year}`;
    return{type:'monthly',label,won,tracked:daysWithData.length,total:last.getDate(),avg:Math.round(avg*100),streak,bestStreak:bestStr,consistency:Math.round(daysWithData.length/last.getDate()*100),email:currentUser?.email};
  }
}

async function emailReport(type){
  const data=buildReportData(type);
  const btn=event?.target?.closest('.report-email-btn');
  if(btn){btn.textContent='Sending...';btn.disabled=true;}
  try{
    const{error}=await sb.functions.invoke('send-report',{body:{type,data}});
    if(error)throw error;
    if(btn){btn.textContent='Sent!';setTimeout(()=>{btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg> Email this report';btn.disabled=false;},2000);}
  }catch(e){
    console.warn('Email report failed:',e);
    if(btn){btn.textContent='Not available yet';btn.disabled=false;setTimeout(()=>{btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg> Email this report';},2000);}
  }
}

let weeklyReportEnabled=false;
let monthlyReportEnabled=false;
async function loadReportPrefs(){
  try{
    // Try vault table first
    const uid=currentUser&&currentUser.id;if(!uid)return;
    const{data}=await sb.from('wtd_report_prefs').select('weekly_email,monthly_email').eq('user_id',uid).maybeSingle();
    if(data){weeklyReportEnabled=!!data.weekly_email;monthlyReportEnabled=!!data.monthly_email;return;}
    // Fallback to old storage key
    const r=await storage.get('wtd-weekly-report');
    weeklyReportEnabled=r?.value==='true';
  }catch(e){weeklyReportEnabled=false;monthlyReportEnabled=false;}
}
async function toggleReportPref(type,val){
  if(type==='weekly')weeklyReportEnabled=val;
  if(type==='monthly')monthlyReportEnabled=val;
  vault.saveReportPrefs(weeklyReportEnabled,monthlyReportEnabled);
}

function reflectionCards(entries){
  const withR=entries.filter(({rec})=>rec&&(rec.reflection||rec.winOfDay));
  if(!withR.length)return`<p style="font-size:13px;color:var(--text3);padding:1rem 0">No reflections written yet.</p>`;

async function toggle(id,event){
  if(adminClientId)return;

  // If viewing a past day, update that day's history directly
  if(dayOffset!==0){
    const vKey=viewingDateKey();
    if(!allHistory[vKey])allHistory[vKey]={};
    if(!allHistory[vKey].checked)allHistory[vKey].checked={};
    allHistory[vKey].checked[id]=!allHistory[vKey].checked[id];
    // Recalculate pct for that day
    const pastRest=allHistory[vKey].restDay||false;
    const tasks=pastRest?restTasks():allTasks();
    const tot=pastRest?restTotal():total();
    const earned=tasks.filter(t=>allHistory[vKey].checked[t.id]).reduce((s,t)=>s+t.points,0);
    allHistory[vKey].pct=tot>0?earned/tot:0;
    allHistory[vKey].earned=earned;
    allHistory[vKey].total=tot;
    await storage.set('wtd-history',JSON.stringify(allHistory));
    render();
    return;
  }

  const tasks=isRestDay?restTasks():allTasks(),tot=isRestDay?restTotal():total();
  const earned=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  prevWonState=earned/tot>=(isRestDay?restSettings.win/100:WIN);
  const wasChecked=!!checked[id];
  checked[id]=!checked[id];

  // ── Instant DOM update — no full re-render ──
  const taskEl=document.getElementById(`tr-${id}`);
  const task=tasks.find(t=>t.id===id);
  if(taskEl&&task){
    const cb=taskEl.querySelector('.checkbox');
    const name=taskEl.querySelector('.task-name');
    const isDone=!!checked[id];
    if(isDone){
      taskEl.classList.add('done');
      if(task.tier==='S')taskEl.classList.add('s-tier');
      cb.classList.add('checked');
      cb.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      if(name)name.classList.add('done');
      // Dopamine spike
      spawnPointsPop(taskEl,task.points,task.tier);
    }else{
      taskEl.classList.remove('done');
      cb.classList.remove('checked');
      cb.innerHTML='';
      if(name)name.classList.remove('done');
    }
    // Update score circle without full render
    updateScoreInPlace();
  }

  // Save in background
  saveDay().then(()=>{
    // Only do a full render if celebration triggered
    if(showCelebration)render();
  });
}

function updateScoreInPlace(){
  const tasks=isRestDay?restTasks():allTasks();
  const tot=isRestDay?restTotal():total();
  const earned=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const pct=tot>0?earned/tot:0;
  const sc=statusColor(pct,isRestDay);
  const R=58,C=2*Math.PI*R,d=Math.min(pct,1)*C;
  // Update SVG circle
  const circle=document.querySelector('.score-card circle:last-of-type');
  if(circle){circle.setAttribute('stroke-dasharray',`${d} ${C}`);circle.setAttribute('stroke',sc);}
  // Update % text
  const texts=document.querySelectorAll('.score-card text');
  if(texts[0])texts[0].textContent=Math.round(pct*100)+'%';
  if(texts[1])texts[1].textContent=`${earned} / ${tot} pts`;
  // Update status text
  const statusEl=document.querySelector('.score-card p');
  if(statusEl){statusEl.textContent=statusText(pct,isRestDay);statusEl.style.color=sc;}
  // Update tasks done count
  const countEl=document.querySelectorAll('.score-card p')[1];
  if(countEl)countEl.textContent=`${tasks.filter(t=>checked[t.id]).length} of ${tasks.length} tasks done`;
  // Update win bar
  const barFill=document.querySelector('.win-bar-fill');
  if(barFill){barFill.style.width=Math.round(pct*100)+'%';barFill.style.background=sc;}
  // Update insight
  const insight=document.querySelector('.score-insight');
  if(insight)insight.innerHTML=getInsight(pct,earned,isRestDay);
  // Update block headers
  updateBlockHeaders();
}

function updateBlockHeaders(){
  // Update each block header pct and done state
  const allT=isRestDay?restTasks():allTasks();
  const groups={};
  allT.forEach(t=>{
    const key=t.block||'essential';
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  document.querySelectorAll('.block-header').forEach(header=>{
    const nameEl=header.querySelector('.block-name');
    const pctEl=header.querySelector('.block-pct');
    if(!nameEl)return;
    const blockText=nameEl.textContent.replace('✓','').trim();
    const blockTasks=allT.filter(t=>(t.block||'Daily Essentials')===blockText||blockText==='Daily Essentials'&&!t.block);
    if(!blockTasks.length)return;
    const be=blockTasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
    const bt=blockTasks.reduce((s,t)=>s+t.points,0);
    const allDone=blockTasks.every(t=>checked[t.id]);
    nameEl.classList.toggle('all-done',allDone);
    const doneSpan=nameEl.querySelector('.block-done');
    if(allDone&&!doneSpan)nameEl.innerHTML+=` <span class="block-done">✓</span>`;
    else if(!allDone&&doneSpan)doneSpan.remove();
    if(pctEl)pctEl.textContent=`${bt>0?Math.round(be/bt*100):0}% · ${be}/${bt}`;
  });
}

function buildCheckinContext(){
  const tasks=isRestDay?restTasks():allTasks();
  const tot=isRestDay?restTotal():total();
  const earned=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const pct=tot>0?earned/tot:0;
  const w=isRestDay?restSettings.win/100:WIN;
  const status=pct>=w?'winning the day':'building';
  const doneTasks=tasks.filter(t=>checked[t.id]);
  const missedS=tasks.filter(t=>!checked[t.id]&&t.tier==='S');
  const streak=calcStreak();

  // Recurring blind spots: tasks missed >50% in last 14 days
  const blindSpots=[];
  const allT=allTasks();
  allT.forEach(t=>{
    let missed=0,tracked=0;
    for(let i=0;i<14;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=dateKey(d),rec=allHistory[k];
      if(!rec)continue;
      tracked++;
      if(!rec.checked||!rec.checked[t.id])missed++;
    }
    if(tracked>=3&&missed/tracked>0.5)blindSpots.push({name:t.name,missRate:Math.round(missed/tracked*100)});
  });
  blindSpots.sort((a,b)=>b.missRate-a.missRate);

  let ctx=`Today's score: ${Math.round(pct*100)}% (${status}). `;
  ctx+=`Tasks done: ${doneTasks.length}/${tasks.length}. `;
  if(missedS.length)ctx+=`Missed S-tier tasks: ${missedS.map(t=>t.name).join(', ')}. `;
  ctx+=`Current streak: ${streak} days. `;
  if(isRestDay)ctx+=`Today is a rest day. `;
  if(blindSpots.length)ctx+=`Recurring blind spots (last 14 days): ${blindSpots.slice(0,5).map(b=>`${b.name} (missed ${b.missRate}%)`).join(', ')}. `;
  if(whyStatement)ctx+=`User's why statement: "${whyStatement}". `;
  if(identityStatement)ctx+=`User's identity statement: "${identityStatement}". `;
  return ctx;
}

function sendCheckinUserMessage(){
  const inp=document.getElementById('checkin-input');
  const text=inp?.value.trim();
  if(!text||checkinSending||checkinEnded)return;
  inp.value='';
  sendCheckinMessage(text,false);
}

async function sendCheckinMessage(userText,isInit){
  if(checkinSending)return;
  if(userText)checkinMessages.push({role:'user',content:userText});
  checkinSending=true;
  renderCoachUI();

  // System prompt is now server-controlled — we send mode:"checkin" instead
  const messages=[];
  if(isInit){
    messages.push({role:'user',content:`[CONTEXT FOR AI — do not repeat this to the user] ${checkinContext}\n\nThe user just opened a check-in. Start by greeting them warmly and asking a reflective question about their day.`});
  } else {
    // Build full conversation for context
    if(checkinContext){
      messages.push({role:'user',content:`[CONTEXT — do not repeat] ${checkinContext}`});
      messages.push({role:'assistant',content:checkinMessages.find(m=>m.role==='assistant')?.content||'Hey, how are you doing today?'});
    }
    checkinMessages.forEach(m=>{
      if(m===checkinMessages[0]&&m.role==='assistant'&&checkinContext)return; // skip first if already added
      messages.push({role:m.role,content:m.content});
    });
  }

  try{
    const{data,error}=await sb.functions.invoke('ai-coach',{
      body:{messages,mode:'checkin',context:checkinContext}
    });
    checkinSending=false;
    if(error)throw error;
    const reply=data?.reply||data?.content||data?.message||'';
    if(!reply)throw new Error('Empty response');
    checkinMessages.push({role:'assistant',content:reply});

    // Auto-detect wrap-up
    if(reply.toLowerCase().includes('thanks for checking in')){
      checkinEnded=true;
      saveCheckinToDb();
    }
    // Save after each message
    saveCheckinToDb();
  }catch(e){
    checkinSending=false;
    console.warn('Checkin AI call failed:',e);
    checkinMessages.push({role:'assistant',content:"AI check-ins aren't set up yet. Your coach will enable this soon."});
    checkinEnded=true;
  }
  renderCoachUI();
}

function endCheckin(){
  checkinEnded=true;
  saveCheckinToDb();
  renderCoachUI();
}

let _checkinId=null;
async function saveCheckinToDb(){
  try{
    const payload={
      user_id:currentUser.id,
      email:currentUser.email,
      messages:checkinMessages,
      context:checkinContext,
      mood_before:checkinMoodBefore,
      mood_after:checkinMoodAfter,
    };
    if(_checkinId){
      await sb.from('wtd_checkins').update(payload).eq('id',_checkinId);
    }else{
      payload.created_at=new Date().toISOString();
      const{data}=await sb.from('wtd_checkins').insert([payload]).select('id').maybeSingle();
      if(data)_checkinId=data.id;
    }
  }catch(e){
    console.warn('Checkin save failed (table may not exist):',e);
  }
}

let _parsedSchedule=null;

function renderPasteView(){
  return`<div style="padding:6px 0">

    <div style="padding:8px 0">
      <textarea class="reflect-input" id="paste-input" placeholder="Paste or type your daily routine..." style="min-height:120px;margin-bottom:8px"></textarea>
      <button class="btn-primary" style="width:auto;padding:8px 20px" onclick="parseSchedule()">Build my schedule</button>
    </div>
  </div>`;

function parseSchedule(){
  const raw=document.getElementById('paste-input')?.value.trim();
  if(!raw){alert('Please paste your routine first.');return;}
  const lines=raw.split(/\n/).map(l=>l.trim()).filter(Boolean);

  // Keyword → block/tier/points mapping
  const rules=[
    {match:/wake|get up|alarm|rise/i,block:'Morning',tier:'A',pts:8,name:null},
    {match:/walk.*morn|morning walk/i,block:'Morning',tier:'B',pts:7,name:'Morning walk'},
    {match:/stretch|yoga.*morn|mobility/i,block:'Morning',tier:'B',pts:7,name:null},
    {match:/meditat|mindful|breathwork|breath work/i,block:'Morning',tier:'A',pts:7,name:null},
    {match:/gratitude|journal.*morn|intentions|pray|prayer|devotion/i,block:'Morning',tier:'A',pts:8,name:null},
    {match:/work.*block|deep work|focus.*block|work.*1|work.*2|work.*3|work\s*9|work\s*10|work\s*1[0-2]/i,block:'Work',tier:'S',pts:15,name:null},
    {match:/^work$|go to work|office|meetings|calls|emails/i,block:'Work',tier:'S',pts:15,name:null},
    {match:/lunch|midday|break|nap/i,block:'Midday',tier:'B',pts:4,name:null},
    {match:/walk.*mid|afternoon walk|midday walk|walk.*lunch/i,block:'Midday',tier:'B',pts:5,name:'Midday walk'},
    {match:/gym|lift|weight|workout|train|exercise|crossfit|run(?:ning)?|swim|sport|basketball|boxing/i,block:'Body',tier:'S',pts:13,name:null},
    {match:/yoga|stretch.*even|pilates/i,block:'Body',tier:'B',pts:6,name:null},
    {match:/read|book|audio|podcast|learn|course|study/i,block:'Wind Down',tier:'A',pts:7,name:null},
    {match:/journal|reflect|diary|write.*journal/i,block:'Wind Down',tier:'A',pts:8,name:null},
    {match:/plan.*tomorrow|prep.*next|schedule.*tomorrow|write.*tomorrow|lay out/i,block:'Wind Down',tier:'S',pts:12,name:null},
    {match:/wind down|screen.*off|phone.*down|no.*screen|relax|unwind/i,block:'Wind Down',tier:'B',pts:6,name:null},
    {match:/sleep|bed|lights out|asleep/i,block:'Wind Down',tier:'A',pts:10,name:null},
    {match:/calorie|macro|meal prep|track.*food|nutrition|diet|eat.*clean|healthy.*eat/i,block:'Essential',tier:'S',pts:10,name:null},
    {match:/cold.*shower|cold.*plunge|ice.*bath|sauna/i,block:'Body',tier:'B',pts:5,name:null},
    {match:/walk/i,block:'Midday',tier:'B',pts:5,name:null},
    {match:/coach|identity|growth|shadow|inner/i,block:'Essential',tier:'S',pts:11,name:null},
  ];

  const timed=[];
  const essential=[];
  let id=1;
  let workBlockCount=0;

  lines.forEach(line=>{
    // Clean up: remove leading bullets, numbers, dashes, times
    let cleanLine=line.replace(/^[\-\*\•\d\.\)\:]+ */,'').replace(/^\d{1,2}:\d{2}\s*(am|pm)?\s*[\-–:]?\s*/i,'').replace(/^\d{1,2}\s*(am|pm)\s*[\-–:]?\s*/i,'').trim();
    if(!cleanLine||cleanLine.length<2)return;

    // Try to match against rules
    let matched=false;
    for(const rule of rules){
      if(rule.match.test(cleanLine)||rule.match.test(line)){
        const taskName=rule.name||cleanLine.charAt(0).toUpperCase()+cleanLine.slice(1);
        if(rule.block==='Work'){
          workBlockCount++;
          const wName=workBlockCount===1?taskName:(taskName.match(/work/i)?'Work block '+workBlockCount:taskName);
          timed.push({id:id++,block:'Work',name:wName,points:rule.pts,tier:rule.tier});
        } else if(rule.block==='Essential'){
          essential.push({id:id++,name:taskName,points:rule.pts,tier:rule.tier});
        } else {
          timed.push({id:id++,block:rule.block,name:taskName,points:rule.pts,tier:rule.tier});
        }
        matched=true;
        break;
      }
    }
    // If no rule matched, add as a B-tier task in the best-guess block
    if(!matched){
      const taskName=cleanLine.charAt(0).toUpperCase()+cleanLine.slice(1);
      timed.push({id:id++,block:'Midday',name:taskName,points:5,tier:'B'});
    }
  });

  // Ensure at least a wake and sleep task exist
  if(!timed.find(t=>t.name.match(/wake|get up|alarm/i))){
    timed.unshift({id:id++,block:'Morning',name:'Wake up on time',points:8,tier:'A'});
  }
  if(!timed.find(t=>t.name.match(/sleep|bed/i))){
    timed.push({id:id++,block:'Wind Down',name:'Sleep on time',points:10,tier:'A'});
  }

  _parsedSchedule={timed,essential};
  coachView='paste-review';
  renderCoachUI();
}

function renderPasteReview(){
  if(!_parsedSchedule)return renderPasteView();
  const{timed,essential}=_parsedSchedule;
  const blocks=[...new Set(timed.map(t=>t.block))];
  const totalPts=timed.reduce((s,t)=>s+t.points,0)+essential.reduce((s,t)=>s+t.points,0);
  const totalCount=timed.length+essential.length;

  let h=`<div style="padding:6px 0">
    <button class="coach-prompt-btn" onclick="coachView='paste';_parsedSchedule=null;renderCoachUI()" style="margin-bottom:10px;font-size:11px;opacity:.7">&larr; Back to edit</button>
    <div class="coach-msg ai">Here's your schedule — <strong>${totalCount} tasks</strong>, <strong>${totalPts} pts</strong>. Edit names or remove tasks, then save.</div>`;

  blocks.forEach(b=>{
    const bTasks=timed.filter(t=>t.block===b);
    h+=`<div style="margin-bottom:10px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;font-weight:600">${b}</div>`;
    bTasks.forEach(t=>{
      const tidx=timed.indexOf(t);
      h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <input style="flex:1;font-size:13px;color:var(--text);background:none;border:none;border-bottom:1px dashed var(--border);padding:3px 0;outline:none;font-family:var(--font)" value="${esc(t.name)}" onchange="_parsedSchedule.timed[${tidx}].name=this.value">
        <span style="font-size:10px;color:${t.tier==='S'?'var(--orange)':t.tier==='A'?'var(--blue)':'var(--text3)'};font-weight:600;min-width:14px">${t.tier}</span>
        <span style="font-size:10px;color:var(--text3);min-width:28px">${t.points}pt</span>
        <button onclick="_parsedSchedule.timed.splice(${tidx},1);renderCoachUI()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px">&times;</button>
      </div>`;
    });
    h+=`</div>`;
  });

  if(essential.length){
    h+=`<div style="margin-bottom:10px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;font-weight:600">Daily Essentials</div>`;
    essential.forEach((t,i)=>{
      h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <input style="flex:1;font-size:13px;color:var(--text);background:none;border:none;border-bottom:1px dashed var(--border);padding:3px 0;outline:none;font-family:var(--font)" value="${esc(t.name)}" onchange="_parsedSchedule.essential[${i}].name=this.value">
        <span style="font-size:10px;color:var(--orange);font-weight:600;min-width:14px">${t.tier}</span>
        <span style="font-size:10px;color:var(--text3);min-width:28px">${t.points}pt</span>
        <button onclick="_parsedSchedule.essential.splice(${i},1);renderCoachUI()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px">&times;</button>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`<div style="padding:8px 0;display:flex;gap:8px">
    <button class="btn-primary" style="width:auto;padding:8px 20px;flex:1" onclick="saveParsedSchedule()">Save as my schedule</button>
  </div></div>`;
  return h;
}

async function saveParsedSchedule(){
  if(!_parsedSchedule)return;
  _savedScheduleBackup={timed:timedTasks.map(t=>({...t})),essential:essentialTasks.map(t=>({...t})),rest:{...restSettings}};
  timedTasks=_parsedSchedule.timed;
  essentialTasks=_parsedSchedule.essential;
  hasCustomTasks=true;
  await saveTasks();
  // Build rest day defaults: exclude Work and Body blocks
  const excludeBlocks=['Work','Body'];
  const restIds=timedTasks.filter(t=>!excludeBlocks.includes(t.block)).map(t=>t.id);
  essentialTasks.forEach(t=>restIds.push(t.id));
  restSettings={win:50,crush:75,taskIds:restIds};
  await saveRest();
  _parsedSchedule=null;
  coachOpen=false;
  render();
}

// ── BOOT ──
// Single-fire boot gate — prevents double-render from race conditions
let _appBooted=false;
async function _bootOnce(session){
  if(_appBooted)return;
  _appBooted=true;
  if(session){currentUser=session.user;renderRoot();}
  else{currentUser=null;currentProfile=null;resetAppState();renderAuth();}
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='INITIAL_SESSION'){
    await _bootOnce(session);
    return;
  }
  if(event==='SIGNED_IN'){
    if(!_appBooted){await _bootOnce(session);return;}
    if(session){currentUser=session.user;renderRoot();}
    return;
  }
  if(event==='TOKEN_REFRESHED'){
    if(session)currentUser=session.user;
    return;
  }
  if(event==='SIGNED_OUT'){
    currentUser=null;currentProfile=null;resetAppState();renderAuth();
    return;
  }
  await _bootOnce(session);
});

// Fallback: if INITIAL_SESSION hasn't fired after 1.5s (Safari ITP / slow networks)
setTimeout(async()=>{
  if(_appBooted)return;
  try{
    const{data:{session}}=await sb.auth.getSession();
    await _bootOnce(session);
  }catch(e){await _bootOnce(null);}
},1500);
