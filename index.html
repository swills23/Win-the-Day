<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Win the Day">
<meta name="mobile-web-app-capable" content="yes">
<title>Win the Day</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#f5f5f7;--text:#1d1d1f;--text2:#3a3a3c;--text3:#8e8e93;
  --border:#e5e5ea;--border2:#c7c7cc;--r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:"SF Mono","Fira Code",monospace;
  --blue:#3A7EC4;--green:#2E9E5B;--orange:#C8891A;--red:#E24B4A;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--text:#f2f2f7;--text2:#ebebf5cc;--text3:#8e8e93;
  --border:#38383a;--border2:#48484a;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);touch-action:manipulation;}

/* ── Shared ── */
.screen{max-width:460px;margin:80px auto;padding:2rem 1.5rem;background:var(--bg2);border-radius:var(--rl);border:.5px solid var(--border);}
.screen h1{font-size:22px;margin-bottom:6px;}
.screen p{font-size:13px;color:var(--text3);margin-bottom:1.5rem;line-height:1.6;}
.lbl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;}
.inp{width:100%;padding:9px 12px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-bottom:1rem;font-family:var(--font);}
.inp:focus{border-color:var(--border2);}
.btn-primary{width:100%;padding:11px;border-radius:var(--r);background:var(--text);color:var(--bg);border:none;font-size:14px;cursor:pointer;font-family:var(--font);margin-bottom:8px;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:none;border:.5px solid var(--border);border-radius:var(--r);padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);}
.btn-sm{padding:5px 13px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:var(--font);border:none;}
.btn-green{background:var(--green);color:#fff;}
.btn-outline-red{background:none;color:var(--red);border:.5px solid var(--red);border-radius:var(--r);padding:5px 13px;font-size:12px;cursor:pointer;font-family:var(--font);}
.err{font-size:12px;color:var(--red);margin-bottom:10px;min-height:18px;}
.lnk{font-size:13px;color:var(--blue);cursor:pointer;text-align:center;display:block;margin-top:10px;}
.loading{text-align:center;padding:5rem 1rem;font-size:14px;color:var(--text3);}
.top-bar{display:flex;justify-content:flex-end;align-items:center;padding:10px 16px;background:var(--bg);border-bottom:.5px solid var(--border);gap:8px;position:sticky;top:0;z-index:50;}
.top-bar-title{font-size:14px;font-weight:600;color:var(--text);flex:1;letter-spacing:-.01em;}
.top-bar-email{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.top-bar-btn{font-size:12px;padding:4px 12px;border-radius:var(--r);border:.5px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:var(--font);}

/* ── Dopamine Spike ── */
.pts-pop{position:fixed;pointer-events:none;font-weight:700;z-index:9999;animation:ptsFloat 1.1s ease-out forwards;}
@keyframes ptsFloat{
  0%{opacity:1;transform:translateY(0) scale(1);}
  25%{opacity:1;transform:translateY(-14px) scale(1.25);}
  100%{opacity:0;transform:translateY(-58px) scale(.8);}
}
@keyframes cbBounce{
  0%{transform:scale(1);}
  40%{transform:scale(1.3);}
  70%{transform:scale(.9);}
  100%{transform:scale(1);}
}
.checkbox.bounce{animation:cbBounce .35s ease;}

/* ── Levels ── */
.level-card{border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;border:.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:14px;}
.level-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.xp-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.xp-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;}
.badge-streak{background:rgba(232,160,32,.12);color:var(--orange);border:.5px solid rgba(232,160,32,.3);}
.badge-crush{background:rgba(46,158,91,.12);color:var(--green);border:.5px solid rgba(46,158,91,.3);}
.badge-perfect{background:rgba(58,126,196,.12);color:var(--blue);border:.5px solid rgba(58,126,196,.3);}
.pr-card{display:flex;gap:10px;margin-bottom:12px;}
.pr-item{flex:1;background:var(--bg2);border-radius:var(--r);padding:10px;border:.5px solid var(--border);text-align:center;}
.pr-val{font-size:20px;font-weight:500;color:var(--text);}
.pr-lbl{font-size:10px;color:var(--text3);margin-top:2px;}

/* ── Tracker ── */
.tracker{max-width:560px;margin:0 auto;padding:1rem 1rem 3rem;}
.tabs{display:flex;gap:3px;margin-bottom:1.25rem;background:var(--bg2);border-radius:var(--r);padding:3px;border:.5px solid var(--border);}
.tab{flex:1;text-align:center;font-size:12px;padding:6px 2px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--bg);color:var(--text);font-weight:500;border:.5px solid var(--border);}
.mini-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;}
.statement-card{border-radius:var(--rl);padding:13px 15px;margin-bottom:12px;border:.5px solid var(--border);background:var(--bg2);position:relative;}
.statement-text{font-size:14px;color:var(--text);line-height:1.6;font-style:italic;}
.statement-input{width:100%;font-size:14px;color:var(--text);background:none;border:none;outline:none;resize:none;line-height:1.6;font-family:var(--font);font-style:italic;min-height:48px;}
.identity-divider{padding-top:10px;margin-top:10px;border-top:.5px solid var(--border);}
.identity-text{font-size:14px;color:var(--text);font-weight:500;line-height:1.5;}
.identity-input{width:100%;font-size:14px;color:var(--text);background:none;border:none;outline:none;resize:none;line-height:1.5;font-family:var(--font);font-weight:500;min-height:36px;}
.edit-btn{position:absolute;top:10px;right:12px;font-size:11px;color:var(--text3);background:none;border:.5px solid var(--border);border-radius:var(--r);padding:3px 8px;cursor:pointer;}
.save-btn{margin-top:8px;font-size:12px;padding:5px 14px;border-radius:var(--r);background:var(--bg);border:.5px solid var(--border2);cursor:pointer;color:var(--text);}
.mood-row{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;margin-bottom:12px;background:var(--bg2);border-radius:var(--rl);border:.5px solid var(--border);}
.mood-btns{display:flex;gap:5px;}
.mood-btn{width:30px;height:30px;border-radius:50%;border:.5px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.mood-btn.sel{background:var(--blue);color:#fff;border-color:var(--blue);}
.score-card{display:flex;align-items:center;gap:1.75rem;margin-bottom:12px;background:var(--bg2);border-radius:var(--rl);padding:1.5rem 1.75rem;border:.5px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.score-insight{font-size:12px;color:var(--text3);margin-bottom:12px;padding:0 2px;line-height:1.5;}
.score-insight strong{color:var(--text2);}
.yesterday-line{font-size:11px;color:var(--text3);margin-top:-8px;margin-bottom:12px;padding:0 2px;}
.thresh-pills{display:flex;gap:6px;margin-top:8px;}
.thresh-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);border:.5px solid var(--border);color:var(--text2);}
.win-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;position:relative;}
.win-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.rest-day-badge{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(58,126,196,.12);color:var(--blue);border:.5px solid rgba(58,126,196,.25);margin-bottom:4px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.missed-alert{background:rgba(200,137,26,.06);border:.5px solid rgba(200,137,26,.25);border-radius:var(--rl);padding:11px 13px;margin-bottom:12px;}
.missed-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--orange);margin-bottom:7px;font-weight:500;}
.missed-item{font-size:13px;color:var(--text2);padding:3px 0;display:flex;align-items:center;gap:8px;}
.missed-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.pattern-alert{background:rgba(226,75,74,.04);border:.5px solid rgba(226,75,74,.2);border-radius:var(--rl);padding:11px 13px;margin-bottom:12px;}
.pattern-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--red);margin-bottom:7px;font-weight:500;}
.pattern-item{font-size:13px;color:var(--text2);padding:3px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pattern-count{font-size:11px;color:var(--red);background:rgba(226,75,74,.08);border-radius:20px;padding:1px 7px;flex-shrink:0;}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;margin-top:4px;}
.block-name{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:5px;transition:color .3s;}
.block-name.all-done{color:var(--green);}
.block-done{font-size:11px;color:var(--green);}
.block-pct{font-size:11px;color:var(--text3);font-weight:500;}
.block-tasks{background:var(--bg2);border-radius:var(--rl);overflow:hidden;border:.5px solid var(--border);margin-bottom:12px;}
.essentials-block{background:var(--bg2);border-radius:var(--rl);overflow:hidden;border:1.5px solid var(--border2);margin-bottom:12px;}
.task-row{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;cursor:pointer;border-top:.5px solid var(--border);transition:background .15s;position:relative;-webkit-tap-highlight-color:transparent;user-select:none;}
.task-row:first-child{border-top:none;}
.task-row:hover{background:var(--bg);}
.task-row.done{background:rgba(46,158,91,.04);}
.task-row.s-tier::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--orange);opacity:.5;transition:background .3s,opacity .3s;}
.task-row.s-tier.done::before{background:var(--green);opacity:.6;}
.checkbox{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.checkbox.checked{border:none;background:var(--green);}
.task-name{flex:1;font-size:14px;color:var(--text);transition:all .2s;line-height:1.4;}
.task-name.done{color:var(--green);opacity:.7;}
.task-sub{display:block;font-size:11px;color:var(--text3);margin-top:1px;}
.task-note-text{display:block;font-size:11px;color:var(--blue);margin-top:3px;font-style:italic;}
.tier-badge{font-size:10px;font-weight:500;width:16px;text-align:center;margin-top:2px;}
.task-pts{font-size:12px;color:var(--text3);min-width:28px;text-align:right;margin-top:2px;}
.task-note-btn{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;flex-shrink:0;margin-top:2px;padding:2px 4px;opacity:.4;transition:opacity .15s;}
.task-note-btn:hover{opacity:1;color:var(--blue);}
.task-row:hover .task-note-btn{opacity:.7;}
.action-block{background:rgba(58,126,196,.04);border-radius:var(--rl);overflow:hidden;border:.5px solid rgba(58,126,196,.3);margin-bottom:12px;}
.action-header-row{padding:8px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);font-weight:500;}
.action-row{display:flex;align-items:center;gap:11px;padding:8px 13px;border-top:.5px solid rgba(58,126,196,.15);cursor:pointer;}
.action-name{flex:1;font-size:14px;color:var(--text);}
.action-name.done{color:var(--text3);text-decoration:line-through;}
.win-of-day{background:var(--bg2);border-radius:var(--rl);border:.5px solid var(--border);padding:13px 15px;margin-bottom:12px;}
.win-input{width:100%;font-size:14px;color:var(--text);background:none;border:none;outline:none;resize:none;line-height:1.6;font-family:var(--font);min-height:48px;}
.winddown-done{background:rgba(46,158,91,.06);border:.5px solid rgba(46,158,91,.2);border-radius:var(--rl);padding:11px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.reflect-section{margin-top:1.5rem;border-top:.5px solid var(--border);padding-top:1.25rem;}
.reflect-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:7px;}
.reflect-input{width:100%;min-height:90px;font-size:14px;color:var(--text);background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rl);padding:11px 13px;outline:none;resize:none;line-height:1.6;font-family:var(--font);}
.reflect-input:focus{border-color:var(--border2);}
.autosave{font-size:11px;color:var(--text3);margin-top:5px;height:16px;}
.settings-row{display:flex;gap:6px;margin-top:1.25rem;padding-top:1.25rem;border-top:.5px solid var(--border);flex-wrap:wrap;}
.settings-btn{padding:7px 13px;border-radius:var(--r);border:.5px solid var(--border);background:none;font-size:12px;cursor:pointer;color:var(--text3);font-family:var(--font);transition:all .15s;}
.settings-btn:hover{color:var(--text);border-color:var(--border2);}
.settings-btn.danger:hover{color:var(--red);border-color:var(--red);}
.streak-banner{background:linear-gradient(135deg,rgba(232,160,32,.1),rgba(200,137,26,.04));border:.5px solid rgba(232,160,32,.25);border-radius:var(--rl);padding:9px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.celebrate-banner{border-radius:var(--rl);padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;animation:fadeIn .4s ease;}
.celebrate-banner.won{background:linear-gradient(135deg,rgba(58,126,196,.12),rgba(58,126,196,.04));border:.5px solid rgba(58,126,196,.4);}
.celebrate-banner.crush{background:linear-gradient(135deg,rgba(46,158,91,.15),rgba(46,158,91,.04));border:.5px solid rgba(46,158,91,.4);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.rest-banner{border-radius:var(--rl);padding:11px 15px;margin-bottom:12px;border:.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.rest-banner.active{border-color:var(--blue);background:rgba(58,126,196,.06);}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:background .2s;}
.toggle input:checked+.toggle-track{background:var(--blue);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;}
.toggle input:checked~.toggle-thumb{transform:translateX(18px);}

/* ── Identity Reflection ── */
.identity-reflect-card{background:linear-gradient(135deg,rgba(58,126,196,.08),rgba(58,126,196,.02));border:.5px solid rgba(58,126,196,.3);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;}
.identity-reflect-statement{font-size:14px;color:var(--blue);font-style:italic;margin-bottom:12px;line-height:1.5;font-weight:500;}
.identity-reflect-question{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:8px;font-weight:600;}
.ir-note-inp{width:100%;font-size:14px;color:var(--text);background:var(--bg);border:.5px solid rgba(58,126,196,.2);border-radius:var(--r);padding:10px 12px;outline:none;resize:none;line-height:1.6;font-family:var(--font);min-height:90px;}
.ir-note-inp:focus{border-color:rgba(58,126,196,.5);}

/* ── Goals Tab ── */
.goals-section{margin-bottom:1.5rem;}
.goals-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.goals-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
.goals-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg2);border:.5px solid var(--border);color:var(--text3);}
.add-goal-btn{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:var(--font);padding:2px 0;}
.goal-item{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;background:var(--bg2);border-radius:var(--r);border:.5px solid var(--border);margin-bottom:6px;cursor:pointer;transition:background .15s;}
.goal-item:hover{background:var(--bg);}
.goal-item.done{background:rgba(46,158,91,.04);}
.goal-cb{width:17px;height:17px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.goal-cb.checked{background:var(--green);border-color:var(--green);}
.goal-text{flex:1;font-size:14px;color:var(--text);line-height:1.4;transition:all .2s;}
.goal-text.done{color:var(--green);opacity:.7;}
.goal-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0;line-height:1;flex-shrink:0;}
.goal-del:hover{color:var(--red);}
.goal-add-row{display:flex;gap:7px;margin-top:7px;}
.goal-inp{flex:1;font-size:13px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg);color:var(--text);outline:none;font-family:var(--font);}
.goal-inp:focus{border-color:var(--border2);}
.goal-save-btn{padding:7px 14px;border-radius:var(--r);background:var(--text);color:var(--bg);border:none;font-size:13px;cursor:pointer;font-family:var(--font);}
.goals-progress{height:5px;background:var(--border);border-radius:3px;margin-bottom:12px;overflow:hidden;}
.goals-progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease;}
.goals-reset-note{font-size:11px;color:var(--text3);margin-top:6px;padding-left:2px;}

/* ── Reminder Banner ── */
.reminder-banner{border-radius:var(--rl);padding:11px 15px;margin-bottom:12px;border:.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.reminder-banner.active{border-color:rgba(46,158,91,.4);background:rgba(46,158,91,.05);}
.time-inp{font-size:13px;padding:4px 8px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg);color:var(--text);outline:none;font-family:var(--font);margin-top:4px;}

/* ── History ── */
.history-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.nav-btn{background:none;border:.5px solid var(--border);border-radius:var(--r);padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);}
.nav-title{font-size:15px;font-weight:500;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.25rem;}
.day-cell{border-radius:var(--r);padding:7px 3px;text-align:center;border:.5px solid var(--border);background:var(--bg2);}
.day-cell.today{border:1.5px solid var(--border2);}
.day-cell.future{opacity:.35;}
.day-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.day-pct{font-size:14px;font-weight:500;}
.day-dot{width:5px;height:5px;border-radius:50%;margin:3px auto 0;}
.week-row{display:grid;grid-template-columns:90px 1fr 50px;align-items:center;gap:11px;padding:9px 0;border-top:.5px solid var(--border);}
.week-row:first-child{border-top:none;}
.week-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.week-bar-fill{height:100%;border-radius:3px;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;}
.month-hdr{font-size:10px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.04em;padding-bottom:3px;}
.month-cell{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;border:.5px solid transparent;}
.month-cell.has-data{border-color:var(--border);}
.month-cell.today-cell{border:1.5px solid var(--border2);}
.month-cell.empty{background:none;}
.streak-dot{width:3px;height:3px;border-radius:50%;background:#E8A020;margin-top:2px;}
.summary-row{display:flex;gap:10px;margin-bottom:1.25rem;}
.summary-card{flex:1;background:var(--bg2);border-radius:var(--r);padding:11px;border:.5px solid var(--border);text-align:center;}
.summary-val{font-size:21px;font-weight:500;}
.summary-lbl{font-size:11px;color:var(--text3);margin-top:1px;}
.reflect-card{background:var(--bg2);border-radius:var(--rl);padding:13px 15px;border:.5px solid var(--border);margin-bottom:9px;}
.reflect-card-date{font-size:11px;color:var(--text3);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:3px;}
.reflect-card-text{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
.no-data{text-align:center;padding:3rem 1rem;}
.no-data p{font-size:13px;color:var(--text3);margin-bottom:1rem;}

/* ── Overlay ── */
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:100;overflow-y:auto;}
.modal{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--border);width:100%;max-width:520px;padding:1.5rem;margin:auto;}
.modal-title{font-size:17px;font-weight:500;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:1.25rem;line-height:1.5;}
.esec{margin-bottom:1.25rem;}
.esec-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.editor-row{display:grid;grid-template-columns:1fr 46px 42px 22px;gap:5px;align-items:center;margin-bottom:5px;}
.e-inp{font-size:13px;padding:6px 9px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;font-family:var(--font);}
.e-pts{font-size:13px;padding:6px 3px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;text-align:center;font-family:var(--font);}
.e-tier{font-size:12px;padding:6px 2px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;font-family:var(--font);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;}
.del-btn:hover{color:var(--red);}
.modal-actions{display:flex;gap:8px;margin-top:1rem;}
.btn-save{padding:8px 18px;border-radius:var(--r);background:var(--text);color:var(--bg);border:none;font-size:13px;cursor:pointer;font-family:var(--font);}
.btn-cancel{padding:8px 18px;border-radius:var(--r);background:none;color:var(--text2);border:.5px solid var(--border);font-size:13px;cursor:pointer;font-family:var(--font);}
.block-sel{font-size:13px;padding:6px 9px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;font-family:var(--font);margin-bottom:9px;}
.import-area{width:100%;min-height:80px;font-size:12px;padding:9px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);resize:none;outline:none;font-family:var(--mono);}
.thresh-row{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.thresh-row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:56px;}
.thresh-row input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none;}
.thresh-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--blue);cursor:pointer;}
.thresh-val{font-size:14px;font-weight:500;color:var(--blue);min-width:36px;text-align:right;}
.rest-preview-txt{font-size:12px;color:var(--text3);padding:7px 11px;background:var(--bg2);border-radius:var(--r);border:.5px solid var(--border);margin-bottom:.9rem;line-height:1.6;}
.rest-preview-txt strong{color:var(--text2);}
.rest-task-list{background:var(--bg2);border-radius:var(--rl);overflow:hidden;border:.5px solid var(--border);margin-bottom:.9rem;max-height:300px;overflow-y:auto;}
.rtg-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:6px 12px 3px;font-weight:500;}
.rest-task-row{display:flex;align-items:center;gap:9px;padding:8px 12px;border-top:.5px solid var(--border);cursor:pointer;}
.rest-task-row:hover{background:var(--bg);}
.rest-cb{width:15px;height:15px;border-radius:3px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;}
.rest-cb.on{background:var(--blue);border-color:var(--blue);}

/* ── Admin ── */
.admin{max-width:560px;margin:0 auto;padding:1rem 1rem 3rem;}
.admin-tabs{display:flex;gap:3px;margin-bottom:1.25rem;background:var(--bg2);border-radius:var(--r);padding:3px;border:.5px solid var(--border);}
.admin-tab{flex:1;text-align:center;font-size:13px;padding:6px;border-radius:6px;cursor:pointer;color:var(--text2);}
.admin-tab.active{background:var(--bg);color:var(--text);font-weight:500;border:.5px solid var(--border);}
.user-card{background:var(--bg2);border-radius:var(--rl);padding:13px 15px;border:.5px solid var(--border);margin-bottom:9px;}
.user-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:rgba(58,126,196,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--blue);flex-shrink:0;}
.user-stats{display:flex;gap:8px;margin-bottom:8px;}
.user-stat{flex:1;background:var(--bg);border-radius:var(--r);padding:7px;border:.5px solid var(--border);text-align:center;}
.user-stat-val{font-size:16px;font-weight:500;}
.user-stat-lbl{font-size:10px;color:var(--text3);margin-top:1px;}
.user-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.inactive-flag{font-size:11px;color:var(--red);background:rgba(226,75,74,.08);border:.5px solid rgba(226,75,74,.25);border-radius:20px;padding:2px 8px;}
.no-users{text-align:center;padding:2.5rem 1rem;font-size:13px;color:var(--text3);}
.assign-area{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg);color:var(--text);resize:none;outline:none;font-family:var(--font);min-height:80px;margin-bottom:8px;}
</style>
</head>

<div id="ov" style="display:none"></div>

<script>
const SUPABASE_URL = 'https://ceahoxydtjcprjkbjakn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlYWhveHlkdGpjcHJqa2JqYWtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTAyNDMsImV4cCI6MjA4OTk2NjI0M30.B9SPHoEYWd_-GtaNuXrc8M0tlqhxns9otKl9z5jcTZ0';
const ADMIN_EMAIL = 'scott@scottzwills.com';
const APP_NAME = 'Win the Day';

const LEVELS = [
  {name:'Bronze',min:0,max:10,icon:'🥉',color:'#CD7F32'},
  {name:'Silver',min:10,max:30,icon:'🥈',color:'#A8A9AD'},
  {name:'Gold',min:30,max:75,icon:'🥇',color:'#D4A853'},
  {name:'Platinum',min:75,max:150,icon:'💎',color:'#C0C0C0'},
  {name:'Diamond',min:150,max:365,icon:'💠',color:'#64D2FF'},

];
function getLevel(n){for(let i=LEVELS.length-1;i>=0;i--){if(n>=LEVELS[i].min)return{...LEVELS[i],index:i};}return{...LEVELS[0],index:0};}
function getLevelProgress(n){const lv=getLevel(n);if(lv.index===LEVELS.length-1)return{lv,pct:1,toNext:0,nextName:''};return{lv,pct:(n-lv.min)/(lv.max-lv.min),toNext:lv.max-n,nextName:LEVELS[lv.index+1].name};}

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {

      return await fn();

});
let currentUser=null,currentProfile=null,authView='login';
let adminView='pending',adminClientId=null,adminClientEmail='';

const storage={
  async get(key,uid){const id=uid||(currentUser&&currentUser.id);if(!id)return null;const{data}=await sb.from('wtd_store').select('value').eq('key',`${id}:${key}`).maybeSingle();return data?{key,value:data.value}:null;},
  async set(key,value,uid){const id=uid||(currentUser&&currentUser.id);if(!id)return null;await sb.from('wtd_store').upsert({key:`${id}:${key}`,value,updated_at:new Date().toISOString()},{onConflict:'key'});return{key,value};}
};

// ── AUTH ──
async function signUp(){
  const email=document.getElementById('a-email').value.trim(),pw=document.getElementById('a-pw').value;
  const errEl=document.getElementById('a-err'),btn=document.getElementById('a-btn');
  errEl.textContent='';btn.disabled=true;btn.textContent='Creating…';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){errEl.textContent=error.message;btn.disabled=false;btn.textContent='Create account';return;}
  const isAdmin=email.toLowerCase()===ADMIN_EMAIL.toLowerCase();
  await sb.from('wtd_profiles').upsert({id:data.user.id,email,approved:isAdmin,is_admin:isAdmin},{onConflict:'id'});
  btn.disabled=false;btn.textContent='Create account';
}
async function signIn(){
  const email=document.getElementById('a-email').value.trim(),pw=document.getElementById('a-pw').value;
  const errEl=document.getElementById('a-err'),btn=document.getElementById('a-btn');
  errEl.textContent='';btn.disabled=true;btn.textContent='Signing in…';
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Request timed out — check your connection and try again.')),10000));
    const signIn=sb.auth.signInWithPassword({email,password:pw});
    const{error}=await Promise.race([signIn,timeout]);
    if(error){errEl.textContent=error.message;btn.disabled=false;btn.textContent='Sign in';}
  }catch(e){
    errEl.textContent=e.message||'Something went wrong. Try again.';
    btn.disabled=false;btn.textContent='Sign in';
  }
}
async function signOut(){await sb.auth.signOut();currentUser=null;currentProfile=null;resetAppState();}
async function loadProfile(uid){const{data}=await sb.from('wtd_profiles').select('*').eq('id',uid).maybeSingle();return data;}
function toggleAuthView(){authView=authView==='login'?'signup':'login';renderAuth();}

// ── ADMIN ──
async function loadAllProfiles(){const{data}=await sb.from('wtd_profiles').select('*').order('created_at',{ascending:false});return data||[];}
async function approveUser(id){await sb.from('wtd_profiles').update({approved:true}).eq('id',id);renderAdmin();}
async function removeUser(id){if(!confirm('Remove this user?'))return;await sb.from('wtd_profiles').delete().eq('id',id);renderAdmin();}
function setAdminView(v){adminView=v;renderAdmin();}

async function renderAdmin(){
  const profiles=await loadAllProfiles();
  const pending=profiles.filter(p=>!p.approved);
  const approved=profiles.filter(p=>p.approved&&p.id!==currentUser.id);
  const statsMap={};
  for(const p of approved){
    try{
      const r=await storage.get('wtd-history',p.id);
      if(r){const hist=JSON.parse(r.value),keys=Object.keys(hist).sort();
        const won=keys.filter(k=>hist[k].pct>=WIN).length;
        const lastDate=keys.length?new Date(keys[keys.length-1]):null;
        const daysSince=lastDate?Math.floor((new Date()-lastDate)/86400000):null;
        statsMap[p.id]={won,daysSince,todayPct:hist[todayKey()]?hist[todayKey()].pct:null};}
    }catch(e){}
  }
  const list=adminView==='pending'?pending:approved;
  let html=`<div class="top-bar"><span class="top-bar-email">${currentUser.email}</span><button class="top-bar-btn" onclick="switchToMyTracker()">My Tracker</button><button class="top-bar-btn" onclick="signOut()">Sign out</button></div>
  <div class="admin"><div style="margin-bottom:1.25rem"><div style="font-size:18px;font-weight:500;">${APP_NAME} — Admin</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">${profiles.length} total users</div></div>
  <div class="admin-tabs"><div class="admin-tab${adminView==='pending'?' active':''}" onclick="setAdminView('pending')">Pending (${pending.length})</div><div class="admin-tab${adminView==='approved'?' active':''}" onclick="setAdminView('approved')">Clients (${approved.length})</div></div>`;
  if(!list.length){html+=`<div class="no-users">No ${adminView==='pending'?'pending approvals':'clients'} yet.</div>`;}
  else if(adminView==='pending'){list.forEach(p=>{html+=`<div class="user-card"><div class="user-top"><div class="user-avatar">${p.email[0].toUpperCase()}</div><div style="flex:1"><div style="font-size:14px">${p.email}</div><div style="font-size:11px;color:var(--text3)">Requested ${new Date(p.created_at).toLocaleDateString()}</div></div></div><div class="user-actions"><button class="btn-sm btn-green" onclick="approveUser('${p.id}')">Approve</button><button class="btn-outline-red" onclick="removeUser('${p.id}')">Remove</button></div></div>`;});}
  else{list.forEach(p=>{const s=statsMap[p.id]||{};const lv=getLevel(s.won||0);const inactive=s.daysSince!==null&&s.daysSince>=2;const todayColor=s.todayPct!==null?statusColor(s.todayPct,false):'var(--text3)';html+=`<div class="user-card"><div class="user-top"><div class="user-avatar">${p.email[0].toUpperCase()}</div><div style="flex:1"><div style="font-size:14px">${p.email}</div><div style="font-size:11px;display:flex;align-items:center;gap:6px;margin-top:2px;"><span style="color:${lv.color};font-weight:500">${lv.icon} ${lv.name}</span>${inactive?`<span class="inactive-flag">Inactive ${s.daysSince}d</span>`:''}</div></div>${s.todayPct!==null?`<div style="font-size:15px;font-weight:500;color:${todayColor}">${Math.round(s.todayPct*100)}%</div>`:''}</div><div class="user-stats"><div class="user-stat"><div class="user-stat-val">${s.won||0}</div><div class="user-stat-lbl">Days won</div></div><div class="user-stat"><div class="user-stat-val" style="color:${todayColor}">${s.todayPct!==null?Math.round(s.todayPct*100)+'%':'—'}</div><div class="user-stat-lbl">Today</div></div><div class="user-stat"><div class="user-stat-val">${s.daysSince!==null?s.daysSince+'d':'—'}</div><div class="user-stat-lbl">Last active</div></div></div><div class="user-actions"><button class="btn-sm btn-green" onclick="viewClient('${p.id}','${p.email}')">View tracker</button><button class="top-bar-btn" onclick="openHabitBuilder('${p.id}','${p.email}')">Build habits</button><button class="top-bar-btn" onclick="openAssignActions('${p.id}','${p.email}')">Assign actions</button><button class="btn-outline-red" onclick="removeUser('${p.id}')">Remove</button></div></div>`;});}
  html+=`</div>`;document.getElementById('root').innerHTML=html;
}

async function viewClient(uid,email){adminClientId=uid;adminClientEmail=email;await loadAll(uid);const tasks=isRestDay?restTasks():allTasks();const tot=isRestDay?restTotal():total();const earned=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);prevWonState=earned/tot>=(isRestDay?restSettings.win/100:WIN);renderTracker();}
function switchToMyTracker(){adminClientId=null;adminClientEmail='';loadAll().then(()=>{render();});}
function openAssignActions(uid,email){showOv(`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal"><div class="modal-title">Assign action items</div><div class="modal-sub">For ${email} — one item per line.</div><textarea class="assign-area" id="assign-inp" placeholder="Read chapter 3&#10;Write your 90-day vision"></textarea><div class="modal-actions"><button class="btn-save" onclick="doAssignActions('${uid}')">Save</button><button class="btn-cancel" onclick="closeOv()">Cancel</button></div></div></div>`);}
async function doAssignActions(uid){const text=document.getElementById('assign-inp').value.trim();const items=text.split('\n').map(s=>s.trim()).filter(Boolean).map(s=>({text:s,done:false}));await storage.set('wtd-actions',JSON.stringify(items),uid);closeOv();alert('Action items saved!');}

// ── ACCOUNT MODAL ──
function openAccountModal(){
  showOv(`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal">
    <div class="modal-title">Account</div>
    <div class="modal-sub">${currentUser.email}</div>
    <div id="acc-msg" class="err" style="min-height:18px"></div>
    <label class="lbl">New password</label>
    <input class="inp" id="acc-pw1" type="password" placeholder="New password">
    <label class="lbl">Confirm new password</label>
    <input class="inp" id="acc-pw2" type="password" placeholder="Confirm password">
    <div class="modal-actions">
      <button class="btn-save" onclick="changePassword()">Update password</button>
      <button class="btn-cancel" onclick="closeOv()">Cancel</button>
    </div>
  </div></div>`);
  setTimeout(()=>document.getElementById('acc-pw1')?.focus(),50);
}
async function changePassword(){
  const pw1=document.getElementById('acc-pw1').value;
  const pw2=document.getElementById('acc-pw2').value;
  const msg=document.getElementById('acc-msg');
  if(!pw1||pw1.length<6){msg.textContent='Password must be at least 6 characters.';return;}
  if(pw1!==pw2){msg.textContent='Passwords don\'t match.';return;}
  msg.textContent='Updating…';msg.style.color='var(--text3)';
  const{error}=await sb.auth.updateUser({password:pw1});
  if(error){msg.textContent=error.message;msg.style.color='var(--red)';}
  else{msg.textContent='Password updated successfully.';msg.style.color='var(--green)';setTimeout(()=>closeOv(),1500);}
}

// ── ADMIN HABIT BUILDER ──
async function openHabitBuilder(uid,email){
  // Load client's current tasks first
  const r=await storage.get('wtd-tasks',uid);
  let clientTimed=DEFAULT_TIMED.map(t=>({...t}));
  let clientEssential=DEFAULT_ESSENTIAL.map(t=>({...t}));
  if(r){try{const s=JSON.parse(r.value);clientTimed=s.timed;clientEssential=s.essential;}catch(e){}}

  const renderHabitBuilder=(timed,essential)=>{
    const blocks=[...BLOCKS.map(b=>({label:b,tasks:timed.filter(t=>t.block===b),type:'timed'})),{label:"Daily Essentials",tasks:essential,type:'essential'}];
    let h=`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal" style="max-height:90vh;overflow-y:auto">
      <div class="modal-title">Build habits</div>
      <div class="modal-sub">Setting up stack for ${email}</div>
      <div style="margin-bottom:1rem">
        <div class="esec-label" style="margin-bottom:7px">Add task to block</div>
        <select class="block-sel" id="hb-block">${BLOCKS.map(b=>`<option value="timed:${b}">${b}</option>`).join('')}<option value="essential:Daily Essentials">Daily Essentials</option></select>
        <button class="btn-ghost" style="width:auto" onclick="hbAddTask('${uid}','${email}')">+ Add task</button>
      </div>`;
    blocks.forEach(({label,tasks,type})=>{
      if(!tasks.length)return;
      h+=`<div class="esec"><div class="esec-label">${label}</div>`;
      tasks.forEach(task=>{
        h+=`<div class="editor-row">
          <input class="e-inp" value="${task.name.replace(/"/g,'&quot;').replace(/'/g,"&#39;")}" onchange="hbUpdateTask(${task.id},'name',this.value,'${type}','${uid}','${email}')">
          <input class="e-pts" type="number" value="${task.points}" min="1" max="30" onchange="hbUpdateTask(${task.id},'points',parseInt(this.value)||1,'${type}','${uid}','${email}')">
          <select class="e-tier" onchange="hbUpdateTask(${task.id},'tier',this.value,'${type}','${uid}','${email}')">
            <option${task.tier==='S'?' selected':''}>S</option>
            <option${task.tier==='A'?' selected':''}>A</option>
            <option${task.tier==='B'?' selected':''}>B</option>
          </select>
          <button class="del-btn" onclick="hbDeleteTask(${task.id},'${type}','${uid}','${email}')">×</button>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`<div class="modal-actions">
      <button class="btn-save" onclick="hbSave('${uid}','${email}')">Save to client</button>
      <button class="btn-cancel" onclick="closeOv()">Cancel</button>
    </div></div></div>`;
    showOv(h);
  };

  // Store temp state for builder
  window._hbTimed=clientTimed;
  window._hbEssential=clientEssential;
  renderHabitBuilder(clientTimed,clientEssential);
  window._hbRender=renderHabitBuilder;
}

function hbUpdateTask(id,field,value,type,uid,email){
  const arr=type==='essential'?window._hbEssential:window._hbTimed;
  const task=arr.find(t=>t.id===id);if(task)task[field]=value;
}
function hbDeleteTask(id,type,uid,email){
  if(type==='essential')window._hbEssential=window._hbEssential.filter(t=>t.id!==id);
  else window._hbTimed=window._hbTimed.filter(t=>t.id!==id);
  window._hbRender(window._hbTimed,window._hbEssential);
}
function hbAddTask(uid,email){
  const val=document.getElementById('hb-block')?.value||'timed:Morning';
  const[type,block]=val.split(':');
  const newTask={id:Date.now(),name:"New task",points:5,tier:"B"};
  if(type==='essential')window._hbEssential.push(newTask);
  else{newTask.block=block;window._hbTimed.push(newTask);}

function getMissedPatterns(){
  const counts={};
  const d=new Date();
  for(let i=1;i<=14;i++){
    d.setDate(d.getDate()-1);
    const key=dateKey(d);
    const rec=allHistory[key];
    if(!rec)continue;
    const tasks=rec.restDay?restTasks():allTasks();
    tasks.forEach(t=>{
      if(!rec.checked||!rec.checked[t.id]){
        counts[t.id]=(counts[t.id]||{name:t.name,count:0});
        counts[t.id].count++;
      }
    });
  }
  return Object.values(counts).filter(x=>x.count>=3).sort((a,b)=>b.count-a.count).slice(0,4);
}

function calcStreak(){
  let streak=0;const d=new Date();
  while(true){
    const key=dateKey(d),rec=allHistory[key],w=rec&&rec.restDay?restSettings.win/100:WIN;
    if(rec&&rec.pct>=w)streak++;
    else if(key===todayKey()&&(!rec||rec.pct<w)){d.setDate(d.getDate()-1);continue;}
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function calcBestStreak(){let best=0,cur=0;Object.keys(allHistory).sort().forEach(k=>{const r=allHistory[k],w=r.restDay?restSettings.win/100:WIN;if(r.pct>=w){cur++;best=Math.max(best,cur);}else cur=0;});return best;}
function calcBestWeek(){const keys=Object.keys(allHistory).sort();let best=0;for(let i=0;i<keys.length;i++){const week=keys.slice(i,i+7).filter(k=>!allHistory[k].restDay);if(!week.length)continue;const avg=week.reduce((s,k)=>s+allHistory[k].pct,0)/week.length;best=Math.max(best,avg);}return best;}
