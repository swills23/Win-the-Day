        user_id:uid,date:dateStr,identity_statement:identityStatement||'',
        why_statement:whyStatement||'',rating:ir?.rating||0,note:ir?.note||''
      },{onConflict:'user_id,date'});
    }catch(e){console.warn('vault.logIdentity error:',e);}
  },
  async logGoals(){
    const uid=adminClientId||(currentUser&&currentUser.id);if(!uid)return;
    const rows=[];
    ['weekly','monthly','yearly'].forEach(type=>{
      (goals[type]||[]).forEach(g=>{
        rows.push({
          user_id:uid,goal_type:type,goal_text:g.text||g,
          priority:g.priority||'medium',completed:!!g.done,
          completed_at:g.done?new Date().toISOString():null,
          updated_at:new Date().toISOString()
        });
      });
    });
    if(!rows.length)return;
    try{
      // Delete old goals and re-insert current state
      await sb.from('wtd_goal_logs').delete().eq('user_id',uid);
      await sb.from('wtd_goal_logs').insert(rows);
    }catch(e){console.warn('vault.logGoals error:',e);}
  },
  async saveReportPrefs(weekly,monthly){
    const uid=currentUser&&currentUser.id;if(!uid)return;
    try{
      await sb.from('wtd_report_prefs').upsert({
        user_id:uid,weekly_email:!!weekly,monthly_email:!!monthly,
        email:currentUser.email||'',updated_at:new Date().toISOString()
      },{onConflict:'user_id'});
    }catch(e){console.warn('vault.saveReportPrefs error:',e);}
  }
};

async function signUp(){
  const email=document.getElementById('a-email').value.trim(),pw=document.getElementById('a-pw').value;
  const errEl=document.getElementById('a-err'),btn=document.getElementById('a-btn');
  errEl.textContent='';
  if(!pw||pw.length<8){errEl.textContent='Password must be at least 8 characters.';return;}
  if(!/[A-Z]/.test(pw)||!/[0-9]/.test(pw)){errEl.textContent='Password must include at least one uppercase letter and one number.';return;}
  btn.disabled=true;btn.textContent='Creating…';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){errEl.textContent=error.message;btn.disabled=false;btn.textContent='Create account';return;}
  // Profile created with is_admin:false, approved:false
  // The server-side trigger prevents privilege escalation
  // Admin status is managed via Supabase dashboard or by existing admin
  await sb.from('wtd_profiles').upsert({id:data.user.id,email,approved:false,is_admin:false},{onConflict:'id'});
  btn.disabled=false;btn.textContent='Create account';
}
async function signIn(){
  const email=document.getElementById('a-email').value.trim(),pw=document.getElementById('a-pw').value;
  const errEl=document.getElementById('a-err'),btn=document.getElementById('a-btn');
  errEl.textContent='';btn.disabled=true;btn.textContent='Signing in…';
  try{
    const timeout=new Promise((_, rej)=>setTimeout(()=>rej(new Error('Request timed out — check your connection and try again.')),30000));
    const{data,error}=await Promise.race([sb.auth.signInWithPassword({email,password:pw}),timeout]);
    if(error){errEl.textContent=error.message;btn.disabled=false;btn.textContent='Sign in';}
    else if(data?.user){currentUser=data.user;btn.textContent='Signed in…';setTimeout(()=>renderRoot(),0);}
  }catch(e){
    errEl.textContent=e.message||'Something went wrong. Try again.';
    btn.disabled=false;btn.textContent='Sign in';
  }
}

// ── ADMIN ANALYTICS DASHBOARD ──
async function renderAdminAnalytics(clients){
  if(!clients||!clients.length)return`<div style="padding:2rem;text-align:center;color:var(--text3)">No client data yet.</div>`;

  // Load all client histories in parallel
  const clientResults=await Promise.all(clients.map(async p=>{
    try{
      const [r,t]=await Promise.all([storage.get('wtd-history',p.id),storage.get('wtd-tasks',p.id)]);
      if(r){
        const hist=JSON.parse(r.value);
        const tasks=t?JSON.parse(t.value):null;
        return{id:p.id,email:p.email,hist,tasks};
      }
    }catch(e){}
    return null;
  }));
  const clientData=clientResults.filter(Boolean);

  if(!clientData.length)return`<div style="padding:2rem;text-align:center;color:var(--text3)">No client data yet.</div>`;

  // Calculate cross-client metrics
  const now=new Date();
  const last7=[];const last30=[];
  for(let i=0;i<30;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=dateKey(d);
    if(i<7)last7.push(k);
    last30.push(k);
  }

  // Alerts: clients who need attention
  let alerts=[];
  let totalWins7=0,totalDays7=0,totalWins30=0,totalDays30=0;
  let allTaskStats={};
  let moodData=[];
  let clientSummaries=[];

  clientData.forEach(c=>{
    const keys7=last7.filter(k=>c.hist[k]);
    const keys30=last30.filter(k=>c.hist[k]);
    const wins7=keys7.filter(k=>c.hist[k].pct>=WIN).length;
    const wins30=keys30.filter(k=>c.hist[k].pct>=WIN).length;
    const avg7=keys7.length?keys7.reduce((s,k)=>s+(c.hist[k].pct||0),0)/keys7.length:0;
    const avg30=keys30.length?keys30.reduce((s,k)=>s+(c.hist[k].pct||0),0)/keys30.length:0;
    totalWins7+=wins7;totalDays7+=keys7.length;
    totalWins30+=wins30;totalDays30+=keys30.length;

    // Find last active date
    const allKeys=Object.keys(c.hist).sort();
    const lastActive=allKeys.length?allKeys[allKeys.length-1]:null;
    const daysSince=lastActive?Math.floor((now-new Date(lastActive))/86400000):null;

    // Mood tracking
    keys30.forEach(k=>{if(c.hist[k].mood)moodData.push({mood:c.hist[k].mood,pct:c.hist[k].pct});});

    // Task-level stats across all clients
    keys30.forEach(k=>{
      const rec=c.hist[k];
      if(!rec.checked)return;
      const taskList=c.tasks?(rec.restDay?[]:[...(c.tasks.timed||[]),...(c.tasks.essential||[])]):[];
      taskList.forEach(t=>{
        const key=t.name;
        if(!allTaskStats[key])allTaskStats[key]={name:t.name,tier:t.tier||'B',done:0,total:0};
        allTaskStats[key].total++;
        if(rec.checked[t.id])allTaskStats[key].done++;
      });
    });

    clientSummaries.push({email:c.email,wins7,days7:keys7.length,avg7,wins30,days30:keys30.length,avg30,daysSince,id:c.id});

    // Alerts
    if(daysSince!==null&&daysSince>=3)alerts.push({email:c.email,type:'inactive',msg:`Inactive for ${daysSince} days`});
    else if(keys7.length>=3&&avg7<0.5)alerts.push({email:c.email,type:'struggling',msg:`Avg ${Math.round(avg7*100)}% this week`});
    else if(keys7.length>=2&&wins7===0)alerts.push({email:c.email,type:'no-wins',msg:`No wins this week (${keys7.length} days tracked)`});
  });

  // Sort task stats
  const tasksByCompletion=Object.values(allTaskStats).filter(t=>t.total>=3).sort((a,b)=>(a.done/a.total)-(b.done/b.total));
  const mostSkipped=tasksByCompletion.slice(0,5);
  const mostCompleted=tasksByCompletion.slice(-5).reverse();

  // Mood vs performance correlation
  const highMood=moodData.filter(m=>m.mood>=4);
  const lowMood=moodData.filter(m=>m.mood<=2);
  const highMoodAvg=highMood.length?highMood.reduce((s,m)=>s+m.pct,0)/highMood.length:0;
  const lowMoodAvg=lowMood.length?lowMood.reduce((s,m)=>s+m.pct,0)/lowMood.length:0;

  // Build HTML
  let h=`<div class="analytics-section">`;

  // Alerts
  if(alerts.length){
    h+=`<div class="analytics-title">Needs Attention</div>`;
    alerts.forEach(a=>{
      h+=`<div class="client-alert"><span style="font-weight:500">${a.email.split('@')[0]}</span> <span style="color:var(--text3)">—</span> ${a.msg}</div>`;
    });
  }

  // Overview cards
  h+=`<div class="analytics-title" style="margin-top:${alerts.length?'1.25rem':'0'}">Overview — Last 7 Days</div>`;
  const overallWinRate7=totalDays7?Math.round(totalWins7/totalDays7*100):0;
  h+=`<div class="analytics-grid">
    <div class="analytics-card"><div class="analytics-card-val">${clientData.length}</div><div class="analytics-card-lbl">Active Clients</div></div>
    <div class="analytics-card"><div class="analytics-card-val" style="color:${overallWinRate7>=60?'var(--green)':overallWinRate7>=40?'var(--orange)':'var(--red)'}">${overallWinRate7}%</div><div class="analytics-card-lbl">Win Rate</div><div class="analytics-card-sub">${totalWins7} wins / ${totalDays7} tracked days</div></div>
  </div>`;

  // Client breakdown
  h+=`<div class="analytics-title">Client Performance — 7 Day</div>`;
  clientSummaries.sort((a,b)=>b.avg7-a.avg7);
  clientSummaries.forEach(c=>{
    const pct7=Math.round(c.avg7*100);
    const color=pct7>=72?'var(--green)':pct7>=50?'var(--orange)':'var(--red)';
    h+=`<div class="analytics-row">
      <div style="flex:1">
        <div style="font-weight:500">${c.email.split('@')[0]}</div>
        <div class="analytics-bar" style="width:120px"><div class="analytics-bar-fill" style="width:${pct7}%;background:${color}"></div></div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:500;color:${color}">${pct7}%</div>
        <div style="font-size:10px;color:var(--text3)">${c.wins7}/${c.days7} won</div>
      </div>
    </div>`;
  });

  // Most skipped tasks (cross-client)
  if(mostSkipped.length){
    h+=`<div class="analytics-title" style="margin-top:1.25rem">Most Skipped Tasks (All Clients)</div>`;
    mostSkipped.forEach(t=>{
      const rate=Math.round((1-t.done/t.total)*100);
      const color=rate>=60?'var(--red)':rate>=40?'var(--orange)':'var(--text3)';
      h+=`<div class="analytics-row">
        <div>${t.name} <span style="font-size:10px;color:${t.tier==='S'?'var(--orange)':t.tier==='A'?'var(--blue)':'var(--text3)'}">${t.tier}</span></div>
        <div style="font-weight:500;color:${color}">${rate}% missed</div>
      </div>`;
    });
  }

  // Most completed tasks
  if(mostCompleted.length){
    h+=`<div class="analytics-title" style="margin-top:1.25rem">Strongest Habits (All Clients)</div>`;
    mostCompleted.forEach(t=>{
      const rate=Math.round(t.done/t.total*100);
      h+=`<div class="analytics-row">
        <div>${t.name} <span style="font-size:10px;color:${t.tier==='S'?'var(--orange)':t.tier==='A'?'var(--blue)':'var(--text3)'}">${t.tier}</span></div>
        <div style="font-weight:500;color:var(--green)">${rate}% done</div>
      </div>`;
    });
  }

  // Mood vs Performance
  if(moodData.length>=5){
    h+=`<div class="analytics-title" style="margin-top:1.25rem">Mood vs Performance</div>`;
    h+=`<div class="analytics-grid">
      <div class="analytics-card${highMoodAvg>lowMoodAvg?' highlight':''}"><div class="analytics-card-val" style="color:var(--green)">${Math.round(highMoodAvg*100)}%</div><div class="analytics-card-lbl">Avg score when mood 4-5</div><div class="analytics-card-sub">${highMood.length} days</div></div>
      <div class="analytics-card${lowMoodAvg>highMoodAvg?' warn':''}"><div class="analytics-card-val" style="color:var(--red)">${Math.round(lowMoodAvg*100)}%</div><div class="analytics-card-lbl">Avg score when mood 1-2</div><div class="analytics-card-sub">${lowMood.length} days</div></div>
    </div>`;
  }

  // 30-day trend
  h+=`<div class="analytics-title" style="margin-top:1.25rem">30-Day Trend</div>`;
  const overallWinRate30=totalDays30?Math.round(totalWins30/totalDays30*100):0;
  h+=`<div class="analytics-grid">
    <div class="analytics-card"><div class="analytics-card-val">${overallWinRate30}%</div><div class="analytics-card-lbl">Win Rate (30d)</div><div class="analytics-card-sub">${totalWins30} wins / ${totalDays30} days</div></div>
    <div class="analytics-card"><div class="analytics-card-val">${moodData.length?Math.round(moodData.reduce((s,m)=>s+m.mood,0)/moodData.length*10)/10:'—'}</div><div class="analytics-card-lbl">Avg Mood (30d)</div><div class="analytics-card-sub">${moodData.length} ratings</div></div>
  </div>`;

  h+=`</div>`;
  return h;
}

let contentSubView='performance';
let igMedia=[];let igInsights={};let igScripts=[];
let igAnalysis=null;let igSyncing=false;let igAnalyzing=false;let igGenerating=false;

const EDGE_URL=SUPABASE_URL+'/functions/v1';

async function loadIgMedia(){
  const{data}=await sb.from('ig_media').select('*').eq('owner_id',currentUser.id).order('timestamp',{ascending:false}).limit(100);
  igMedia=data||[];
  // Load latest insights per media
  if(igMedia.length){
    const ids=igMedia.map(m=>m.ig_media_id);
    const{data:ins}=await sb.from('ig_insights').select('*').eq('owner_id',currentUser.id).in('ig_media_id',ids).order('synced_at',{ascending:false});
    igInsights={};
    (ins||[]).forEach(i=>{if(!igInsights[i.ig_media_id])igInsights[i.ig_media_id]=i;});
  }
}

async function loadIgScripts(){
  const{data}=await sb.from('ig_scripts').select('*').eq('owner_id',currentUser.id).order('created_at',{ascending:false});
  igScripts=data||[];
}

async function syncInstagram(mode){if(!_isAdmin())return;
  igSyncing=true;renderAdmin();
  try{
    const{data:{session}}=await sb.auth.getSession();
    const res=await fetch(EDGE_URL+'/ig-sync',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify({mode:mode||'recent',owner_id:currentUser.id})});
    const result=await res.json();
    if(result.error){toast('Sync error: '+result.error);return;}
    await storage.set('ig-last-sync',new Date().toISOString());
    toast(`Synced ${result.synced} of ${result.total} posts.${result.tokenWarning?' ⚠️ '+result.tokenWarning:''}`);
    await loadIgMedia();
  }catch(e){toast('Sync failed: '+e.message);}
  finally{igSyncing=false;renderAdmin();}
}

async function runContentAnalysis(){if(!_isAdmin())return;
  igAnalyzing=true;renderAdmin();
  try{
    const{data:{session}}=await sb.auth.getSession();
    const res=await fetch(EDGE_URL+'/ig-analyze',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify({action:'analyze',owner_id:currentUser.id})});
    const result=await res.json();
    if(result.error){toast('Analysis error: '+result.error);return;}
    igAnalysis=result.analysis;
  }catch(e){toast('Analysis failed: '+e.message);}
  finally{igAnalyzing=false;renderAdmin();}
}

async function generateScripts(topic,format,count){if(!_isAdmin())return;
  igGenerating=true;renderAdmin();
  try{
    const{data:{session}}=await sb.auth.getSession();
    const res=await fetch(EDGE_URL+'/ig-analyze',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},body:JSON.stringify({action:'generate',owner_id:currentUser.id,topic:topic||'',format:format||'drawing_video',count:count||3})});

}

async function updateScriptStatus(id,status){
  await sb.from('ig_scripts').update({status,updated_at:new Date().toISOString()}).eq('id',id);
  await loadIgScripts();renderAdmin();
}

async function deleteScript(id){
  await sb.from('ig_scripts').delete().eq('id',id);

}

function copyScript(text){

function renderContentPerformance(){
  if(!igMedia.length)return`<div style="text-align:center;padding:2rem;color:var(--text3)"><div style="font-size:36px;margin-bottom:10px">📊</div><div style="font-size:14px">No Instagram data yet</div><div style="font-size:12px;margin-top:6px">Go to Settings → connect your Instagram → Sync Now</div></div>`;

  // Compute overview stats
  let totalPosts=igMedia.length,totalEng=0,totalSave=0,totalShare=0,withInsights=0;
  const formatStats={};
  const postsWithData=[];

  igMedia.forEach(m=>{
    const ins=igInsights[m.ig_media_id];
    if(!ins)return;
    withInsights++;
    totalEng+=Number(ins.engagement_rate)||0;
    totalSave+=Number(ins.save_rate)||0;
    totalShare+=Number(ins.share_rate)||0;
    const fmt=m.content_format||'post';
    if(!formatStats[fmt])formatStats[fmt]={count:0,eng:0,saves:0,shares:0,views:0};
    formatStats[fmt].count++;
    formatStats[fmt].eng+=Number(ins.engagement_rate)||0;
    formatStats[fmt].saves+=Number(ins.saves)||0;
    formatStats[fmt].shares+=Number(ins.shares)||0;
    formatStats[fmt].views+=Number(ins.views)||0;
    postsWithData.push({...m,...ins});
  });

  const avgEng=withInsights?totalEng/withInsights:0;
  const avgSave=withInsights?totalSave/withInsights:0;
  const avgShare=withInsights?totalShare/withInsights:0;

  postsWithData.sort((a,b)=>(Number(b.engagement_rate)||0)-(Number(a.engagement_rate)||0));

  let h=`<div class="analytics-grid">
    <div class="analytics-card"><div class="analytics-card-val">${totalPosts}</div><div class="analytics-card-lbl">Total Posts</div></div>
    <div class="analytics-card"><div class="analytics-card-val" style="color:var(--blue)">${(avgEng*100).toFixed(1)}%</div><div class="analytics-card-lbl">Avg Engagement</div></div>
    <div class="analytics-card"><div class="analytics-card-val" style="color:var(--orange)">${(avgSave*100).toFixed(2)}%</div><div class="analytics-card-lbl">Avg Save Rate</div></div>
    <div class="analytics-card"><div class="analytics-card-val" style="color:var(--green)">${(avgShare*100).toFixed(2)}%</div><div class="analytics-card-lbl">Avg Share Rate</div></div>
  </div>`;

  // Format comparison
  const formats=Object.entries(formatStats);
  if(formats.length){
    h+=`<div class="analytics-title" style="margin-top:1rem">Format Breakdown</div>`;
    formats.sort((a,b)=>(b[1].eng/b[1].count)-(a[1].eng/a[1].count));
    formats.forEach(([fmt,s])=>{
      const avgE=s.count?(s.eng/s.count*100).toFixed(1):0;
      h+=`<div class="analytics-row">
        <div style="flex:1"><span class="ig-format-badge ${fmt}">${fmt.replace('_',' ')}</span> <span style="font-size:11px;color:var(--text3)">${s.count} posts</span></div>
        <div style="text-align:right"><span style="font-weight:500">${avgE}% eng</span> <span style="font-size:11px;color:var(--text3);margin-left:6px">${s.saves} saves · ${s.shares} shares</span></div>
      </div>`;
    });
  }

  // Top 5 posts
  h+=`<div class="analytics-title" style="margin-top:1.25rem">Top Posts by Engagement</div>`;
  postsWithData.slice(0,5).forEach((p,i)=>{
    h+=`<div class="ig-post-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:var(--text3)">#${i+1}</span>
        <span class="ig-format-badge ${p.content_format||'post'}">${(p.content_format||'post').replace('_',' ')}</span>
        <span style="font-size:11px;color:var(--text3)">${p.timestamp?new Date(p.timestamp).toLocaleDateString():''}</span>
        ${p.permalink?`<a href="${p.permalink}" target="_blank" style="font-size:11px;color:var(--blue);margin-left:auto">↗ View</a>`:''}
      </div>
      <div class="ig-post-hook">${p.hook_text||'(no caption)'}</div>
      <div class="ig-post-metrics">
        <span>👁 <span class="val">${(p.views||0).toLocaleString()}</span></span>
        <span>❤️ <span class="val">${p.likes||0}</span></span>
        <span>💬 <span class="val">${p.comments||0}</span></span>
        <span>🔖 <span class="val">${p.saves||0}</span></span>
        <span>↗️ <span class="val">${p.shares||0}</span></span>
        <span>📈 <span class="val">${((Number(p.engagement_rate)||0)*100).toFixed(1)}%</span></span>
      </div>
    </div>`;
  });

  // AI Analysis section
  h+=`<div class="analytics-title" style="margin-top:1.25rem">AI Analysis</div>`;
  if(igAnalyzing){
    h+=`<div class="ig-loading">🤖 Analyzing your content...</div>`;
  }else{
    h+=`<button class="btn-primary" style="width:auto;padding:8px 20px;margin-bottom:1rem" onclick="runContentAnalysis()">Run AI Analysis</button>`;
    if(igAnalysis&&!igAnalysis.raw){
      // Patterns
      if(igAnalysis.top_patterns?.length){
        h+=`<div class="ig-analysis-card"><h4>Top Patterns</h4><ul>`;
        igAnalysis.top_patterns.forEach(p=>{h+=`<li><strong>${p.pattern}</strong><br>${p.evidence}<br><span style="color:var(--blue)">${p.recommendation}</span></li>`;});
        h+=`</ul></div>`;
      }
      // Hook analysis
      if(igAnalysis.hook_analysis){
        const ha=igAnalysis.hook_analysis;
        h+=`<div class="ig-analysis-card"><h4>Hook Formula</h4><div style="font-size:14px;font-weight:500;color:var(--blue);margin-bottom:8px">${ha.formula||''}</div>`;
        if(ha.winning_hooks?.length){h+=`<div style="font-size:12px;color:var(--text3);margin-bottom:4px">WINNING HOOKS:</div><ul>`;ha.winning_hooks.forEach(h2=>{h+=`<li style="color:var(--green)">${h2}</li>`;});h+=`</ul>`;}
        h+=`</div>`;
      }
      // Action items
      if(igAnalysis.action_items?.length){
        h+=`<div class="ig-analysis-card" style="border-left:3px solid var(--blue)"><h4>Action Items</h4><ul>`;
        igAnalysis.action_items.forEach((a,i)=>{h+=`<li><strong>${i+1}.</strong> ${a}</li>`;});
        h+=`</ul></div>`;
      }
      // Content to leads
      if(igAnalysis.content_to_leads?.insight){
        h+=`<div class="ig-analysis-card"><h4>Content → Leads</h4><div style="font-size:13px;color:var(--text2)">${igAnalysis.content_to_leads.insight}</div>${igAnalysis.content_to_leads.best_format_for_dms?`<div style="margin-top:6px;font-size:12px;color:var(--green)">Best format for DMs: ${igAnalysis.content_to_leads.best_format_for_dms}</div>`:''}</div>`;
      }
    }else if(igAnalysis?.raw){
      h+=`<div class="ig-analysis-card"><div style="font-size:13px;white-space:pre-line">${igAnalysis.raw}</div></div>`;
    }
  }

  return h;
}

// ── FILES MANAGEMENT ──
const FILE_CATEGORIES=['general','onboarding','protocol','resource'];
const FILE_ICONS={'pdf':'📄','doc':'📝','docx':'📝','xls':'📊','xlsx':'📊','ppt':'📊','pptx':'📊','jpg':'🖼','jpeg':'🖼','png':'🖼','gif':'🖼','mp4':'🎬','mov':'🎬','mp3':'🎵','zip':'📦','default':'📎'};
function fileIcon(name){const ext=(name||'').split('.').pop().toLowerCase();return FILE_ICONS[ext]||FILE_ICONS.default;}
function fileSize(bytes){if(!bytes)return'';if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';return(bytes/1048576).toFixed(1)+'MB';}

// Load all files (admin)
async function loadFiles(){
  const{data}=await sb.from('wtd_files').select('*').order('created_at',{ascending:false});
  return data||[];
}

// Load assignments for a file
async function loadFileAssignments(fileId){
  const{data}=await sb.from('wtd_file_assignments').select('user_id').eq('file_id',fileId);
  return(data||[]).map(a=>a.user_id);
}

// Load files assigned to current user (client view)
async function loadMyFiles(){
  const uid=currentUser&&currentUser.id;if(!uid)return[];
  const{data}=await sb.from('wtd_file_assignments').select('file_id').eq('user_id',uid);
  if(!data||!data.length)return[];
  const fileIds=data.map(a=>a.file_id);
  const{data:files}=await sb.from('wtd_files').select('*').in('id',fileIds).order('category').order('name');
  return files||[];
}

// Upload file to Supabase Storage
async function uploadFile(file){
  const path=`${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  const{data,error}=await sb.storage.from('client-files').upload(path,file);
  if(error){toast('Upload failed: '+error.message);return null;}
  const{data:urlData}=sb.storage.from('client-files').getPublicUrl(path);
  return{path,url:urlData.publicUrl,size:file.size,type:file.name.split('.').pop().toLowerCase()};
}

// Save file record
async function saveFileRecord(name,category,url,fileType,fileSize){
  const{data,error}=await sb.from('wtd_files').insert({
    name,category:category||'general',url,file_type:fileType||'',file_size:fileSize||0,
    uploaded_by:currentUser.id
  }).select().single();
  if(error){toast('Error saving file: '+error.message);return null;}
  return data;
}

// Toggle file assignment for a client
async function toggleFileAssignment(fileId,userId,assigned){
  if(assigned){
    await sb.from('wtd_file_assignments').delete().eq('file_id',fileId).eq('user_id',userId);
  }else{
    await sb.from('wtd_file_assignments').insert({file_id:fileId,user_id:userId,assigned_by:currentUser.id});
  }
}

// Delete file
async function deleteFile(fileId,storagePath){
  await sb.from('wtd_file_assignments').delete().eq('file_id',fileId);
  await sb.from('wtd_files').delete().eq('id',fileId);
  if(storagePath)await sb.storage.from('client-files').remove([storagePath]);
  renderAdmin();
}

async function renderAdminFiles(clients){
  const files=await loadFiles();
  let h=`<div style="margin-top:0.5rem">`;

  // Upload zone
  h+=`<div class="file-upload-zone" id="file-drop-zone" onclick="document.getElementById('file-input').click()">
    <div style="font-size:28px;margin-bottom:6px">📁</div>
    <div style="font-size:13px;color:var(--text2)">Click to upload or drag files here</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">PDFs, docs, images, videos — any file type</div>

  if(!files.length){
    h+=`<div class="no-users">No files uploaded yet. Upload files above to share with clients.</div>`;
  }else{
    // Group by category
    const grouped={};
    files.forEach(f=>{
      const cat=f.category||'general';
      if(!grouped[cat])grouped[cat]=[];
      grouped[cat].push(f);
    });

    for(const cat of FILE_CATEGORIES){
      if(!grouped[cat]||!grouped[cat].length)continue;
      h+=`<div style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:1rem 0 .5rem;font-weight:500">${cat}</div>`;
      grouped[cat].forEach(f=>{
        h+=`<div class="file-card">

          <div class="file-info">

            <div class="file-meta">${fileSize(f.file_size)} · ${new Date(f.created_at).toLocaleDateString()}</div>
          </div>
          <div class="file-actions">
            <button class="btn-sm" style="background:var(--bg);border:.5px solid var(--border);color:var(--text2)" onclick="openFileAssigner('${esc(f.id)}','${esc(f.name)}')">👥 Assign</button>
            <button class="btn-sm" style="background:var(--bg);border:.5px solid var(--border);color:var(--text2)" onclick="openFileCategoryEditor('${escAttr(f.id)}','${escAttr(f.category||'general')}')">🏷</button>
            <a href="${f.url}" target="_blank" class="btn-sm" style="background:var(--bg);border:.5px solid var(--border);color:var(--blue);text-decoration:none">↗</a>
            <button class="btn-sm" style="background:none;color:var(--red);border:.5px solid var(--red)" onclick="confirmDialog('Delete this file?').then(ok=>ok&&deleteFile('${escAttr(f.id)}','${escAttr((f.url||'').split('/').pop())}'))">✕</button>
          </div>
        </div>`;
      });
    }
  }

  h+=`</div>`;

  // Add drag/drop setup after render (guard against re-adding)
  setTimeout(()=>{
    const zone=document.getElementById('file-drop-zone');
    if(!zone||zone._dragReady)return;
    zone._dragReady=true;
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover');},{passive:false});
    zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
    zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');handleFileUpload(e.dataTransfer.files);},{passive:false});
  },50);

  return h;
}

// Handle file upload
const ALLOWED_FILE_TYPES=['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv','jpg','jpeg','png','gif','webp','mp4','mp3','wav','zip'];
const MAX_FILE_SIZE=25*1024*1024; // 25MB
async function handleFileUpload(fileList){
  if(!fileList||!fileList.length)return;
  const zone=document.getElementById('file-drop-zone');
  for(const file of fileList){
    const ext=file.name.split('.').pop().toLowerCase();
    if(!ALLOWED_FILE_TYPES.includes(ext)){alert(`File type ".${ext}" not allowed. Allowed: ${ALLOWED_FILE_TYPES.join(', ')}`);continue;}
    if(file.size>MAX_FILE_SIZE){alert(`File "${file.name}" exceeds 25MB limit.`);continue;}
  }
  if(zone)zone.innerHTML=`<div style="font-size:13px;color:var(--text3)">Uploading ${fileList.length} file${fileList.length>1?'s':''}...</div>`;
  for(const file of fileList){
    const ext=file.name.split('.').pop().toLowerCase();
    if(!ALLOWED_FILE_TYPES.includes(ext)||file.size>MAX_FILE_SIZE)continue;
    const result=await uploadFile(file);
    if(result){
      await saveFileRecord(file.name,'general',result.url,result.type,result.size);
    }
  }
  renderAdmin();
}

// ── REALTIME: auto-update when webhook creates leads ──
function subscribeToPipelineChanges(){
  if(pipelineChannel)return; // already subscribed
  pipelineChannel=sb.channel('pipeline-live')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'pipeline_leads',filter:'owner_id=eq.'+currentUser.id},payload=>{
      const d=payload.new;
      if(!pipelineLeads.find(l=>l.id===d.id)){
        if(d.dm_date&&d.dm_date.includes('T'))d.dm_date=d.dm_date.split('T')[0];
        if(d.booked_date&&d.booked_date.includes('T'))d.booked_date=d.booked_date.split('T')[0];
        if(!Array.isArray(d.followups))d.followups=[];
        if(!Array.isArray(d.mc_tags))d.mc_tags=[];
        if(!Array.isArray(d.objection_categories))d.objection_categories=[];
        pipelineLeads.unshift(d);
        if(adminView==='pipeline')renderAdmin();
      }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'pipeline_leads',filter:'owner_id=eq.'+currentUser.id},payload=>{
      const d=payload.new;
      const idx=pipelineLeads.findIndex(l=>l.id===d.id);
      if(idx>=0){
        if(d.dm_date&&d.dm_date.includes('T'))d.dm_date=d.dm_date.split('T')[0];
        if(d.booked_date&&d.booked_date.includes('T'))d.booked_date=d.booked_date.split('T')[0];
        if(!Array.isArray(d.followups))d.followups=[];
        pipelineLeads[idx]=d;
        if(adminView==='pipeline')renderAdmin();
      }
    })
    .subscribe();
}

// ── MANYCHAT BULK SYNC (alphabet crawl) ──
async function mcBulkSync(){
  if(!mcApiKey){toast('Add your ManyChat API key first.');return;}
  if(mcSyncRunning){toast('Sync already running.');return;}
  mcSyncRunning=true;
  const statusEl=document.getElementById('mc-sync-status');
  if(statusEl)statusEl.innerHTML='<span style="color:var(--blue)">Syncing… discovering subscribers…</span>';

  try{
    // Crawl A-Z + common short names to discover all subscribers
    const letters='abcdefghijklmnopqrstuvwxyz'.split('');
    const allSubs=new Map(); // subscriber_id -> subscriber data
    let searched=0;

    for(const letter of letters){
      searched++;
      if(statusEl)statusEl.innerHTML=`<span style="color:var(--blue)">Scanning "${letter.toUpperCase()}"… (${searched}/26) — ${allSubs.size} found</span>`;
      try{
        const results=await mcSearchByName(letter);
        results.forEach(s=>{if(s.id)allSubs.set(String(s.id),s);});
      }catch(e){/* skip failed letter */}
      // Respect rate limits: 100 req/sec — but be conservative
      await new Promise(r=>setTimeout(r,150));
    }

    if(statusEl)statusEl.innerHTML=`<span style="color:var(--blue)">Found ${allSubs.size} subscribers. Importing…</span>`;

    // Import each subscriber that isn't already in pipeline
    const existingMcIds=new Set(pipelineLeads.map(l=>String(l.mc_subscriber_id)).filter(Boolean));
    let imported=0,updated=0,skipped=0;

    for(const[subId,sub] of allSubs){
      if(existingMcIds.has(subId)){
        // Update existing lead with fresh tags/email
        const existing=pipelineLeads.find(l=>String(l.mc_subscriber_id)===subId);
        if(existing){
          await updatePipelineLead(existing.id,{
            mc_tags:sub.tags||[],
            mc_email:sub.email||existing.mc_email,
            ig_handle:sub.ig_username||existing.ig_handle
          });
          updated++;
        }
        continue;
      }

      // Create new lead from subscriber
      await addPipelineLead({
        name:sub.name||'Unknown',
        ig_handle:sub.ig_username||'',
        lead_source:'dm_first',
        source_keyword:'',
        dm_date:sub.subscribed?new Date(sub.subscribed).toISOString().split('T')[0]:todayKey(),
        status:'new',
        lead_quality:'warm',
        mc_subscriber_id:String(sub.id),
        mc_tags:sub.tags||[],
        mc_email:sub.email||'',
        mc_source:'sync'
      });
      imported++;
      existingMcIds.add(subId);

      // Rate limit: insert calls
      if(imported%5===0)await new Promise(r=>setTimeout(r,100));
      if(statusEl&&imported%10===0)statusEl.innerHTML=`<span style="color:var(--blue)">Importing… ${imported} new, ${updated} updated</span>`;
    }

    if(statusEl)statusEl.innerHTML=`<span style="color:var(--green)">Sync complete: ${imported} new leads, ${updated} updated, ${allSubs.size} total subscribers scanned</span>`;
    renderAdmin();
  }catch(e){
    if(statusEl)statusEl.innerHTML=`<span style="color:var(--red)">Sync failed: ${esc(e.message)}</span>`;
  }finally{
    mcSyncRunning=false;
  }
}
function getPipelineStats(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const thisMonth=pipelineLeads.filter(l=>{const d=new Date(l.dm_date);return d.getFullYear()===y&&d.getMonth()===m;});
  const total=thisMonth.length;
  const booked=thisMonth.filter(l=>['booked','completed_call','closed_won','closed_lost'].includes(l.status)).length;
  const closed=thisMonth.filter(l=>l.status==='closed_won').length;
  const closedOrLost=thisMonth.filter(l=>['closed_won','closed_lost'].includes(l.status)).length;
  const dmToBooked=total>0?Math.round(booked/total*100):0;
  const bookedToClosed=closedOrLost>0?Math.round(closed/closedOrLost*100):0;
  const bySource={};pipelineLeads.forEach(l=>{const k=l.source_keyword||'Unknown';bySource[k]=(bySource[k]||0)+1;});
  return{total,dmToBooked,bookedToClosed,bySource};
}
function getFilteredLeads(){
  let leads=[...pipelineLeads];

  if(pipelineFilters.source!=='all')leads=leads.filter(l=>l.source_keyword===pipelineFilters.source);

}

// ── STALE LEAD DETECTION ──
function getStaleLeads(){
  const now=Date.now(),cutoff=STALE_DAYS*24*60*60*1000;
  const activeStatuses=['new','in_conversation','booked'];
  return pipelineLeads.filter(l=>{
    if(!activeStatuses.includes(l.status))return false;
    const lastTouch=new Date(l.updated_at||l.created_at).getTime();
    return(now-lastTouch)>cutoff;
  });
}
function staleDays(l){return Math.floor((Date.now()-new Date(l.updated_at||l.created_at).getTime())/(24*60*60*1000));}

// ── RESPONSE TIME ──
function getResponseTime(l){
  if(!l.dm_date||!l.first_reply_at)return null;
  const dm=new Date(l.dm_date+'T00:00:00').getTime(),reply=new Date(l.first_reply_at).getTime();
  if(reply<=dm)return null;
  const hrs=Math.round((reply-dm)/(1000*60*60));
  return hrs;
}
function fmtResponseTime(hrs){
  if(hrs===null)return'';
  if(hrs<1)return'<1h';
  if(hrs<24)return hrs+'h';
  return Math.round(hrs/24)+'d';
}
function avgResponseTime(){
  const times=pipelineLeads.map(getResponseTime).filter(t=>t!==null);
  if(!times.length)return null;
  return Math.round(times.reduce((a,b)=>a+b,0)/times.length);
}

// ── LEAD SCORING ──
function calcLeadScore(l){
  let score=50;
  // Quality bonus
  if(l.lead_quality==='hot')score+=25;
  else if(l.lead_quality==='warm')score+=10;
  else if(l.lead_quality==='cold')score-=10;
  // Engagement: has notes = engaged setter convo
  if(l.setter_notes&&l.setter_notes.length>20)score+=10;
  // Objections noted (means deeper convo happened)
  if(l.objections&&l.objections.length>10)score+=5;
  // Response time: fast reply = higher intent
  const rt=getResponseTime(l);
  if(rt!==null){if(rt<=2)score+=15;else if(rt<=12)score+=8;else if(rt>48)score-=10;}
  // Recency: recent leads score higher
  const age=Math.floor((Date.now()-new Date(l.dm_date+'T00:00:00').getTime())/(24*60*60*1000));
  if(age<=2)score+=10;else if(age>14)score-=15;
  // Status progression
  if(l.status==='booked')score+=20;
  else if(l.status==='in_conversation')score+=5;
  // Touchpoints: more pre-DM engagement = warmer lead
  const tp=l.touchpoints||0;
  if(tp>=5)score+=15;else if(tp>=3)score+=8;else if(tp>=1)score+=3;
  // Lead source: referrals convert highest
  if(l.lead_source==='referral')score+=12;
  else if(l.lead_source==='dm_first')score+=8;
  else if(l.lead_source==='story_reply')score+=5;
  // Follow-up responsiveness
  const fups=l.followups||[];
  if(fups.length&&fups.some(f=>f.got_response))score+=8;
  else if(fups.length>=3&&!fups.some(f=>f.got_response))score-=10;
  // Stale penalty
  if(getStaleLeads().find(s=>s.id===l.id))score-=15;
  return Math.max(0,Math.min(100,score));
}
function scoreGrade(s){if(s>=75)return'A';if(s>=55)return'B';if(s>=35)return'C';return'D';}

}

// ── TIME TO BOOK ──
function calcTimeToBook(l){
  if(!l.dm_date||!l.booked_date)return null;
  const dm=new Date(l.dm_date+'T00:00:00').getTime(),bk=new Date(l.booked_date+'T00:00:00').getTime();
  if(bk<=dm)return null;
  return Math.round((bk-dm)/(24*60*60*1000));
}
function avgTimeToBook(){
  const times=pipelineLeads.map(calcTimeToBook).filter(t=>t!==null);
  if(!times.length)return null;
  return Math.round(times.reduce((a,b)=>a+b,0)/times.length);
}

// ── SHOW RATE ──
function getShowRate(){
  const bookedOrBeyond=pipelineLeads.filter(l=>['no_show','completed_call','closed_won','closed_lost'].includes(l.status));
  if(!bookedOrBeyond.length)return null;
  const showed=bookedOrBeyond.filter(l=>l.status!=='no_show').length;
  return Math.round(showed/bookedOrBeyond.length*100);
}

// ── FOLLOW-UP HELPERS ──
async function addFollowup(leadId,message){
  const lead=pipelineLeads.find(l=>l.id===leadId);if(!lead)return;
  if(!lead.followups)lead.followups=[];
  lead.followups.push({date:new Date().toISOString(),message:message||'Follow-up sent',got_response:false});
  await updatePipelineLead(leadId,{followups:lead.followups});
}
async function toggleFollowupResponse(leadId,idx){
  const lead=pipelineLeads.find(l=>l.id===leadId);if(!lead||!lead.followups||!lead.followups[idx])return;
  lead.followups[idx].got_response=!lead.followups[idx].got_response;
  await updatePipelineLead(leadId,{followups:lead.followups});
}
function getFollowupStats(){
  let total=0,responded=0;
  pipelineLeads.forEach(l=>{(l.followups||[]).forEach(f=>{total++;if(f.got_response)responded++;});});
  return{total,responded,rate:total?Math.round(responded/total*100):0};
}

// ── OBJECTION ANALYTICS ──
function getObjectionBreakdown(){
  const counts={};
  pipelineLeads.forEach(l=>{
    (l.objection_categories||[]).forEach(c=>{counts[c]=(counts[c]||0)+1;});
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
}

// ── LEAD SOURCE ANALYTICS ──
function getLeadSourceStats(){
  const stats={};
  pipelineLeads.forEach(l=>{
    const src=l.lead_source||'unknown';
    if(!stats[src])stats[src]={total:0,booked:0,closed:0};
    stats[src].total++;
    if(['booked','no_show','completed_call','closed_won','closed_lost'].includes(l.status))stats[src].booked++;
    if(l.status==='closed_won')stats[src].closed++;
  });
  return Object.entries(stats).sort((a,b)=>b[1].total-a[1].total);
}

// ── FUNNEL VIZ ──
function getFunnelData(){
  const total=pipelineLeads.length;
  if(!total)return[];
  const bookedPlus=['booked','no_show','completed_call','closed_won','closed_lost'];
  const showedPlus=['completed_call','closed_won','closed_lost'];
  const stages=[
    {key:'total',label:'Total leads',count:total},
    {key:'in_conversation',label:'In Conversation',count:pipelineLeads.filter(l=>['in_conversation',...bookedPlus].includes(l.status)).length},
    {key:'booked',label:'Booked',count:pipelineLeads.filter(l=>bookedPlus.includes(l.status)).length},
    {key:'showed',label:'Showed Up',count:pipelineLeads.filter(l=>showedPlus.includes(l.status)).length},
    {key:'no_show',label:'No Show',count:pipelineLeads.filter(l=>l.status==='no_show').length,isLoss:true},
    {key:'closed_won',label:'Closed Won',count:pipelineLeads.filter(l=>l.status==='closed_won').length},
  ];
  const colors=['var(--blue)','var(--orange)','#8B5CF6','var(--green)','var(--red)','var(--green)'];
  return stages.map((s,i)=>({...s,pct:Math.round(s.count/total*100),color:colors[i]}));
}

        if(getLeadStage(l)==='Qualifying'){if(hrs>=48)timeClass='urgent-red';else if(hrs>=24)timeClass='urgent-orange';}
        const isAuto=l.mc_source==='webhook'||l.mc_source==='sync';
        const score=calcLeadScore(l),grade=scoreGrade(score);
        h+=`<div class="lead-card" onclick="openLeadDetail('${l.id}')">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="pl-score pl-score-${grade.toLowerCase()}" title="Score: ${score}">${grade}</span>
            <div style="flex:1">
              ${l.country?`<div class="lead-country"><span class="lead-country-flag">${cInfo.flag}</span><span class="lead-country-name">${esc(cInfo.name)}</span>${cDotClass?`<span class="lead-country-dot ${cDotClass}"></span>`:''}</div>`:''}
              <div class="lead-name">${esc(l.name||'Unnamed')}${l.ig_handle?` <span class="lead-handle">@${esc(l.ig_handle.replace(/^@/,''))}</span>`:''}</div>
            </div>
          </div>
          <div class="lead-badges">
            ${qualScoreBadge(l)}
            ${isAuto?'<span class="lead-badge badge-auto">AUTO</span>':''}
          </div>
          ${timeLabel?`<div class="lead-time ${timeClass}">${timeLabel}</div>`:''}
        </div>`;
      });
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escAttr(s){return esc(String(s)).replace(/`/g,'&#96;').replace(/\\/g,'&#92;');}
function toast(msg,ms){ms=ms||2500;let el=document.getElementById('toast');if(!el){el=document.createElement('div');el.id='toast';el.className='toast';document.body.appendChild(el);}el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);}
function confirmDialog(msg){return new Promise(resolve=>{const bg=document.createElement('div');bg.className='confirm-modal-bg';bg.innerHTML=`<div class="confirm-modal"><p>${esc(msg)}</p><div class="confirm-modal-btns"><button class="btn-no">Cancel</button><button class="btn-yes">Confirm</button></div></div>`;bg.querySelector('.btn-no').onclick=()=>{bg.remove();resolve(false);};bg.querySelector('.btn-yes').onclick=()=>{bg.remove();resolve(true);};bg.onclick=e=>{if(e.target===bg){bg.remove();resolve(false);}};document.body.appendChild(bg);});}

function buildCountryOptions(selected){
  let opts='<option value="">Select country...</option>';
  opts+='<optgroup label="Green markets">';
  Object.entries(COUNTRY_GREEN).forEach(([c,info])=>{opts+=`<option value="${c}"${selected===c?' selected':''}>${info.flag} ${info.name}</option>`;});
  opts+='</optgroup><optgroup label="Caution">';
  Object.entries(COUNTRY_YELLOW).forEach(([c,info])=>{opts+=`<option value="${c}"${selected===c?' selected':''}>${info.flag} ${info.name}</option>`;});
  opts+='</optgroup><optgroup label="Disqualified">';
  Object.entries(COUNTRY_RED).forEach(([c,info])=>{opts+=`<option value="${c}"${selected===c?' selected':''}>${info.flag} ${info.name}</option>`;});
  opts+='</optgroup>';
  return opts;
}

function toggleYN(field,val){
  const st=window._stageModalState;
  st[field]=val;
  // Update button styling
  const yBtn=document.getElementById('yn-'+field+'-y');
  const nBtn=document.getElementById('yn-'+field+'-n');
  if(yBtn){yBtn.className='mdm-yn'+(val===true?' yes':'');}
  if(nBtn){nBtn.className='mdm-yn'+(val===false?' no':'');}
  // Enable confirm when all answered
  const allAnswered=st.pain!==null&&st.urgency!==null&&st.income!==null;
  const btn=document.getElementById('stage-confirm-btn');
  if(btn)btn.disabled=!allAnswered;
}
function selectBreakReason(el,reason){
  window._stageModalState.breakReason=reason;
  el.parentElement.querySelectorAll('.mdm-radio').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  const btn=document.getElementById('stage-confirm-btn');
  if(btn)btn.disabled=false;
}
function selectApproach(el,approach){
  window._stageModalState.approach=approach;
  el.parentElement.querySelectorAll('.mdm-radio').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  const btn=document.getElementById('stage-confirm-btn');
  if(btn)btn.disabled=false;
}
async function confirmStageMove(){
  const st=window._stageModalState;
  const lead=pipelineLeads.find(l=>l.id===st.leadId);
  if(!lead)return;
  const updates={stage_entered_at:new Date().toISOString()};

  if(st.fromStage==='New'&&st.toStage==='Qualifying'){
    updates.status='qualifying';
  } else if(st.fromStage==='Qualifying'&&st.toStage==='Hot'){
    updates.status='hot';
    updates.pain_signal=st.pain===true;
    updates.urgency_signal=st.urgency===true;
    updates.income_signal=st.income===true;
    const qs=(st.pain===true?1:0)+(st.urgency===true?1:0)+(st.income===true?1:0);
    if(getCountryTier(lead.country)==='red')updates.qual_score=-1;
    else updates.qual_score=qs;
  } else if(st.toStage==='Dead'){
    updates.status='dead';
    updates.break_reason=st.breakReason||'';
  } else if(st.fromStage==='Hot'&&st.toStage==='Booked'){
    updates.status='booked';
    updates.approach_used=st.approach||'';
    updates.booked_date=todayKey();
  }

  await updatePipelineLead(st.leadId,updates);
  // Also update local object for qual_score
  if(updates.qual_score!==undefined){const ll=pipelineLeads.find(x=>x.id===st.leadId);if(ll)ll.qual_score=updates.qual_score;}
  closeOv();renderAdmin();
}

async function changePassword(){
  const pw1=document.getElementById('acc-pw1').value;
  const pw2=document.getElementById('acc-pw2').value;
  const msg=document.getElementById('acc-msg');
  if(!pw1||pw1.length<8){msg.textContent='Password must be at least 8 characters.';return;}
  if(!/[A-Z]/.test(pw1)||!/[0-9]/.test(pw1)){msg.textContent='Password must include at least one uppercase letter and one number.';return;}
  if(pw1!==pw2){msg.textContent='Passwords don\'t match.';return;}
  msg.textContent='Updating…';msg.style.color='var(--text3)';
  const{error}=await sb.auth.updateUser({password:pw1});
  if(error){msg.textContent=error.message;msg.style.color='var(--red)';}
  else{msg.textContent='Password updated successfully.';msg.style.color='var(--green)';setTimeout(()=>closeOv(),1500);}
}

// ── ADMIN HABIT BUILDER ──
async function openHabitBuilder(uid,email){if(!_isAdmin())return;
  // Load client's current tasks first
  const r=await storage.get('wtd-tasks',uid);
  let clientTimed=DEFAULT_TIMED.map(t=>({...t}));
  let clientEssential=DEFAULT_ESSENTIAL.map(t=>({...t}));
  if(r){try{const s=JSON.parse(r.value);clientTimed=s.timed;clientEssential=s.essential;}catch(e){}}

  const renderHabitBuilder=(timed,essential)=>{
    const blocks=[...BLOCKS.map(b=>({label:b,tasks:timed.filter(t=>t.block===b),type:'timed'})),{label:"Daily Essentials",tasks:essential,type:'essential'}];
    let h=`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal" style="max-height:90vh;overflow-y:auto">
      <div class="modal-title">Build habits</div>
      <div class="modal-sub">Setting up stack for ${email}</div>
      <div style="margin-bottom:1rem">
        <div class="esec-label" style="margin-bottom:7px">Add task to block</div>
        <select class="block-sel" id="hb-block">${BLOCKS.map(b=>`<option value="timed:${b}">${b}</option>`).join('')}<option value="essential:Daily Essentials">Daily Essentials</option></select>
        <button class="btn-ghost" style="width:auto" onclick="hbAddTask('${uid}','${email}')">+ Add task</button>
      </div>`;
    blocks.forEach(({label,tasks,type})=>{
      if(!tasks.length)return;
      h+=`<div class="esec"><div class="esec-label">${label}</div>`;
      tasks.forEach(task=>{
        h+=`<div class="editor-row">
          <input class="e-inp" value="${esc(task.name)}" onchange="hbUpdateTask(${task.id},'name',this.value,'${type}','${uid}','${email}')">
          <input class="e-pts" type="number" value="${task.points}" min="1" max="30" onchange="hbUpdateTask(${task.id},'points',parseInt(this.value)||1,'${type}','${uid}','${email}')">
          <select class="e-tier" onchange="hbUpdateTask(${task.id},'tier',this.value,'${type}','${uid}','${email}')">
            <option${task.tier==='S'?' selected':''}>S</option>
            <option${task.tier==='A'?' selected':''}>A</option>
            <option${task.tier==='B'?' selected':''}>B</option>
          </select>
          <button class="del-btn" onclick="hbDeleteTask(${task.id},'${type}','${uid}','${email}')">×</button>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`<div class="modal-actions">
      <button class="btn-save" onclick="hbSave('${uid}','${email}')">Save to client</button>
      <button class="btn-cancel" onclick="closeOv()">Cancel</button>
    </div></div></div>`;
    showOv(h);
  };

  // Store temp state for builder
  window._hbTimed=clientTimed;
  window._hbEssential=clientEssential;
  renderHabitBuilder(clientTimed,clientEssential);
  window._hbRender=renderHabitBuilder;
}

function hbUpdateTask(id,field,value,type,uid,email){
  const arr=type==='essential'?window._hbEssential:window._hbTimed;
  const task=arr.find(t=>t.id===id);if(task)task[field]=value;
}
function hbDeleteTask(id,type,uid,email){
  if(type==='essential')window._hbEssential=window._hbEssential.filter(t=>t.id!==id);
  else window._hbTimed=window._hbTimed.filter(t=>t.id!==id);
  window._hbRender(window._hbTimed,window._hbEssential);
}
function hbAddTask(uid,email){
  const val=document.getElementById('hb-block')?.value||'timed:Morning';
  const[type,block]=val.split(':');
  const newTask={id:Date.now(),name:"New task",points:5,tier:"B"};
  if(type==='essential')window._hbEssential.push(newTask);
  else{newTask.block=block;window._hbTimed.push(newTask);}
  window._hbRender(window._hbTimed,window._hbEssential);
}
async function hbSave(uid,email){
  await storage.set('wtd-tasks',JSON.stringify({timed:window._hbTimed,essential:window._hbEssential}),uid);
  closeOv();
  alert(`Habit stack saved for ${email}`);
}

function renderOnboarding(){
  const totalSteps=4;
  const dots=Array.from({length:totalSteps},(_,i)=>`<div class="onboard-dot${i<onboardStep?' done':''}${i===onboardStep-1?' active':''}"></div>`).join('');
  let body='';
  if(onboardStep===1) body=onboardStep1();

}

function onboardGenerateTasks(){
  const timed=[];
  const essential=[];
  let id=1;
  const cats=onboardData.categories;
  const p=onboardPts;
  const wakeLabel=formatOnboardTime(onboardData.wake);
  const sleepLabel=formatOnboardTime(onboardData.sleep);

  // Morning Routine (always on)
  timed.push({id:id++,block:"Morning",name:`Wake up at ${wakeLabel}`,points:p(8),tier:"A"});
  timed.push({id:id++,block:"Morning",name:"Morning walk",points:p(7),tier:"B"});
  timed.push({id:id++,block:"Morning",name:"Morning stretch",points:p(8),tier:"B"});
  timed.push({id:id++,block:"Morning",name:"Morning intentions",sub:"Set your focus for the day",points:p(8),tier:"A"});

  // Mindfulness - morning
  if(cats.mindfulness && (onboardData.mindfulnessTime==='morning'||onboardData.mindfulnessTime==='both')){
    timed.push({id:id++,block:"Morning",name:"Morning meditation",points:p(7),tier:"A"});
  }

  // Deep Work
  if(cats.deepwork){
    const n=onboardData.deepworkBlocks||2;
    if(n>=1) timed.push({id:id++,block:"Work",name:"Focus block 1",points:p(17),tier:"S"});
    if(n>=2) timed.push({id:id++,block:"Work",name:"Focus block 2",points:p(15),tier:"S"});
    if(n>=3) timed.push({id:id++,block:"Work",name:"Focus block 3",points:p(13),tier:"S"});
  }

  // Midday
  timed.push({id:id++,block:"Midday",name:"Midday walk",points:p(5),tier:"B"});

  // Physical Training
  if(cats.training){
    if(onboardData.trainingType==='gym'||onboardData.trainingType==='both'){
      timed.push({id:id++,block:"Body",name:"Gym or movement",points:p(13),tier:"S"});
    }
    if(onboardData.trainingType==='yoga'||onboardData.trainingType==='both'){
      timed.push({id:id++,block:"Body",name:"Yoga",points:p(6),tier:"B"});
    }
  }

  // Learning
  if(cats.learning){
    timed.push({id:id++,block:"Wind Down",name:"Reading / audiobook / learning",points:p(7),tier:"A"});
  }

  // Evening Wind Down (always on)
  if(cats.mindfulness && (onboardData.mindfulnessTime==='evening'||onboardData.mindfulnessTime==='both')){
    timed.push({id:id++,block:"Wind Down",name:"Evening meditation",points:p(8),tier:"A"});
  }
  timed.push({id:id++,block:"Wind Down",name:"Evening journal",points:p(8),tier:"A"});
  timed.push({id:id++,block:"Wind Down",name:"Plan tomorrow",points:p(15),tier:"S"});
  timed.push({id:id++,block:"Wind Down",name:"Screen off + wind down",points:p(6),tier:"B"});
  timed.push({id:id++,block:"Wind Down",name:`Sleep by ${sleepLabel}`,points:p(10),tier:"A"});

  // Essentials
  if(cats.identity){
    essential.push({id:id++,name:"Personal growth work",sub:"Journaling, reflection, or coaching exercises",points:p(11),tier:"S"});
  }
  if(cats.nutrition){
    essential.push({id:id++,name:"Nutrition check-in",points:p(11),tier:"S"});
  }

  // Custom tasks
  if(onboardData.customTasks&&onboardData.customTasks.length){
    onboardData.customTasks.forEach(ct=>{
      timed.push({id:id++,block:ct.block,name:ct.name,points:p(6),tier:"B"});
    });
  }

  return {timed,essential};
}

function formatOnboardTime(t){
  if(!t) return '';
  const [h,m]=t.split(':').map(Number);
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return m===0?`${h12}${ampm}`:`${h12}:${String(m).padStart(2,'0')}${ampm}`;
}

let _missedCache=null,_missedCacheKey='';
function getMissedPatterns(){
  const tk=todayKey()+JSON.stringify(checked);
  if(_missedCacheKey===tk&&_missedCache)return _missedCache;
  const counts={};
  const d=new Date();
  for(let i=1;i<=14;i++){
    d.setDate(d.getDate()-1);
    const key=dateKey(d);
    const rec=allHistory[key];
    if(!rec)continue;
    const tasks=rec.restDay?restTasks():allTasks();
    tasks.forEach(t=>{
      if(!rec.checked||!rec.checked[t.id]){
        counts[t.id]=(counts[t.id]||{name:t.name,count:0});
        counts[t.id].count++;
      }
    });
  }
  _missedCache=Object.values(counts).filter(x=>x.count>=3).sort((a,b)=>b.count-a.count).slice(0,4);
  _missedCacheKey=tk;
  return _missedCache;
}

function calcStreak(){
  let streak=0;const d=new Date();
  while(true){
    const key=dateKey(d),rec=allHistory[key],w=rec&&rec.restDay?restSettings.win/100:WIN;
    if(rec&&rec.pct>=w)streak++;
    else if(key===todayKey()&&(!rec||rec.pct<w)){d.setDate(d.getDate()-1);continue;}
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function calcDaysWon(){return Object.values(allHistory).filter(r=>r.pct>=(r.restDay?restSettings.win/100:WIN)).length;}
function calcBestStreak(){let best=0,cur=0;Object.keys(allHistory).sort().forEach(k=>{const r=allHistory[k],w=r.restDay?restSettings.win/100:WIN;if(r.pct>=w){cur++;best=Math.max(best,cur);}else cur=0;});return best;}
function calcBestWeek(){const keys=Object.keys(allHistory).sort();let best=0;for(let i=0;i<keys.length;i++){const week=keys.slice(i,i+7).filter(k=>!allHistory[k].restDay);if(!week.length)continue;const avg=week.reduce((s,k)=>s+allHistory[k].pct,0)/week.length;best=Math.max(best,avg);}return best;}

    <button class="nav-btn" onclick="shiftDay(1)" style="padding:5px 10px;font-size:14px;${dayOffset>=0?'opacity:.3;pointer-events:none':''}">&rarr;</button>
  </div>`;

  // Level card
  h+=`<div class="level-card"><div class="level-icon" style="background:${lv.color}22;border:.5px solid ${lv.color}66">${lv.icon}</div><div style="flex:1"><div style="font-size:16px;font-weight:500;color:${lv.color}">${lv.name}</div><div style="font-size:11px;color:var(--text3);margin-top:1px">${daysWon} days won${toNext>0?` · ${toNext} to ${nextName}`:'  · Max level'}</div><div class="xp-bar"><div class="xp-fill" style="width:${Math.round(lvPct*100)}%;background:${lv.color}"></div></div></div></div>`;

  // Badges
  const badges=[];
  if(streak>=7)badges.push(`<div class="badge badge-streak">🔥 ${streak}-day streak</div>`);
  if(bestStreak>=30)badges.push(`<div class="badge badge-crush">⚡ ${bestStreak}-day best</div>`);
  if(bestWeek>=CRUSH)badges.push(`<div class="badge badge-perfect">✦ Best week ${Math.round(bestWeek*100)}%</div>`);
  if(badges.length)h+=`<div class="badge-row">${badges.join('')}</div>`;

  // PR card
  h+=`<div class="pr-card"><div class="pr-item"><div class="pr-val">${daysWon}</div><div class="pr-lbl">Days won</div></div><div class="pr-item"><div class="pr-val" style="color:var(--orange)">${bestStreak}</div><div class="pr-lbl">Best streak</div></div><div class="pr-item"><div class="pr-val">${bestWeek>0?Math.round(bestWeek*100)+'%':'—'}</div><div class="pr-lbl">Best week</div></div></div>`;

  // Mood
  if(!readOnly)h+=`<div class="mood-row"><span style="font-size:13px;color:var(--text3)">How are you feeling?</span><div class="mood-btns">${[1,2,3,4,5].map(n=>`<div class="mood-btn${mood===n?' sel':''}" onclick="setMood(${n})">${n}</div>`).join('')}</div></div>`;

  // Celebration
  if(showCelebration){const isCrush=showCelebration==='crush';h+=`<div class="celebrate-banner ${isCrush?'crush':'won'}"><span style="font-size:26px">${isCrush?'🏆':'✅'}</span><div><div style="font-size:16px;font-weight:600;color:${isCrush?'#2E9E5B':'#3A7EC4'}">${isCrush?'Crushing it.':'Day won.'}</div><div style="font-size:12px;color:var(--text3);margin-top:1px">${isCrush?'Exceptional effort today. You earned it.':'You did the work. That\'s what matters.'}</div></div></div>`;}

  // Streak banner
  if(streak>=2)h+=`<div class="streak-banner"><span style="font-size:18px">🔥</span><span style="font-size:13px;color:var(--text)"><strong style="color:#E8A020">${streak} day streak</strong> — keep it going</span></div>`;

  // Missed patterns (dismissible)
  if(patterns.length>0&&!window._blindSpotsDismissed){
    h+=`<div class="pattern-alert" style="position:relative"><button onclick="window._blindSpotsDismissed=true;render()" style="position:absolute;top:8px;right:10px;background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:2px 4px;opacity:.6;line-height:1">&times;</button><div class="pattern-label">Recurring blind spots — last 14 days</div>`;
    patterns.forEach(p=>{h+=`<div class="pattern-item"><span>${p.name}</span><span class="pattern-count">missed ${p.count}x</span></div>`;});
    h+=`</div>`;
  }

  // Why + Identity
  if(editingStatements&&!readOnly){
    h+=`<div class="statement-card"><div class="mini-label">My why</div><textarea class="statement-input" id="why-inp" placeholder="Write your why statement...">${esc(whyStatement)}</textarea><div class="identity-divider"><div class="mini-label">I am</div><textarea class="identity-input" id="id-inp" placeholder="Write your identity statement...">${esc(identityStatement)}</textarea></div><button class="save-btn" onclick="saveStatements()">Save</button></div>`;
  }else if(whyStatement||identityStatement){
    h+=`<div class="statement-card">${!readOnly?`<button class="edit-btn" onclick="editStatements()">Edit</button>`:''} ${whyStatement?`<div class="mini-label">My why</div><div class="statement-text">${whyStatement}</div>`:''} ${identityStatement?`<div class="identity-divider"><div class="mini-label">I am</div><div class="identity-text">${identityStatement}</div></div>`:''}</div>`;

    h+=`<div class="statement-card" style="cursor:pointer;border:.5px dashed var(--border);" onclick="editStatements()"><div class="mini-label">My why + Identity statement</div><div style="font-size:13px;color:var(--text3);font-style:italic">Tap to add your why and identity statement.</div></div>`;
  }



  // Tasks
  h+=`<div class="score-card"><svg width="132" height="132" viewBox="0 0 140 140" style="flex-shrink:0"><circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--border)" stroke-width="9"/><circle cx="70" cy="70" r="${R}" fill="none" stroke="${sc}" stroke-width="9" stroke-dasharray="${d} ${C}" stroke-linecap="round" transform="rotate(-90 70 70)" style="transition:stroke-dasharray .4s ease,stroke .4s ease"/><text x="70" y="66" text-anchor="middle" font-size="26" font-weight="600" fill="var(--text)">${Math.round(pct*100)}%</text><text x="70" y="84" text-anchor="middle" font-size="11" fill="var(--text3)">${earned} / ${tot} pts</text></svg><div style="flex:1">${isRestDay?`<div class="rest-day-badge">Rest Day</div>`:''}<p style="font-size:24px;font-weight:600;color:${sc};margin-bottom:4px;letter-spacing:-.01em">${statusText(pct,isRestDay)}</p><p style="font-size:13px;color:var(--text2);margin-bottom:12px">${tasks.filter(t=>checked[t.id]).length} of ${tasks.length} tasks done</p><div class="win-bar" style="position:relative"><div class="win-bar-fill" style="width:${Math.round(pct*100)}%;background:${sc}"></div><div style="position:absolute;top:-1px;left:${Math.round(WIN_T*100)}%;width:2px;height:6px;background:var(--border2);border-radius:1px"></div><div style="position:absolute;top:-1px;left:${Math.round(CRUSH_T*100)}%;width:2px;height:6px;background:var(--border2);border-radius:1px"></div></div><div class="thresh-pills"><div class="thresh-pill">Win ${Math.round(WIN_T*100)}%</div><div class="thresh-pill">Crush ${Math.round(CRUSH_T*100)}%</div></div></div></div><p class="score-insight">${getInsight(pct,earned,isRestDay)}</p>`;

  if(yRec){const diff=Math.round(pct*100)-Math.round(yRec.pct*100);const dc=diff>0?'#2E9E5B':diff<0?'#E24B4A':'var(--text3)';h+=`<p class="yesterday-line">Yesterday: <strong style="color:${statusColor(yRec.pct,yRec.restDay)}">${Math.round(yRec.pct*100)}%</strong> <span style="color:${dc};font-size:11px">${diff>0?'+'+diff:diff}%</span></p>`;}

  if(missedS.length>0&&pct<WIN_T){h+=`<div class="missed-alert"><div class="missed-label">Critical tasks remaining</div>${missedS.map(t=>`<div class="missed-item">${t.name}<span style="margin-left:auto;font-size:11px;color:var(--text3)">+${t.points}</span></div>`).join('')}</div>`;}

  // Rest day + Reminder toggles here (after score)
  if(!readOnly)h+=`<div class="rest-banner${isRestDay?' active':''}"><div style="flex:1"><div style="font-size:13px;font-weight:500">Rest day</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${isRestDay?`Lighter target — win at ${restSettings.win}%`:'Toggle for travel, recovery, or weekends'}<a style="font-size:11px;color:var(--blue);cursor:pointer;margin-left:6px" onclick="openRestEditor()">Customize</a></div></div><label class="toggle"><input type="checkbox" ${isRestDay?'checked':''} onchange="toggleRestDay()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`;
  if(!readOnly)h+=`<div class="reminder-banner${reminderSettings.enabled?' active':''}"><div style="flex:1"><div style="font-size:13px;font-weight:500">Daily reminder</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${reminderSettings.enabled?`Nudge at ${reminderSettings.time} if day not won`:'Get a nudge if you haven\'t won the day'}</div>${reminderSettings.enabled?`<input type="time" class="time-inp" id="reminder-time" value="${reminderSettings.time}" onchange="updateReminderTime()">`:''}</div><label class="toggle"><input type="checkbox" ${reminderSettings.enabled?'checked':''} onchange="toggleReminder()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`;
  if(isRestDay){
    const rEss=essentialTasks.filter(t=>restSettings.taskIds.includes(t.id));
    const rTimed=BLOCKS.map(b=>({block:b,tasks:timedTasks.filter(t=>t.block===b&&restSettings.taskIds.includes(t.id))})).filter(({tasks})=>tasks.length);
    if(rEss.length){const ee=rEss.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0),et=rEss.reduce((s,t)=>s+t.points,0);const allDone=rEss.every(t=>checked[t.id]);h+=`<div class="block-header"><span class="block-name${allDone?' all-done':''}">Daily Essentials${allDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${et>0?Math.round(ee/et*100):0}% · ${ee}/${et}</span></div><div class="essentials-block">${rEss.map(t=>taskRow(t,pct,true)).join('')}</div>`;}
    rTimed.forEach(({block,tasks})=>{const be=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0),bt=tasks.reduce((s,t)=>s+t.points,0);const allDone=tasks.every(t=>checked[t.id]);h+=`<div class="block-header"><span class="block-name${allDone?' all-done':''}"> ${block}${allDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${bt>0?Math.round(be/bt*100):0}% · ${be}/${bt}</span></div><div class="block-tasks">${tasks.map(t=>taskRow(t,pct,true)).join('')}</div>`;});
  }else{
    const essEarned=essentialTasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
    const essTotal=essentialTasks.reduce((s,t)=>s+t.points,0);const allEssDone=essentialTasks.every(t=>checked[t.id]);
    h+=`<div class="block-header"><span class="block-name${allEssDone?' all-done':''}">Daily Essentials${allEssDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${essTotal>0?Math.round(essEarned/essTotal*100):0}% · ${essEarned}/${essTotal}</span></div><div class="essentials-block">${essentialTasks.map(t=>taskRow(t,pct,false)).join('')}</div>`;
    BLOCKS.forEach(block=>{
      const bt=timedTasks.filter(t=>t.block===block);if(!bt.length)return;
      const be=bt.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0),bto=bt.reduce((s,t)=>s+t.points,0),allDone=bt.every(t=>checked[t.id]);
      h+=`<div class="block-header"><span class="block-name${allDone?' all-done':''}">${block}${allDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${bto>0?Math.round(be/bto*100):0}% · ${be}/${bto}</span></div><div class="block-tasks">${bt.map(t=>taskRow(t,pct,false)).join('')}</div>`;
      if(block==="Wind Down"&&allDone)h+=`<div class="winddown-done"><span style="font-size:16px">📚</span><div><div style="font-size:13px;font-weight:500;color:#2E9E5B">Tomorrow is set up.</div><div style="font-size:11px;color:var(--text3);margin-top:1px">Wind down complete.</div></div></div>`;
    });
    h+=`<div style="display:flex;gap:14px;margin-top:.75rem;justify-content:center">${Object.entries(TIER).map(([k,v])=>`<div style="display:flex;align-items:center;gap:4px"><span style="font-size:10px;font-weight:500;color:${v.color}">${k}</span><span style="font-size:11px;color:var(--text3)">${v.label}</span></div>`).join('')}</div>`;
  }

  // Action items
  if(actionItems.length){h+=`<div class="action-block"><div class="action-header-row">Action items from coach</div>${actionItems.map((item,i)=>`<div class="action-row" onclick="toggleActionItem(${i})"><div class="checkbox${item.done?' checked':''}" style="${item.done?'background:#2E9E5B;border:none':''}">${item.done?'<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div><span class="action-name${item.done?' done':''}">${item.text}</span></div>`).join('')}</div>`;}

  // Win of day
  if(!readOnly){h+=`<div class="win-of-day"><div class="mini-label">Win of the day</div><textarea class="win-input" id="win-input" placeholder="What was your biggest win today?" oninput="onWinInput()">${esc(winOfDay)}</textarea></div>`;}
  else if(winOfDay){h+=`<div class="win-of-day"><div class="mini-label">Win of the day</div><div style="font-size:14px;color:var(--text);line-height:1.6">${esc(winOfDay)}</div></div>`;}

  // Identity reflection — end of day
  if((identityStatement)&&!readOnly){
    h+=`<div class="reflect-section" style="border-top:.5px solid rgba(58,126,196,.2)">
      <div class="identity-reflect-card" style="margin-bottom:0">
        <div class="identity-reflect-question">Identity proof — end of day</div>
        <div class="identity-reflect-statement">"${esc(identityStatement)}"</div>
        <textarea class="ir-note-inp" id="ir-note" placeholder="Write the specific things you did today that prove you are this person..." oninput="saveIRNote()">${esc(todayIR.note||'')}</textarea>
        ${todayIR.note?`<div style="font-size:11px;color:var(--text3);margin-top:6px">✓ Saved</div>`:''}
      </div>
    </div>`;
  }

  // Daily reflection
  h+=`<div class="reflect-section"><div class="reflect-label">Daily reflection</div><textarea class="reflect-input" id="reflection-input" placeholder="How did today go? What came up? What are you proud of?" ${readOnly?'readonly':''} oninput="onReflectionInput()">${esc(todayReflection)}</textarea>${!readOnly?`<div class="autosave" id="autosave-ind">${autoSaveStatus}</div>`:''}</div>`;

  if(!readOnly){
    h+=`<div class="settings-row">
      <button class="settings-btn" onclick="openEditor()">Edit habits</button>
      <button class="settings-btn" onclick="rebuildSchedule()">Rebuild schedule</button>
      ${_savedScheduleBackup?`<button class="settings-btn" style="color:var(--orange);border-color:var(--orange)" onclick="undoRebuild()">Undo rebuild</button>`:''}
      <button class="settings-btn" onclick="openMailto()">Email summary</button>
      <button class="settings-btn" onclick="exportData()">Export</button>
      <button class="settings-btn" onclick="openImport()">Import</button>
      <button class="settings-btn danger" onclick="confirmReset()">Reset day</button>
    </div>`;
  }

  // Restore globals if we were viewing a past day
  if(viewingPast){checked=_savedChecked;isRestDay=_savedIsRest;mood=_savedMood;winOfDay=_savedWin;}
  return h;
}

function editStatements(){editingStatements=true;render();setTimeout(()=>document.getElementById('why-inp')?.focus(),50);}

async function saveIRNote(){
  const key=viewingDateKey();
  if(!identityReflections[key])identityReflections[key]={rating:0,note:'',time:''};
  identityReflections[key].note=document.getElementById('ir-note')?.value.trim()||'';
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(async()=>{await saveIR();vault.logIdentity(key);},1200);
