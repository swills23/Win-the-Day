function taskRow(task,pct,rest){
  const isDone=!!checked[task.id],tc=TIER[task.tier].color,isS=task.tier==='S';
  const todayNote=taskNotes[todayKey()]?.[task.id]||'';
  return `<div class="task-row${isDone?' done':''}${isS?' s-tier':''}" id="tr-${task.id}" onclick="toggle(${task.id},event)">
    <div class="checkbox${isDone?' checked':''}" style="pointer-events:none">
      ${isDone?'<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
    </div>
    <span class="task-name${isDone?' done':''}" style="pointer-events:none">
      ${task.name}${task.sub?`<span class="task-sub">${task.sub}</span>`:''}
      ${todayNote?`<span class="task-note-text">📝 ${todayNote}</span>`:''}
    </span>
    <button class="task-note-btn" onclick="event.stopPropagation();openNoteModal(${task.id},'${task.name.replace(/'/g,"\\'")}')">📝</button>
    <span class="tier-badge" style="color:${tc};pointer-events:none">${task.tier}</span>
    <span class="task-pts" style="pointer-events:none">+${task.points}</span>
  </div>`;
}

function renderToday(readOnly){
  const tasks=isRestDay?restTasks():allTasks();
  const tot=isRestDay?restTotal():total();
  const earned=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const pct=tot>0?earned/tot:0;
  const sc=statusColor(pct,isRestDay);
  const R=58,C=2*Math.PI*R,d=Math.min(pct,1)*C;
  const todayReflection=(allHistory[todayKey()]?.reflection)||'';
  const streak=calcStreak(),daysWon=calcDaysWon(),bestStreak=calcBestStreak(),bestWeek=calcBestWeek();
  const WIN_T=isRestDay?restSettings.win/100:WIN;
  const CRUSH_T=isRestDay?restSettings.crush/100:CRUSH;
  const missedS=tasks.filter(t=>t.tier==='S'&&!checked[t.id]);
  const yRec=allHistory[yesterday()];
  const{lv,pct:lvPct,toNext,nextName}=getLevelProgress(daysWon);
  const patterns=getMissedPatterns();
  const todayIR=identityReflections[todayKey()]||{rating:0,note:''};
  const todayDate=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  let h='';
  h+=`<div style="margin-bottom:14px;padding:2px 0"><div style="font-size:13px;color:var(--text3);font-weight:500">${todayDate}</div></div>`;

  // Level card
  h+=`<div class="level-card"><div class="level-icon" style="background:${lv.color}22;border:.5px solid ${lv.color}66">${lv.icon}</div><div style="flex:1"><div style="font-size:16px;font-weight:500;color:${lv.color}">${lv.name}</div><div style="font-size:11px;color:var(--text3);margin-top:1px">${daysWon} days won${toNext>0?` · ${toNext} to ${nextName}`:'  · Max level'}</div><div class="xp-bar"><div class="xp-fill" style="width:${Math.round(lvPct*100)}%;background:${lv.color}"></div></div></div></div>`;

  // Badges
  const badges=[];
  if(streak>=7)badges.push(`<div class="badge badge-streak">🔥 ${streak}-day streak</div>`);
  if(bestStreak>=30)badges.push(`<div class="badge badge-crush">⚡ ${bestStreak}-day best</div>`);
  if(bestWeek>=CRUSH)badges.push(`<div class="badge badge-perfect">✦ Best week ${Math.round(bestWeek*100)}%</div>`);
  if(badges.length)h+=`<div class="badge-row">${badges.join('')}</div>`;

  // PR card
  h+=`<div class="pr-card"><div class="pr-item"><div class="pr-val">${daysWon}</div><div class="pr-lbl">Days won</div></div><div class="pr-item"><div class="pr-val" style="color:var(--orange)">${bestStreak}</div><div class="pr-lbl">Best streak</div></div><div class="pr-item"><div class="pr-val">${bestWeek>0?Math.round(bestWeek*100)+'%':'—'}</div><div class="pr-lbl">Best week</div></div></div>`;

  // Mood
  if(!readOnly)h+=`<div class="mood-row"><span style="font-size:13px;color:var(--text3)">How are you feeling?</span><div class="mood-btns">${[1,2,3,4,5].map(n=>`<div class="mood-btn${mood===n?' sel':''}" onclick="setMood(${n})">${n}</div>`).join('')}</div></div>`;

  // Celebration
  if(showCelebration){const isCrush=showCelebration==='crush';h+=`<div class="celebrate-banner ${isCrush?'crush':'won'}"><span style="font-size:26px">${isCrush?'🏆':'✅'}</span><div><div style="font-size:16px;font-weight:600;color:${isCrush?'#2E9E5B':'#3A7EC4'}">${isCrush?'Crushing it.':'Day won.'}</div><div style="font-size:12px;color:var(--text3);margin-top:1px">${isCrush?'Exceptional effort today. You earned it.':'You did the work. That\'s what matters.'}</div></div></div>`;}

  // Streak banner
  if(streak>=2)h+=`<div class="streak-banner"><span style="font-size:18px">🔥</span><span style="font-size:13px;color:var(--text)"><strong style="color:#E8A020">${streak} day streak</strong> — keep it going</span></div>`;

  // Missed patterns
  if(patterns.length>0){
    h+=`<div class="pattern-alert"><div class="pattern-label">⚠ Recurring blind spots — last 14 days</div>`;
    patterns.forEach(p=>{h+=`<div class="pattern-item"><span>${p.name}</span><span class="pattern-count">missed ${p.count}x</span></div>`;});
    h+=`</div>`;
  }

  // Why + Identity
  if(editingStatements&&!readOnly){
    h+=`<div class="statement-card"><div class="mini-label">My why</div><textarea class="statement-input" id="why-inp" placeholder="Write your why statement...">${whyStatement}</textarea><div class="identity-divider"><div class="mini-label">I am</div><textarea class="identity-input" id="id-inp" placeholder="Write your identity statement...">${identityStatement}</textarea></div><button class="save-btn" onclick="saveStatements()">Save</button></div>`;
  }else if(whyStatement||identityStatement){
    h+=`<div class="statement-card">${!readOnly?`<button class="edit-btn" onclick="editStatements()">Edit</button>`:''} ${whyStatement?`<div class="mini-label">My why</div><div class="statement-text">${whyStatement}</div>`:''} ${identityStatement?`<div class="identity-divider"><div class="mini-label">I am</div><div class="identity-text">${identityStatement}</div></div>`:''}</div>`;
  }else if(!readOnly){
    h+=`<div class="statement-card" style="cursor:pointer;border:.5px dashed var(--border);" onclick="editStatements()"><div class="mini-label">My why + Identity statement</div><div style="font-size:13px;color:var(--text3);font-style:italic">Tap to add your why and identity statement.</div></div>`;
  }



  // Tasks
  h+=`<div class="score-card"><svg width="132" height="132" viewBox="0 0 140 140" style="flex-shrink:0"><circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--border)" stroke-width="9"/><circle cx="70" cy="70" r="${R}" fill="none" stroke="${sc}" stroke-width="9" stroke-dasharray="${d} ${C}" stroke-linecap="round" transform="rotate(-90 70 70)" style="transition:stroke-dasharray .4s ease,stroke .4s ease"/><text x="70" y="66" text-anchor="middle" font-size="26" font-weight="600" fill="var(--text)">${Math.round(pct*100)}%</text><text x="70" y="84" text-anchor="middle" font-size="11" fill="var(--text3)">${earned} / ${tot} pts</text></svg><div style="flex:1">${isRestDay?`<div class="rest-day-badge">Rest Day</div>`:''}<p style="font-size:24px;font-weight:600;color:${sc};margin-bottom:4px;letter-spacing:-.01em">${statusText(pct,isRestDay)}</p><p style="font-size:13px;color:var(--text2);margin-bottom:12px">${tasks.filter(t=>checked[t.id]).length} of ${tasks.length} tasks done</p><div class="win-bar" style="position:relative"><div class="win-bar-fill" style="width:${Math.round(pct*100)}%;background:${sc}"></div><div style="position:absolute;top:-1px;left:${Math.round(WIN_T*100)}%;width:2px;height:6px;background:var(--border2);border-radius:1px"></div><div style="position:absolute;top:-1px;left:${Math.round(CRUSH_T*100)}%;width:2px;height:6px;background:var(--border2);border-radius:1px"></div></div><div class="thresh-pills"><div class="thresh-pill">Win ${Math.round(WIN_T*100)}%</div><div class="thresh-pill">Crush ${Math.round(CRUSH_T*100)}%</div></div></div></div><p class="score-insight">${getInsight(pct,earned,isRestDay)}</p>`;

  if(yRec){const diff=Math.round(pct*100)-Math.round(yRec.pct*100);const dc=diff>0?'#2E9E5B':diff<0?'#E24B4A':'var(--text3)';h+=`<p class="yesterday-line">Yesterday: <strong style="color:${statusColor(yRec.pct,yRec.restDay)}">${Math.round(yRec.pct*100)}%</strong> <span style="color:${dc};font-size:11px">${diff>0?'+'+diff:diff}%</span></p>`;}

  if(missedS.length>0&&pct<WIN_T){h+=`<div class="missed-alert"><div class="missed-label">Critical tasks remaining</div>${missedS.map(t=>`<div class="missed-item">${t.name}<span style="margin-left:auto;font-size:11px;color:var(--text3)">+${t.points}</span></div>`).join('')}</div>`;}

  // Rest day + Reminder toggles here (after score)
  if(!readOnly)h+=`<div class="rest-banner${isRestDay?' active':''}"><div style="flex:1"><div style="font-size:13px;font-weight:500">Rest day</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${isRestDay?`Lighter target — win at ${restSettings.win}%`:'Toggle for travel, recovery, or weekends'}<a style="font-size:11px;color:var(--blue);cursor:pointer;margin-left:6px" onclick="openRestEditor()">Customize</a></div></div><label class="toggle"><input type="checkbox" ${isRestDay?'checked':''} onchange="toggleRestDay()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`;
  if(!readOnly)h+=`<div class="reminder-banner${reminderSettings.enabled?' active':''}"><div style="flex:1"><div style="font-size:13px;font-weight:500">Daily reminder</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${reminderSettings.enabled?`Nudge at ${reminderSettings.time} if day not won`:'Get a nudge if you haven\'t won the day'}</div>${reminderSettings.enabled?`<input type="time" class="time-inp" id="reminder-time" value="${reminderSettings.time}" onchange="updateReminderTime()">`:''}</div><label class="toggle"><input type="checkbox" ${reminderSettings.enabled?'checked':''} onchange="toggleReminder()"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`;
  if(isRestDay){
    const rEss=essentialTasks.filter(t=>restSettings.taskIds.includes(t.id));
    const rTimed=BLOCKS.map(b=>({block:b,tasks:timedTasks.filter(t=>t.block===b&&restSettings.taskIds.includes(t.id))})).filter(({tasks})=>tasks.length);
    if(rEss.length){const ee=rEss.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0),et=rEss.reduce((s,t)=>s+t.points,0);const allDone=rEss.every(t=>checked[t.id]);h+=`<div class="block-header"><span class="block-name${allDone?' all-done':''}">Daily Essentials${allDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${et>0?Math.round(ee/et*100):0}% · ${ee}/${et}</span></div><div class="essentials-block">${rEss.map(t=>taskRow(t,pct,true)).join('')}</div>`;}
    rTimed.forEach(({block,tasks})=>{const be=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0),bt=tasks.reduce((s,t)=>s+t.points,0);const allDone=tasks.every(t=>checked[t.id]);h+=`<div class="block-header"><span class="block-name${allDone?' all-done':''}"> ${block}${allDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${bt>0?Math.round(be/bt*100):0}% · ${be}/${bt}</span></div><div class="block-tasks">${tasks.map(t=>taskRow(t,pct,true)).join('')}</div>`;});
  }else{
    const essEarned=essentialTasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
    const essTotal=essentialTasks.reduce((s,t)=>s+t.points,0);const allEssDone=essentialTasks.every(t=>checked[t.id]);
    h+=`<div class="block-header"><span class="block-name${allEssDone?' all-done':''}">Daily Essentials${allEssDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${essTotal>0?Math.round(essEarned/essTotal*100):0}% · ${essEarned}/${essTotal}</span></div><div class="essentials-block">${essentialTasks.map(t=>taskRow(t,pct,false)).join('')}</div>`;
    BLOCKS.forEach(block=>{
      const bt=timedTasks.filter(t=>t.block===block);if(!bt.length)return;
      const be=bt.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0),bto=bt.reduce((s,t)=>s+t.points,0),allDone=bt.every(t=>checked[t.id]);
      h+=`<div class="block-header"><span class="block-name${allDone?' all-done':''}">${block}${allDone?` <span class="block-done">✓</span>`:''}</span><span class="block-pct">${bto>0?Math.round(be/bto*100):0}% · ${be}/${bto}</span></div><div class="block-tasks">${bt.map(t=>taskRow(t,pct,false)).join('')}</div>`;
      if(block==="Wind Down"&&allDone)h+=`<div class="winddown-done"><span style="font-size:16px">📚</span><div><div style="font-size:13px;font-weight:500;color:#2E9E5B">Tomorrow is set up.</div><div style="font-size:11px;color:var(--text3);margin-top:1px">Wind down complete.</div></div></div>`;
    });
    h+=`<div style="display:flex;gap:14px;margin-top:.75rem;justify-content:center">${Object.entries(TIER).map(([k,v])=>`<div style="display:flex;align-items:center;gap:4px"><span style="font-size:10px;font-weight:500;color:${v.color}">${k}</span><span style="font-size:11px;color:var(--text3)">${v.label}</span></div>`).join('')}</div>`;
  }

  // Action items
  if(actionItems.length){h+=`<div class="action-block"><div class="action-header-row">Action items from coach</div>${actionItems.map((item,i)=>`<div class="action-row" onclick="toggleActionItem(${i})"><div class="checkbox${item.done?' checked':''}" style="${item.done?'background:#2E9E5B;border:none':''}">${item.done?'<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div><span class="action-name${item.done?' done':''}">${item.text}</span></div>`).join('')}</div>`;}

  // Win of day
  if(!readOnly){h+=`<div class="win-of-day"><div class="mini-label">Win of the day</div><textarea class="win-input" id="win-input" placeholder="What was your biggest win today?" oninput="onWinInput()">${winOfDay}</textarea></div>`;}
  else if(winOfDay){h+=`<div class="win-of-day"><div class="mini-label">Win of the day</div><div style="font-size:14px;color:var(--text);line-height:1.6">${winOfDay}</div></div>`;}

  // Identity reflection — end of day
  if((identityStatement)&&!readOnly){
    h+=`<div class="reflect-section" style="border-top:.5px solid rgba(58,126,196,.2)">
      <div class="identity-reflect-card" style="margin-bottom:0">
        <div class="identity-reflect-question">Identity proof — end of day</div>
        <div class="identity-reflect-statement">"${identityStatement}"</div>
        <textarea class="ir-note-inp" id="ir-note" placeholder="Write the specific things you did today that prove you are this person..." oninput="saveIRNote()">${todayIR.note||''}</textarea>
        ${todayIR.note?`<div style="font-size:11px;color:var(--text3);margin-top:6px">✓ Saved</div>`:''}
      </div>
    </div>`;
  }

  // Daily reflection
  h+=`<div class="reflect-section"><div class="reflect-label">Daily reflection</div><textarea class="reflect-input" id="reflection-input" placeholder="How did today go? What came up? What are you proud of?" ${readOnly?'readonly':''} oninput="onReflectionInput()">${todayReflection}</textarea>${!readOnly?`<div class="autosave" id="autosave-ind">${autoSaveStatus}</div>`:''}</div>`;

  if(!readOnly){
    h+=`<div class="settings-row">
      <button class="settings-btn" onclick="openEditor()">✏️ Edit habits</button>
      <button class="settings-btn" onclick="openMailto()">📧 Email summary</button>
      <button class="settings-btn" onclick="exportData()">⬇️ Export</button>
      <button class="settings-btn" onclick="openImport()">⬆️ Import</button>
      <button class="settings-btn danger" onclick="confirmReset()">↺ Reset day</button>
    </div>`;
  }
  return h;
}

function editStatements(){editingStatements=true;render();setTimeout(()=>document.getElementById('why-inp')?.focus(),50);}

async function saveIRNote(){
  const key=todayKey();
  if(!identityReflections[key])identityReflections[key]={rating:0,note:'',time:''};
  identityReflections[key].note=document.getElementById('ir-note')?.value.trim()||'';
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(async()=>{await saveIR();},1200);
}

// ── GOALS TAB ──
function renderGoals(){
  const now=new Date();
  const sections=[
    {type:'weekly',label:'Weekly Goals',emoji:'📅',note:`Resets each Monday — week of ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`},
    {type:'monthly',label:'Monthly Goals',emoji:'📆',note:MONTHS[now.getMonth()]+' '+now.getFullYear()},
    {type:'yearly',label:'Yearly Goals',emoji:'🎯',note:now.getFullYear()+' goals'},
  ];
  let h='';
  sections.forEach(({type,label,emoji,note})=>{
    const list=goals[type]||[];
    const done=list.filter(g=>g.done).length;
    const pct=list.length?done/list.length:0;
    h+=`<div class="goals-section">
      <div class="goals-header">
        <div class="goals-title">${emoji} ${label} <span class="goals-badge">${done}/${list.length}</span></div>
        <button class="add-goal-btn" onclick="startAddGoal('${type}')">+ Add</button>
      </div>
      ${list.length>0?`<div class="goals-progress"><div class="goals-progress-fill" style="width:${Math.round(pct*100)}%"></div></div>`:''}
      ${list.map(g=>`<div class="goal-item${g.done?' done':''}" onclick="toggleGoal('${type}',${g.id})">
        <div class="goal-cb${g.done?' checked':''}">${g.done?'<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3 5.5L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>':''}</div>
        <span class="goal-text${g.done?' done':''}">${g.text}</span>
        <button class="goal-del" onclick="event.stopPropagation();deleteGoal('${type}',${g.id})">×</button>
      </div>`).join('')}
      ${list.length===0?`<div style="font-size:13px;color:var(--text3);padding:8px 0;font-style:italic">No ${type} goals yet.</div>`:''}
      ${addingGoal===type?`<div class="goal-add-row"><input class="goal-inp" id="goal-inp-${type}" placeholder="Add a goal..." onkeydown="if(event.key==='Enter')addGoal('${type}')"><button class="goal-save-btn" onclick="addGoal('${type}')">Add</button></div>`:''}
      <div class="goals-reset-note">${note}</div>
    </div>`;
  });
  return h;
}

// ── WEEK / MONTH ──
function getWeekDates(offset){const now=new Date(),day=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-day+1+(offset*7));return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}

function renderWeek(){
  const dates=getWeekDates(weekOffset),tk=todayKey();
  const label=`${dates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${dates[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
  const hasData=dates.some(d=>allHistory[dateKey(d)]);
  const streak=calcStreak();
  const activeDays=dates.filter(d=>{const r=allHistory[dateKey(d)];return r&&!r.restDay;});
  const won=dates.filter(d=>{const r=allHistory[dateKey(d)];if(!r)return false;return r.pct>=(r.restDay?restSettings.win/100:WIN);}).length;
  const avg=activeDays.length?activeDays.reduce((s,d)=>s+(allHistory[dateKey(d)]?.pct||0),0)/activeDays.length:0;
  let h=`<div class="history-nav"><button class="nav-btn" onclick="shiftWeek(-1)">←</button><span class="nav-title">${label}</span><button class="nav-btn" onclick="shiftWeek(1)">→</button></div>`;
  if(!hasData)return h+`<div class="no-data"><p>No data for this week yet.</p><button class="btn-ghost" onclick="setTab('today')">Go to Today</button></div>`;
  h+=`<div class="summary-row"><div class="summary-card"><div class="summary-val">${won}/7</div><div class="summary-lbl">Days won</div></div><div class="summary-card"><div class="summary-val">${activeDays.length?Math.round(avg*100)+'%':'—'}</div><div class="summary-lbl">Avg (${activeDays.length} active)</div></div><div class="summary-card"><div class="summary-val">${streak} 🔥</div><div class="summary-lbl">Streak</div></div></div><div class="day-grid">`;
  dates.forEach(d=>{const key=dateKey(d),rec=allHistory[key],isToday=key===tk,isFuture=d>new Date()&&!isToday;const pct=rec?rec.pct:null,rest=rec&&rec.restDay;const col=pct!==null?statusColor(pct,rest):'var(--border)';h+=`<div class="day-cell${isToday?' today':''}${isFuture?' future':''}"><div class="day-label">${DAYS[d.getDay()]}</div><div class="day-pct" style="color:${pct!==null?col:'var(--text3)'}">${rest?'R':pct!==null?Math.round(pct*100)+'%':'—'}</div><div class="day-dot" style="background:${col}"></div>${rec&&rec.reflection?`<div style="font-size:9px;color:var(--text3);margin-top:2px">note</div>`:''}</div>`;});
  h+=`</div><div style="margin-bottom:1.25rem">`;
  dates.map(d=>({d,rec:allHistory[dateKey(d)]})).filter(e=>e.rec).forEach(({d,rec})=>{const pct=rec.pct||0,col=statusColor(pct,rec.restDay);h+=`<div class="week-row"><span style="font-size:13px;color:var(--text2)">${d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}${rec.restDay?' <span style="font-size:10px;color:var(--blue)">R</span>':''}</span><div class="week-bar-track"><div class="week-bar-fill" style="width:${Math.round(pct*100)}%;background:${col}"></div></div><span style="font-size:13px;font-weight:500;color:${col};text-align:right">${Math.round(pct*100)}%</span></div>`;});
  h+=`</div><div style="border-top:.5px solid var(--border);padding-top:1.25rem"><div class="reflect-label" style="margin-bottom:1rem">Reflections this week</div>${reflectionCards(dates.map(d=>({d,rec:allHistory[dateKey(d)]})))}</div>`;
  return h;
}

function getMonthDates(offset){const now=new Date(),y=now.getFullYear(),m=now.getMonth()+offset;const first=new Date(y,m,1),last=new Date(y,m+1,0);return{first,last,year:first.getFullYear(),month:first.getMonth()};}
function getStreakRanges(){const ranges=[];let start=null;const sorted=Object.keys(allHistory).sort();sorted.forEach((key,i)=>{const rec=allHistory[key],w=rec&&rec.restDay?restSettings.win/100:WIN,counts=rec&&rec.pct>=w;if(counts&&!start)start=key;else if(!counts&&start){ranges.push({start,end:sorted[i-1]});start=null;}});if(start)ranges.push({start,end:sorted[sorted.length-1]});return ranges;}

function renderMonth(){
  const{first,last,year,month}=getMonthDates(monthOffset);
  const tk=todayKey(),daysInMonth=last.getDate(),startDay=first.getDay();
  const daysData=Array.from({length:daysInMonth},(_,i)=>{const d=new Date(year,month,i+1);return{day:i+1,key:dateKey(d),rec:allHistory[dateKey(d)],d};});
  const hasData=daysData.some(({rec})=>rec);
  const streak=calcStreak();const activeDays=daysData.filter(({rec})=>rec&&!rec.restDay);
  const won=daysData.filter(({rec})=>{if(!rec)return false;return rec.pct>=(rec.restDay?restSettings.win/100:WIN);}).length;
  const avg=activeDays.length?activeDays.reduce((s,{rec})=>s+(rec?.pct||0),0)/activeDays.length:0;
  const streakRanges=getStreakRanges();const isInStreak=key=>streakRanges.some(r=>key>=r.start&&key<=r.end);
  let h=`<div class="history-nav"><button class="nav-btn" onclick="shiftMonth(-1)">←</button><span class="nav-title">${MONTHS[month]} ${year}</span><button class="nav-btn" onclick="shiftMonth(1)">→</button></div>`;
  if(!hasData)return h+`<div class="no-data"><p>No data for ${MONTHS[month]} yet.</p><button class="btn-ghost" onclick="setTab('today')">Go to Today</button></div>`;
  h+=`<div class="summary-row"><div class="summary-card"><div class="summary-val">${won}</div><div class="summary-lbl">Days won</div></div><div class="summary-card"><div class="summary-val">${activeDays.length?Math.round(avg*100)+'%':'—'}</div><div class="summary-lbl">Avg (${activeDays.length} active)</div></div><div class="summary-card"><div class="summary-val">${streak} 🔥</div><div class="summary-lbl">Streak</div></div></div><div class="month-grid">`;
  DAYS.forEach(d=>{h+=`<div class="month-hdr">${d[0]}</div>`;});
  for(let i=0;i<startDay;i++)h+=`<div class="month-cell empty"></div>`;
  daysData.forEach(({day,key,rec,d})=>{const isToday=key===tk,isFuture=d>new Date()&&!isToday;const pct=rec?rec.pct:null,rest=rec&&rec.restDay,inStreak=isInStreak(key);let bg='var(--bg2)',color='var(--text3)';if(pct!==null&&!isFuture){const sc=statusColor(pct,rest);bg=sc+'22';color=sc;}h+=`<div class="month-cell${rec?' has-data':''}${isToday?' today-cell':''}" style="background:${bg};opacity:${isFuture?0.3:1}"><span style="color:${color}">${rest?'R':day}</span>${inStreak&&!isFuture?`<div class="streak-dot"></div>`:''}</div>`;});
  h+=`</div><div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem;row-gap:5px"><div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#2E9E5B22;border:.5px solid #2E9E5B"></div><span style="font-size:11px;color:var(--text3)">Crushing it</span></div><div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#3A7EC422;border:.5px solid #3A7EC4"></div><span style="font-size:11px;color:var(--text3)">Day won</span></div><div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#C8891A22;border:.5px solid #C8891A"></div><span style="font-size:11px;color:var(--text3)">Building</span></div><div style="display:flex;align-items:center;gap:5px"><div style="width:4px;height:4px;border-radius:50%;background:#E8A020"></div><span style="font-size:11px;color:var(--text3)">Streak</span></div></div><div style="border-top:.5px solid var(--border);padding-top:1.25rem"><div class="reflect-label" style="margin-bottom:1rem">Reflections this month</div>${reflectionCards(daysData.map(({d,rec})=>({d,rec})))}</div>`;
  return h;
}

function reflectionCards(entries){
  const withR=entries.filter(({rec})=>rec&&(rec.reflection||rec.winOfDay));
  if(!withR.length)return`<p style="font-size:13px;color:var(--text3);padding:1rem 0">No reflections written yet.</p>`;
  return withR.map(({d,rec})=>{const timeStr=rec.reflectionTime?new Date(rec.reflectionTime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):'';return`<div class="reflect-card"><div class="reflect-card-date"><span>${d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}${timeStr?` · ${timeStr}`:''}${rec.restDay?' · Rest day':''}${rec.mood?` · Mood ${rec.mood}/5`:''}</span><span style="font-weight:500;color:${statusColor(rec.pct||0,rec.restDay)}">${Math.round((rec.pct||0)*100)}%</span></div>${rec.winOfDay?`<div style="font-size:12px;color:var(--orange);font-weight:500;margin-bottom:4px">🏆 ${rec.winOfDay}</div>`:''}${rec.reflection?`<div class="reflect-card-text">${rec.reflection}</div>`:''}</div>`;}).join('');
}

// ── OVERLAYS ──
function showOv(html){const ov=document.getElementById('ov');ov.style.display='block';ov.innerHTML=html;}
function closeOv(){const ov=document.getElementById('ov');ov.style.display='none';ov.innerHTML='';showEditor=false;showImport=false;showRestEditor=false;}
function renderOvContent(){if(showEditor)showOv(renderEditorModal());else if(showImport)showOv(renderImportModal());else if(showRestEditor)showOv(renderRestEditorModal());}

function renderEditorModal(){
  const blocks=[...BLOCKS.map(b=>({label:b,tasks:timedTasks.filter(t=>t.block===b),type:'timed'})),{label:"Daily Essentials",tasks:essentialTasks,type:'essential'}];
  let h=`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal"><div class="modal-title">Edit habits</div><div style="margin-bottom:1rem"><div class="esec-label" style="margin-bottom:7px">Add task to block</div><select class="block-sel" id="new-task-block">${BLOCKS.map(b=>`<option value="timed:${b}">${b}</option>`).join('')}<option value="essential:Daily Essentials">Daily Essentials</option></select><button class="btn-ghost" style="width:auto" onclick="addTaskFromSelect()">+ Add task</button></div>`;
  blocks.forEach(({label,tasks,type})=>{if(!tasks.length)return;h+=`<div class="esec"><div class="esec-label">${label}</div>`;tasks.forEach(task=>{h+=`<div class="editor-row"><input class="e-inp" value="${task.name.replace(/"/g,'&quot;').replace(/'/g,"&#39;")}" onchange="updateTask(${task.id},'name',this.value,'${type}')"><input class="e-pts" type="number" value="${task.points}" min="1" max="30" onchange="updateTask(${task.id},'points',parseInt(this.value)||1,'${type}')"><select class="e-tier" onchange="updateTask(${task.id},'tier',this.value,'${type}')"><option${task.tier==='S'?' selected':''}>S</option><option${task.tier==='A'?' selected':''}>A</option><option${task.tier==='B'?' selected':''}>B</option></select><button class="del-btn" onclick="deleteTask(${task.id},'${type}')">×</button></div>`;});h+=`</div>`;});
  h+=`<div class="modal-actions"><button class="btn-save" onclick="saveEdits()">Save changes</button><button class="btn-cancel" onclick="closeOv()">Cancel</button></div></div></div>`;return h;
}
function renderImportModal(){return`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal"><div class="modal-title">Import data</div><p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">Paste your previously exported JSON.</p><textarea class="import-area" id="import-textarea" placeholder="Paste exported JSON here..."></textarea>${importError?`<p style="font-size:12px;color:var(--red);margin-top:5px">${importError}</p>`:''}<div class="modal-actions"><button class="btn-save" onclick="doImport()">Import</button><button class="btn-cancel" onclick="closeOv()">Cancel</button></div></div></div>`;}

function renderRestEditorModal(){
  const grouped=[{label:"Daily Essentials",tasks:essentialTasks},...BLOCKS.map(b=>({label:b,tasks:timedTasks.filter(t=>t.block===b)})).filter(({tasks})=>tasks.length)];
  const rt=restSettings.taskIds.reduce((s,id)=>{const t=allTasks().find(t=>t.id===id);return s+(t?t.points:0);},0);
  return`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal"><div class="modal-title">Customize rest day</div><div class="modal-sub">Tasks and thresholds for lighter days.</div><div class="esec"><div class="thresh-row"><label>Win at</label><input type="range" min="20" max="80" step="5" value="${restSettings.win}" oninput="restSettings.win=parseInt(this.value);document.getElementById('rv-win').textContent=this.value+'%';updateRestPreview()"><span class="thresh-val" id="rv-win">${restSettings.win}%</span></div><div class="thresh-row"><label>Crush at</label><input type="range" min="40" max="95" step="5" value="${restSettings.crush}" oninput="restSettings.crush=parseInt(this.value);document.getElementById('rv-crush').textContent=this.value+'%';updateRestPreview()"><span class="thresh-val" id="rv-crush">${restSettings.crush}%</span></div><div class="rest-preview-txt" id="rest-preview-txt"><strong>${restSettings.taskIds.length} tasks</strong> · <strong>${rt} pts total</strong> · Win at <strong>${Math.ceil(restSettings.win/100*rt)} pts</strong> · Crush at <strong>${Math.ceil(restSettings.crush/100*rt)} pts</strong></div></div><div class="esec"><div class="esec-label"><span>Active tasks on rest day</span><span>${restSettings.taskIds.length} selected</span></div><div class="rest-task-list">${grouped.map(({label,tasks})=>`<div><div class="rtg-label">${label}</div>${tasks.map(t=>{const on=restSettings.taskIds.includes(t.id);return`<div class="rest-task-row" onclick="toggleRestTask(${t.id})"><div class="rest-cb${on?' on':''}">${on?'<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5.5L7 1" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>':''}</div><span style="flex:1;font-size:13px">${t.name}</span><span style="font-size:11px;color:var(--text3)">+${t.points}</span></div>`;}).join('')}</div>`).join('')}</div></div><div class="modal-actions"><button class="btn-save" onclick="saveRestEditor()">Save</button><button class="btn-cancel" onclick="closeOv()">Cancel</button></div></div></div>`;
}

function updateRestPreview(){const rt=restSettings.taskIds.reduce((s,id)=>{const t=allTasks().find(t=>t.id===id);return s+(t?t.points:0);},0);const el=document.getElementById('rest-preview-txt');if(el)el.innerHTML=`<strong>${restSettings.taskIds.length} tasks</strong> · <strong>${rt} pts total</strong> · Win at <strong>${Math.ceil(restSettings.win/100*rt)} pts</strong> · Crush at <strong>${Math.ceil(restSettings.crush/100*rt)} pts</strong>`;}
function toggleRestTask(id){if(restSettings.taskIds.includes(id))restSettings.taskIds=restSettings.taskIds.filter(x=>x!==id);else restSettings.taskIds=[...restSettings.taskIds,id];renderOvContent();}
function addTaskFromSelect(){const val=document.getElementById('new-task-block')?.value||'timed:Morning';const[type,block]=val.split(':');const newTask={id:nextId++,name:"New task",points:5,tier:"B"};if(type==='essential')essentialTasks.push(newTask);else{newTask.block=block;timedTasks.push(newTask);}renderOvContent();}
function deleteTask(id,type){if(type==='essential')essentialTasks=essentialTasks.filter(t=>t.id!==id);else timedTasks=timedTasks.filter(t=>t.id!==id);renderOvContent();}
function updateTask(id,field,value,type){const arr=type==='essential'?essentialTasks:timedTasks;const task=arr.find(t=>t.id===id);if(task)task[field]=value;}
async function saveEdits(){await saveTasks();closeOv();render();}
async function saveRestEditor(){await saveRest();closeOv();render();}
function openEditor(){showEditor=true;showImport=false;showRestEditor=false;showOv(renderEditorModal());}
function openImport(){showImport=true;showEditor=false;showRestEditor=false;showOv(renderImportModal());}
function openRestEditor(){showRestEditor=true;showEditor=false;showImport=false;showOv(renderRestEditorModal());}

async function toggle(id,event){
  if(adminClientId)return;
  const tasks=isRestDay?restTasks():allTasks(),tot=isRestDay?restTotal():total();
  const earned=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  prevWonState=earned/tot>=(isRestDay?restSettings.win/100:WIN);
  const wasChecked=!!checked[id];
  checked[id]=!checked[id];

  // ── Instant DOM update — no full re-render ──
  const taskEl=document.getElementById(`tr-${id}`);
  const task=tasks.find(t=>t.id===id);
  if(taskEl&&task){
    const cb=taskEl.querySelector('.checkbox');
    const name=taskEl.querySelector('.task-name');
    const isDone=!!checked[id];
    if(isDone){
      taskEl.classList.add('done');
      if(task.tier==='S')taskEl.classList.add('s-tier');
      cb.classList.add('checked');
      cb.innerHTML='<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      if(name)name.classList.add('done');
      // Dopamine spike
      spawnPointsPop(taskEl,task.points,task.tier);
    }else{
      taskEl.classList.remove('done');
      cb.classList.remove('checked');
      cb.innerHTML='';
      if(name)name.classList.remove('done');
    }
    // Update score circle without full render
    updateScoreInPlace();
  }

  // Save in background
  saveDay().then(()=>{
    // Only do a full render if celebration triggered
    if(showCelebration)render();
  });
}

function updateScoreInPlace(){
  const tasks=isRestDay?restTasks():allTasks();
  const tot=isRestDay?restTotal():total();
  const earned=tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const pct=tot>0?earned/tot:0;
  const sc=statusColor(pct,isRestDay);
  const R=58,C=2*Math.PI*R,d=Math.min(pct,1)*C;
  // Update SVG circle
  const circle=document.querySelector('.score-card circle:last-of-type');
  if(circle){circle.setAttribute('stroke-dasharray',`${d} ${C}`);circle.setAttribute('stroke',sc);}
  // Update % text
  const texts=document.querySelectorAll('.score-card text');
  if(texts[0])texts[0].textContent=Math.round(pct*100)+'%';
  if(texts[1])texts[1].textContent=`${earned} / ${tot} pts`;
  // Update status text
  const statusEl=document.querySelector('.score-card p');
  if(statusEl){statusEl.textContent=statusText(pct,isRestDay);statusEl.style.color=sc;}
  // Update tasks done count
  const countEl=document.querySelectorAll('.score-card p')[1];
  if(countEl)countEl.textContent=`${tasks.filter(t=>checked[t.id]).length} of ${tasks.length} tasks done`;
  // Update win bar
  const barFill=document.querySelector('.win-bar-fill');
  if(barFill){barFill.style.width=Math.round(pct*100)+'%';barFill.style.background=sc;}
  // Update insight
  const insight=document.querySelector('.score-insight');
  if(insight)insight.innerHTML=getInsight(pct,earned,isRestDay);
  // Update block headers
  updateBlockHeaders();
}

function updateBlockHeaders(){
  // Update each block header pct and done state
  const allT=isRestDay?restTasks():allTasks();
  const groups={};
  allT.forEach(t=>{
    const key=t.block||'essential';
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  document.querySelectorAll('.block-header').forEach(header=>{
    const nameEl=header.querySelector('.block-name');
    const pctEl=header.querySelector('.block-pct');
    if(!nameEl)return;
    const blockText=nameEl.textContent.replace('✓','').trim();
    const blockTasks=allT.filter(t=>(t.block||'Daily Essentials')===blockText||blockText==='Daily Essentials'&&!t.block);
    if(!blockTasks.length)return;
    const be=blockTasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
    const bt=blockTasks.reduce((s,t)=>s+t.points,0);
    const allDone=blockTasks.every(t=>checked[t.id]);
    nameEl.classList.toggle('all-done',allDone);
    const doneSpan=nameEl.querySelector('.block-done');
    if(allDone&&!doneSpan)nameEl.innerHTML+=` <span class="block-done">✓</span>`;
    else if(!allDone&&doneSpan)doneSpan.remove();
    if(pctEl)pctEl.textContent=`${bt>0?Math.round(be/bt*100):0}% · ${be}/${bt}`;
  });
}

async function confirmReset(){if(confirm('Reset today?')){checked={};mood=0;winOfDay='';await saveDay();render();}}
function setTab(t){activeTab=t;render();}
function shiftWeek(d){weekOffset+=d;render();}
function shiftMonth(d){monthOffset+=d;render();}

// ── BOOT ──
// Fallback: if nothing renders within 6 seconds, force auth screen
setTimeout(()=>{
  const root=document.getElementById('root');
  if(root&&root.querySelector('.loading')){
    currentUser=null;currentProfile=null;resetAppState();renderAuth();
  }
},6000);

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='TOKEN_REFRESHED'||event==='SIGNED_IN'){if(session){currentUser=session.user;await renderRoot();}}
  else if(event==='SIGNED_OUT'){currentUser=null;currentProfile=null;resetAppState();renderAuth();}
  else if(session){currentUser=session.user;await renderRoot();}
  else{currentUser=null;currentProfile=null;resetAppState();renderAuth();}
});

// Also try immediately in case onAuthStateChange doesn't fire
sb.auth.getSession().then(({data:{session}})=>{
  const root=document.getElementById('root');
  if(root&&root.querySelector('.loading')){
    if(session){currentUser=session.user;renderRoot();}
    else{currentUser=null;currentProfile=null;resetAppState();renderAuth();}
  }
}).catch(()=>{
  const root=document.getElementById('root');
  if(root&&root.querySelector('.loading'))renderAuth();
});
window.addEventListener('unhandledrejection',(e)=>{
  if(e.reason?.message?.includes('Lock')||e.reason?.message?.includes('lock')){
    e.preventDefault();sb.auth.getSession().then(({data:{session}})=>{if(session&&!currentUser){currentUser=session.user;renderRoot();}}).catch(()=>{});
  }
});
</script>
