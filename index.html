<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win the Day</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#f5f5f7;--text:#1d1d1f;--text2:#3a3a3c;--text3:#8e8e93;
  --border:#e5e5ea;--border2:#c7c7cc;--r:8px;--rl:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:"SF Mono","Fira Code",monospace;
  --blue:#3A7EC4;--green:#2E9E5B;--orange:#C8891A;--red:#E24B4A;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--text:#f2f2f7;--text2:#ebebf5cc;--text3:#8e8e93;
  --border:#38383a;--border2:#48484a;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);}

/* ── Shared ── */
.screen{max-width:460px;margin:80px auto;padding:2rem 1.5rem;background:var(--bg2);border-radius:var(--rl);border:.5px solid var(--border);}
.screen h1{font-size:22px;margin-bottom:6px;}
.screen p{font-size:13px;color:var(--text3);margin-bottom:1.5rem;line-height:1.6;}
.lbl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;}
.inp{width:100%;padding:9px 12px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-bottom:1rem;font-family:var(--font);}
.inp:focus{border-color:var(--border2);}
.btn-primary{width:100%;padding:11px;border-radius:var(--r);background:var(--text);color:var(--bg);border:none;font-size:14px;cursor:pointer;font-family:var(--font);margin-bottom:8px;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:none;border:.5px solid var(--border);border-radius:var(--r);padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);}
.btn-sm{padding:5px 13px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:var(--font);border:none;}
.btn-green{background:var(--green);color:#fff;}
.btn-outline-red{background:none;color:var(--red);border:.5px solid var(--red);border-radius:var(--r);padding:5px 13px;font-size:12px;cursor:pointer;font-family:var(--font);}
.err{font-size:12px;color:var(--red);margin-bottom:10px;min-height:18px;}
.lnk{font-size:13px;color:var(--blue);cursor:pointer;text-align:center;display:block;margin-top:10px;}
.loading{text-align:center;padding:5rem 1rem;font-size:14px;color:var(--text3);}
.top-bar{display:flex;justify-content:flex-end;align-items:center;padding:8px 14px;background:var(--bg2);border-bottom:.5px solid var(--border);gap:8px;position:sticky;top:0;z-index:50;}
.top-bar-email{font-size:12px;color:var(--text3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.top-bar-btn{font-size:12px;padding:4px 12px;border-radius:var(--r);border:.5px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:var(--font);}

/* ── Levels ── */
.level-card{border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;border:.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:14px;}
.level-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.xp-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.xp-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;}
.badge-streak{background:rgba(232,160,32,.12);color:var(--orange);border:.5px solid rgba(232,160,32,.3);}
.badge-crush{background:rgba(46,158,91,.12);color:var(--green);border:.5px solid rgba(46,158,91,.3);}
.badge-perfect{background:rgba(58,126,196,.12);color:var(--blue);border:.5px solid rgba(58,126,196,.3);}
.pr-card{display:flex;gap:10px;margin-bottom:12px;}
.pr-item{flex:1;background:var(--bg2);border-radius:var(--r);padding:10px;border:.5px solid var(--border);text-align:center;}
.pr-val{font-size:20px;font-weight:500;color:var(--text);}
.pr-lbl{font-size:10px;color:var(--text3);margin-top:2px;}

/* ── Tracker ── */
.tracker{max-width:560px;margin:0 auto;padding:1rem 1rem 3rem;}
.tabs{display:flex;gap:3px;margin-bottom:1.25rem;background:var(--bg2);border-radius:var(--r);padding:3px;border:.5px solid var(--border);}
.tab{flex:1;text-align:center;font-size:13px;padding:6px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--bg);color:var(--text);font-weight:500;border:.5px solid var(--border);}
.mini-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;}
.statement-card{border-radius:var(--rl);padding:13px 15px;margin-bottom:12px;border:.5px solid var(--border);background:var(--bg2);position:relative;}
.statement-text{font-size:14px;color:var(--text);line-height:1.6;font-style:italic;}
.statement-input{width:100%;font-size:14px;color:var(--text);background:none;border:none;outline:none;resize:none;line-height:1.6;font-family:var(--font);font-style:italic;min-height:48px;}
.identity-divider{padding-top:10px;margin-top:10px;border-top:.5px solid var(--border);}
.identity-text{font-size:14px;color:var(--text);font-weight:500;line-height:1.5;}
.identity-input{width:100%;font-size:14px;color:var(--text);background:none;border:none;outline:none;resize:none;line-height:1.5;font-family:var(--font);font-weight:500;min-height:36px;}
.edit-btn{position:absolute;top:10px;right:12px;font-size:11px;color:var(--text3);background:none;border:.5px solid var(--border);border-radius:var(--r);padding:3px 8px;cursor:pointer;}
.save-btn{margin-top:8px;font-size:12px;padding:5px 14px;border-radius:var(--r);background:var(--bg);border:.5px solid var(--border2);cursor:pointer;color:var(--text);}
.mood-row{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;margin-bottom:12px;background:var(--bg2);border-radius:var(--rl);border:.5px solid var(--border);}
.mood-btns{display:flex;gap:5px;}
.mood-btn{width:30px;height:30px;border-radius:50%;border:.5px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.mood-btn.sel{background:var(--blue);color:#fff;border-color:var(--blue);}
.score-card{display:flex;align-items:center;gap:1.5rem;margin-bottom:12px;background:var(--bg2);border-radius:var(--rl);padding:1.25rem 1.5rem;border:.5px solid var(--border);}
.score-insight{font-size:12px;color:var(--text3);margin-bottom:12px;padding:0 2px;line-height:1.5;}
.score-insight strong{color:var(--text2);}
.yesterday-line{font-size:11px;color:var(--text3);margin-top:-8px;margin-bottom:12px;padding:0 2px;}
.thresh-pills{display:flex;gap:6px;margin-top:8px;}
.thresh-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);border:.5px solid var(--border);color:var(--text2);}
.win-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;position:relative;}
.win-bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.rest-day-badge{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(58,126,196,.12);color:var(--blue);border:.5px solid rgba(58,126,196,.25);margin-bottom:4px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.missed-alert{background:rgba(200,137,26,.06);border:.5px solid rgba(200,137,26,.25);border-radius:var(--rl);padding:11px 13px;margin-bottom:12px;}
.missed-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--orange);margin-bottom:7px;font-weight:500;}
.missed-item{font-size:13px;color:var(--text2);padding:2px 0;display:flex;align-items:center;gap:8px;}
.missed-item::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.block-name{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:5px;}
.block-done{font-size:11px;color:var(--green);opacity:.8;}
.block-pct{font-size:11px;color:var(--text3);}
.block-tasks{background:var(--bg2);border-radius:var(--rl);overflow:hidden;border:.5px solid var(--border);margin-bottom:12px;}
.essentials-block{background:var(--bg2);border-radius:var(--rl);overflow:hidden;border:1.5px solid var(--border2);margin-bottom:12px;}
.task-row{display:flex;align-items:center;gap:11px;padding:9px 13px;cursor:pointer;border-top:.5px solid var(--border);transition:background .15s;position:relative;}
.task-row:first-child{border-top:none;}
.task-row:hover{background:var(--bg);}
.task-row.done{background:var(--bg);}
.task-row.s-tier::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--orange);opacity:.5;}
.task-row.s-tier.done::before{opacity:.2;}
.checkbox{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.checkbox.checked{border:none;}
.task-name{flex:1;font-size:14px;color:var(--text);transition:all .2s;line-height:1.4;}
.task-name.done{color:var(--text3);text-decoration:line-through;}
.task-sub{display:block;font-size:11px;color:var(--text3);margin-top:1px;}
.tier-badge{font-size:10px;font-weight:500;width:16px;text-align:center;}
.task-pts{font-size:12px;color:var(--text3);min-width:28px;text-align:right;}
.action-block{background:rgba(58,126,196,.04);border-radius:var(--rl);overflow:hidden;border:.5px solid rgba(58,126,196,.3);margin-bottom:12px;}
.action-header-row{padding:8px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);font-weight:500;}
.action-row{display:flex;align-items:center;gap:11px;padding:8px 13px;border-top:.5px solid rgba(58,126,196,.15);cursor:pointer;}
.action-name{flex:1;font-size:14px;color:var(--text);}
.action-name.done{color:var(--text3);text-decoration:line-through;}
.win-of-day{background:var(--bg2);border-radius:var(--rl);border:.5px solid var(--border);padding:13px 15px;margin-bottom:12px;}
.win-input{width:100%;font-size:14px;color:var(--text);background:none;border:none;outline:none;resize:none;line-height:1.6;font-family:var(--font);min-height:48px;}
.winddown-done{background:rgba(46,158,91,.06);border:.5px solid rgba(46,158,91,.2);border-radius:var(--rl);padding:11px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.reflect-section{margin-top:1.5rem;border-top:.5px solid var(--border);padding-top:1.25rem;}
.reflect-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:7px;}
.reflect-input{width:100%;min-height:90px;font-size:14px;color:var(--text);background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rl);padding:11px 13px;outline:none;resize:none;line-height:1.6;font-family:var(--font);}
.reflect-input:focus{border-color:var(--border2);}
.autosave{font-size:11px;color:var(--text3);margin-top:5px;height:16px;}
.action-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:1.25rem;}
.action-btn{padding:9px 11px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);font-size:13px;cursor:pointer;color:var(--text2);text-align:center;transition:all .15s;font-family:var(--font);}
.action-btn:hover{background:var(--bg);color:var(--text);}
.action-btn.danger:hover{border-color:var(--red);color:var(--red);}
.streak-banner{background:linear-gradient(135deg,rgba(232,160,32,.1),rgba(200,137,26,.04));border:.5px solid rgba(232,160,32,.25);border-radius:var(--rl);padding:9px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.celebrate-banner{border-radius:var(--rl);padding:11px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px;animation:fadeIn .4s ease;}
.celebrate-banner.won{background:rgba(58,126,196,.08);border:.5px solid rgba(58,126,196,.3);}
.celebrate-banner.crush{background:rgba(46,158,91,.08);border:.5px solid rgba(46,158,91,.3);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.rest-banner{border-radius:var(--rl);padding:11px 15px;margin-bottom:12px;border:.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.rest-banner.active{border-color:var(--blue);background:rgba(58,126,196,.06);}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:background .2s;}
.toggle input:checked+.toggle-track{background:var(--blue);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;}
.toggle input:checked~.toggle-thumb{transform:translateX(18px);}

/* ── History ── */
.history-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.nav-btn{background:none;border:.5px solid var(--border);border-radius:var(--r);padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:var(--font);}
.nav-title{font-size:15px;font-weight:500;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.25rem;}
.day-cell{border-radius:var(--r);padding:7px 3px;text-align:center;border:.5px solid var(--border);background:var(--bg2);}
.day-cell.today{border:1.5px solid var(--border2);}
.day-cell.future{opacity:.35;}
.day-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.day-pct{font-size:14px;font-weight:500;}
.day-dot{width:5px;height:5px;border-radius:50%;margin:3px auto 0;}
.week-row{display:grid;grid-template-columns:90px 1fr 50px;align-items:center;gap:11px;padding:9px 0;border-top:.5px solid var(--border);}
.week-row:first-child{border-top:none;}
.week-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.week-bar-fill{height:100%;border-radius:3px;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem;}
.month-hdr{font-size:10px;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.04em;padding-bottom:3px;}
.month-cell{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;border:.5px solid transparent;}
.month-cell.has-data{border-color:var(--border);}
.month-cell.today-cell{border:1.5px solid var(--border2);}
.month-cell.empty{background:none;}
.streak-dot{width:3px;height:3px;border-radius:50%;background:#E8A020;margin-top:2px;}
.summary-row{display:flex;gap:10px;margin-bottom:1.25rem;}
.summary-card{flex:1;background:var(--bg2);border-radius:var(--r);padding:11px;border:.5px solid var(--border);text-align:center;}
.summary-val{font-size:21px;font-weight:500;}
.summary-lbl{font-size:11px;color:var(--text3);margin-top:1px;}
.reflect-card{background:var(--bg2);border-radius:var(--rl);padding:13px 15px;border:.5px solid var(--border);margin-bottom:9px;}
.reflect-card-date{font-size:11px;color:var(--text3);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:3px;}
.reflect-card-text{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
.no-data{text-align:center;padding:3rem 1rem;}
.no-data p{font-size:13px;color:var(--text3);margin-bottom:1rem;}

/* ── Overlay ── */
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:100;overflow-y:auto;}
.modal{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--border);width:100%;max-width:520px;padding:1.5rem;margin:auto;}
.modal-title{font-size:17px;font-weight:500;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:1.25rem;line-height:1.5;}
.esec{margin-bottom:1.25rem;}
.esec-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.editor-row{display:grid;grid-template-columns:1fr 46px 42px 22px;gap:5px;align-items:center;margin-bottom:5px;}
.e-inp{font-size:13px;padding:6px 9px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;font-family:var(--font);}
.e-pts{font-size:13px;padding:6px 3px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;text-align:center;font-family:var(--font);}
.e-tier{font-size:12px;padding:6px 2px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;font-family:var(--font);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;}
.del-btn:hover{color:var(--red);}
.modal-actions{display:flex;gap:8px;margin-top:1rem;}
.btn-save{padding:8px 18px;border-radius:var(--r);background:var(--text);color:var(--bg);border:none;font-size:13px;cursor:pointer;font-family:var(--font);}
.btn-cancel{padding:8px 18px;border-radius:var(--r);background:none;color:var(--text2);border:.5px solid var(--border);font-size:13px;cursor:pointer;font-family:var(--font);}
.block-sel{font-size:13px;padding:6px 9px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);width:100%;outline:none;font-family:var(--font);margin-bottom:9px;}
.import-area{width:100%;min-height:80px;font-size:12px;padding:9px;border-radius:var(--r);border:.5px solid var(--border);background:var(--bg2);color:var(--text);resize:none;outline:none;font-family:var(--mono);}
.thresh-row{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.thresh-row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:56px;}
.thresh-row input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none;}
.thresh-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--blue);cursor:pointer;}
.thresh-val{font-size:14px;font-weight:500;color:var(--blue);min-width:36px;text-align:right;}
.rest-preview-txt{font-size:12px;color:var(--text3);padding:7px 11px;background:var(--bg2);border-radius:var(--r);border:.5px solid var(--border);margin-bottom:.9rem;line-height:1.6;}
.rest-preview-txt strong{color:var(--text2);}
.rest-task-list{background:var(--bg2);border-radius:var(--rl);overflow:hidden;border:.5px solid var(--border);margin-bottom:.9rem;max-height:300px;overflow-y:auto;}
.rtg-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:6px 12px 3px;font-weight:500;}
.rest-task-row{display:flex;align-items:center;gap:9px;padding:8px 12px;border-top:.5px solid var(--border);cursor:pointer;}
.rest-task-row:hover{background:var(--bg);}
.rest-cb{width:15px;height:15px;border-radius:3px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;}
.rest-cb.on{background:var(--blue);border-color:var(--blue);}

/* ── Admin ── */
.admin{max-width:560px;margin:0 auto;padding:1rem 1rem 3rem;}
.admin-tabs{display:flex;gap:3px;margin-bottom:1.25rem;background:var(--bg2);border-radius:var(--r);padding:3px;border:.5px solid var(--border);}
.admin-tab{flex:1;text-align:center;font-size:13px;padding:6px;border-radius:6px;cursor:pointer;color:var(--text2);}
.admin-tab.active{background:var(--bg);color:var(--text);font-weight:500;border:.5px solid var(--border);}
.user-card{background:var(--bg2);border-radius:var(--rl);padding:13px 15px;border:.5px solid var(--border);margin-bottom:9px;}
.user-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:rgba(58,126,196,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--blue);flex-shrink:0;}
.user-stats{display:flex;gap:8px;margin-bottom:8px;}

// ── LEVELS ──────────────────────────────────────────────────────────────────
const LEVELS = [
  { name:'Bronze',   min:0,   max:10,  icon:'🥉', color:'#CD7F32' },
  { name:'Silver',   min:10,  max:30,  icon:'🥈', color:'#A8A9AD' },
  { name:'Gold',     min:30,  max:75,  icon:'🥇', color:'#D4A853' },
  { name:'Platinum', min:75,  max:150, icon:'💎', color:'#C0C0C0' },
  { name:'Diamond',  min:150, max:365, icon:'💠', color:'#64D2FF' },
  { name:'Obsidian', min:365, max:9999,icon:'⬛', color:'#B39DDB' },
];

function getLevel(n) {
  for (let i = LEVELS.length - 1; i >= 0; i--) { if (n >= LEVELS[i].min) return { ...LEVELS[i], index: i }; }
  return { ...LEVELS[0], index: 0 };
}
function getLevelProgress(n) {
  const lv = getLevel(n);
  if (lv.index === LEVELS.length - 1) return { lv, pct: 1, toNext: 0, nextName: '' };
  return { lv, pct: (n - lv.min) / (lv.max - lv.min), toNext: lv.max - n, nextName: LEVELS[lv.index + 1].name };
}

    await sb.from('wtd_store').upsert({ key: `${id}:${key}`, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });

// ── AUTH ────────────────────────────────────────────────────────────────────
async function signUp() {
  const email = document.getElementById('a-email').value.trim(), pw = document.getElementById('a-pw').value;
  const errEl = document.getElementById('a-err'), btn = document.getElementById('a-btn');
  errEl.textContent = ''; btn.disabled = true; btn.textContent = 'Creating…';
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if (error) { errEl.textContent = error.message; btn.disabled = false; btn.textContent = 'Create account'; return; }
  const isAdmin = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  await sb.from('wtd_profiles').upsert({ id: data.user.id, email, approved: isAdmin, is_admin: isAdmin }, { onConflict: 'id' });
  btn.disabled = false; btn.textContent = 'Create account';
}

async function signIn() {
  const email = document.getElementById('a-email').value.trim(), pw = document.getElementById('a-pw').value;
  const errEl = document.getElementById('a-err'), btn = document.getElementById('a-btn');
  errEl.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { errEl.textContent = error.message; btn.disabled = false; btn.textContent = 'Sign in'; }
}

async function signOut() { await sb.auth.signOut(); currentUser = null; currentProfile = null; resetAppState(); }

async function loadProfile(uid) { const { data } = await sb.from('wtd_profiles').select('*').eq('id', uid).maybeSingle(); return data; }

function toggleAuthView() { authView = authView === 'login' ? 'signup' : 'login'; renderAuth(); }

// ── ADMIN ────────────────────────────────────────────────────────────────────
async function loadAllProfiles() { const { data } = await sb.from('wtd_profiles').select('*').order('created_at', { ascending: false }); return data || []; }
async function approveUser(id) { await sb.from('wtd_profiles').update({ approved: true }).eq('id', id); renderAdmin(); }
async function removeUser(id) { if (!confirm('Remove this user?')) return; await sb.from('wtd_profiles').delete().eq('id', id); renderAdmin(); }
function setAdminView(v) { adminView = v; renderAdmin(); }

async function renderAdmin() {
  const profiles = await loadAllProfiles();
  const pending = profiles.filter(p => !p.approved);
  const approved = profiles.filter(p => p.approved && p.id !== currentUser.id);
  const statsMap = {};
  for (const p of approved) {
    try {
      const r = await storage.get('wtd-history', p.id);
      if (r) {
        const hist = JSON.parse(r.value), keys = Object.keys(hist).sort();
        const won = keys.filter(k => hist[k].pct >= WIN).length;
        const lastDate = keys.length ? new Date(keys[keys.length - 1]) : null;
        const daysSince = lastDate ? Math.floor((new Date() - lastDate) / 86400000) : null;
        statsMap[p.id] = { won, daysSince, todayPct: hist[todayKey()] ? hist[todayKey()].pct : null };
      }
    } catch(e) {}
  }

  const list = adminView === 'pending' ? pending : approved;
  let html = `
    <div class="top-bar">
      <span class="top-bar-email">${currentUser.email}</span>
      <button class="top-bar-btn" onclick="switchToMyTracker()">My Tracker</button>
      <button class="top-bar-btn" onclick="signOut()">Sign out</button>
    </div>
    <div class="admin">
      <div style="margin-bottom:1.25rem">
        <div style="font-size:18px;font-weight:500;">${APP_NAME} — Admin</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">${profiles.length} total users</div>
      </div>
      <div class="admin-tabs">
        <div class="admin-tab${adminView==='pending'?' active':''}" onclick="setAdminView('pending')">Pending (${pending.length})</div>
        <div class="admin-tab${adminView==='approved'?' active':''}" onclick="setAdminView('approved')">Clients (${approved.length})</div>
      </div>`;

  if (!list.length) {
    html += `<div class="no-users">No ${adminView === 'pending' ? 'pending approvals' : 'clients'} yet.</div>`;
  } else if (adminView === 'pending') {
    list.forEach(p => {
      html += `<div class="user-card">
        <div class="user-top">
          <div class="user-avatar">${p.email[0].toUpperCase()}</div>
          <div style="flex:1"><div style="font-size:14px;color:var(--text)">${p.email}</div><div style="font-size:11px;color:var(--text3)">Requested ${new Date(p.created_at).toLocaleDateString()}</div></div>
        </div>
        <div class="user-actions">
          <button class="btn-sm btn-green" onclick="approveUser('${p.id}')">Approve</button>
          <button class="btn-outline-red" onclick="removeUser('${p.id}')">Remove</button>
        </div>
      </div>`;
    });
  } else {
    list.forEach(p => {
      const s = statsMap[p.id] || {};
      const lv = getLevel(s.won || 0);
      const inactive = s.daysSince !== null && s.daysSince >= 2;
      const todayColor = s.todayPct !== null ? statusColor(s.todayPct, false) : 'var(--text3)';
      html += `<div class="user-card">
        <div class="user-top">
          <div class="user-avatar">${p.email[0].toUpperCase()}</div>
          <div style="flex:1">
            <div style="font-size:14px;color:var(--text)">${p.email}</div>
            <div style="font-size:11px;display:flex;align-items:center;gap:6px;margin-top:2px;">
              <span style="color:${lv.color};font-weight:500">${lv.icon} ${lv.name}</span>
              ${inactive ? `<span class="inactive-flag">Inactive ${s.daysSince}d</span>` : ''}
            </div>
          </div>
          ${s.todayPct !== null ? `<div style="font-size:15px;font-weight:500;color:${todayColor}">${Math.round(s.todayPct * 100)}%</div>` : ''}
        </div>
        <div class="user-stats">
          <div class="user-stat"><div class="user-stat-val">${s.won || 0}</div><div class="user-stat-lbl">Days won</div></div>
          <div class="user-stat"><div class="user-stat-val" style="color:${todayColor}">${s.todayPct !== null ? Math.round(s.todayPct * 100) + '%' : '—'}</div><div class="user-stat-lbl">Today</div></div>
          <div class="user-stat"><div class="user-stat-val">${s.daysSince !== null ? s.daysSince + 'd' : '—'}</div><div class="user-stat-lbl">Last active</div></div>
        </div>
        <div class="user-actions">
          <button class="btn-sm btn-green" onclick="viewClient('${p.id}','${p.email}')">View tracker</button>
          <button class="top-bar-btn" onclick="openAssignActions('${p.id}','${p.email}')">Assign actions</button>
          <button class="btn-outline-red" onclick="removeUser('${p.id}')">Remove</button>
        </div>
      </div>`;
    });
  }

  html += `</div>`;
  document.getElementById('root').innerHTML = html;
}

async function viewClient(uid, email) {
  adminClientId = uid; adminClientEmail = email;
  await loadAll(uid);
  const tasks = isRestDay ? restTasks() : allTasks();
  const tot = isRestDay ? restTotal() : total();
  const earned = tasks.filter(t => checked[t.id]).reduce((s, t) => s + t.points, 0);
  prevWonState = earned / tot >= (isRestDay ? restSettings.win / 100 : WIN);
  renderTracker();
}

function switchToMyTracker() {
  adminClientId = null; adminClientEmail = '';
  loadAll().then(() => { render(); });
}

function openAssignActions(uid, email) {
  showOv(`<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal">

      <button class="btn-cancel" onclick="closeOv()">Cancel</button>
    </div>
  </div></div>`);
}

async function doAssignActions(uid) {
  const text = document.getElementById('assign-inp').value.trim();
  const items = text.split('\n').map(s => s.trim()).filter(Boolean).map(s => ({ text: s, done: false }));
  await storage.set('wtd-actions', JSON.stringify(items), uid);
  closeOv(); alert('Action items saved!');
}

// ── ROOT ROUTER ──────────────────────────────────────────────────────────────
async function renderRoot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { renderAuth(); return; }
  currentUser = session.user;
  currentProfile = await loadProfile(currentUser.id);
  if (!currentProfile) {
    const isAdmin = currentUser.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    await sb.from('wtd_profiles').upsert({ id: currentUser.id, email: currentUser.email, approved: isAdmin, is_admin: isAdmin }, { onConflict: 'id' });
    currentProfile = await loadProfile(currentUser.id);
  }
  if (!currentProfile.approved) { renderPending(); return; }
  await loadAll();
  const tasks = isRestDay ? restTasks() : allTasks();
  const tot = isRestDay ? restTotal() : total();
  const earned = tasks.filter(t => checked[t.id]).reduce((s, t) => s + t.points, 0);
  prevWonState = earned / tot >= (isRestDay ? restSettings.win / 100 : WIN);
  renderTracker();
}

      <h1>${APP_NAME}</h1>

      <a class="lnk" onclick="toggleAuthView()">
        ${isLogin ? "Don't have an account? Sign up" : 'Already have an account? Sign in'}

    </div>`;
  setTimeout(() => document.getElementById('a-email')?.focus(), 50);
}

function renderPending() {
  document.getElementById('root').innerHTML = `
    <div class="screen" style="text-align:center;margin-top:120px;">
      <div style="font-size:48px;margin-bottom:1rem">⏳</div>
      <h1 style="margin-bottom:10px;">You're on the list</h1>

      <button class="btn-ghost" onclick="signOut()" style="margin-top:1rem">Sign out</button>

function renderTracker() {
  const isAdmin = currentProfile && currentProfile.is_admin;
  const isViewingClient = !!adminClientId;
  const topBar = `<div class="top-bar">
    <span class="top-bar-email">${isViewingClient ? `Viewing: ${adminClientEmail}` : (currentUser?.email || '')}</span>
    ${isViewingClient ? `<button class="top-bar-btn" onclick="renderAdmin()">← Admin</button>` : ''}
    ${isAdmin && !isViewingClient ? `<button class="top-bar-btn" onclick="openAdmin()">Admin</button>` : ''}
    <button class="top-bar-btn" onclick="signOut()">Sign out</button>
  </div>`;
  const tabs = `<div class="tabs">
    <div class="tab${activeTab === 'today' ? ' active' : ''}" onclick="setTab('today')">Today</div>
    <div class="tab${activeTab === 'week' ? ' active' : ''}" onclick="setTab('week')">Week</div>
    <div class="tab${activeTab === 'month' ? ' active' : ''}" onclick="setTab('month')">Month</div>
  </div>`;
  let content = activeTab === 'today' ? renderToday(isViewingClient) : activeTab === 'week' ? renderWeek() : renderMonth();
  document.getElementById('root').innerHTML = topBar + `<div class="tracker" id="app">${tabs}${content}</div>`;
  document.getElementById('ov').style.display = 'none';
  document.getElementById('ov').innerHTML = '';
}

function render() { renderTracker(); }
function openAdmin() { renderAdmin(); }

// ── APP STATE ────────────────────────────────────────────────────────────────
const DEFAULT_TIMED = [
  {id:1,block:"Morning",name:"Wake up at scheduled time",points:8,tier:"A"},
  {id:2,block:"Morning",name:"Morning walk",points:7,tier:"A"},
  {id:3,block:"Morning",name:"Stretch + breathwork",points:8,tier:"A"},
  {id:4,block:"Morning",name:"FSN + gratitude + why statement + habit doc",sub:"Read your why. Let it land.",points:8,tier:"A"},
  {id:5,block:"Deep Work",name:"Work block 1 — deep focus",points:17,tier:"S"},
  {id:6,block:"Midday",name:"Walk",points:5,tier:"B"},
  {id:7,block:"Midday",name:"10-min meditation",points:7,tier:"A"},
  {id:8,block:"Deep Work",name:"Work block 2",points:15,tier:"S"},
  {id:9,block:"Reset",name:"Ground + stretch",points:4,tier:"B"},
  {id:10,block:"Deep Work",name:"Work block 3",points:13,tier:"S"},
  {id:11,block:"Body",name:"Gym or movement",points:13,tier:"S"},
  {id:12,block:"Body",name:"Yoga",points:6,tier:"B"},
  {id:13,block:"Body",name:"Sauna",points:5,tier:"B"},
  {id:14,block:"Evening",name:"To-dos + admin",points:4,tier:"B"},
  {id:15,block:"Wind Down",name:"Book, audible, or learning",points:7,tier:"A"},
  {id:16,block:"Wind Down",name:"10-min meditation",points:8,tier:"A"},
  {id:17,block:"Wind Down",name:"Write tomorrow's schedule by hand",points:15,tier:"S"},
  {id:18,block:"Wind Down",name:"FSN",points:10,tier:"A"},
  {id:19,block:"Wind Down",name:"Sleep by 9pm",points:10,tier:"A"},
];
const DEFAULT_ESSENTIAL = [
  {id:101,name:"Identity work protocol",points:11,tier:"S"},
  {id:102,name:"Track calories",points:11,tier:"S"},
];
const DEFAULT_REST = {win:50,crush:75,taskIds:[4,7,12,15,16,17,18,19,101,102]};
const BLOCKS = ["Morning","Deep Work","Midday","Reset","Body","Evening","Wind Down"];
const WIN = 0.72, CRUSH = 0.88;
const TIER = {S:{color:"#C8891A",label:"Critical"},A:{color:"#3A7EC4",label:"High impact"},B:{color:"#888",label:"Supporting"}};
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let timedTasks, essentialTasks, restSettings, checked, activeTab, weekOffset, monthOffset;
let allHistory, whyStatement, identityStatement, editingStatements;
let mood, winOfDay, actionItems;
let showEditor, showImport, showRestEditor, importError;
let isRestDay, autoSaveTimer, autoSaveStatus, nextId, prevWonState, showCelebration, celebrationTimeout;

function resetAppState() {
  timedTasks = DEFAULT_TIMED.map(t => ({...t}));
  essentialTasks = DEFAULT_ESSENTIAL.map(t => ({...t}));
  restSettings = {...DEFAULT_REST};
  checked = {}; activeTab = 'today'; weekOffset = 0; monthOffset = 0;
  allHistory = {}; whyStatement = ''; identityStatement = ''; editingStatements = false;
  mood = 0; winOfDay = ''; actionItems = [];
  showEditor = false; showImport = false; showRestEditor = false; importError = '';
  isRestDay = false; autoSaveTimer = null; autoSaveStatus = ''; nextId = 200;
  prevWonState = null; showCelebration = false; celebrationTimeout = null;
}
resetAppState();

function allTasks() { return [...timedTasks, ...essentialTasks]; }
function total() { return allTasks().reduce((s, t) => s + t.points, 0); }
function restTasks() { return allTasks().filter(t => restSettings.taskIds.includes(t.id)); }
function restTotal() { return restTasks().reduce((s, t) => s + t.points, 0); }
function todayKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function yesterday() { const d = new Date(); d.setDate(d.getDate()-1); return dateKey(d); }

function statusColor(pct, rest) {
  const w = rest ? restSettings.win/100 : WIN, c = rest ? restSettings.crush/100 : CRUSH;
  if (pct >= c) return '#2E9E5B'; if (pct >= w) return '#3A7EC4';
  if (pct >= 0.4) return '#C8891A'; if (pct > 0) return '#aaa';
  return 'var(--border)';
}
function statusText(pct, rest) {
  const w = rest ? restSettings.win/100 : WIN, c = rest ? restSettings.crush/100 : CRUSH;
  if (pct >= c) return 'Crushing it'; if (pct >= w) return 'Day won';
  if (pct >= 0.4) return 'Building'; if (pct > 0) return 'Started'; return 'Not started';
}
function getInsight(pct, earned, rest) {
  const tot = rest ? restTotal() : total();
  const w = rest ? restSettings.win/100 : WIN, c = rest ? restSettings.crush/100 : CRUSH;
  const toWin = Math.ceil(w * tot - earned), toCrush = Math.ceil(c * tot - earned);
  if (pct >= c) return `${rest ? 'Rest day — ' : ''}Crushing it. <strong>${Math.round(pct*100)}%</strong> — exceptional.`;
  if (pct >= w) return `${rest ? 'Rest day — ' : ''}Day won. <strong>${toCrush} more pts</strong> to crush it.`;
  if (toWin > 0 && toWin <= 20) return `<strong>${toWin} points</strong> away from winning the day.`;
  if (pct >= 0.4) return `Building. <strong>${toWin} points</strong> to win the day.`;
  if (pct > 0) return `Started. <strong>${toWin} points</strong> needed to win.`;
  return 'Check off your first task to get started.';
}

async function loadAll(uid) {
  resetAppState();
  try { const r = await storage.get('wtd-history', uid); if (r) allHistory = JSON.parse(r.value); } catch(e) {}
  try { const r = await storage.get('wtd-why', uid); if (r) whyStatement = r.value; } catch(e) {}
  try { const r = await storage.get('wtd-identity', uid); if (r) identityStatement = r.value; } catch(e) {}
  try { const r = await storage.get('wtd-tasks', uid); if (r) { const s = JSON.parse(r.value); timedTasks = s.timed; essentialTasks = s.essential; } } catch(e) {}
  try { const r = await storage.get('wtd-rest', uid); if (r) restSettings = JSON.parse(r.value); } catch(e) {}
  try { const r = await storage.get('wtd-actions', uid); if (r) actionItems = JSON.parse(r.value); } catch(e) {}
  const rec = allHistory[todayKey()];
  if (rec) { checked = rec.checked || {}; isRestDay = rec.restDay || false; mood = rec.mood || 0; winOfDay = rec.winOfDay || ''; }
}

async function saveDay() {
  const uid = adminClientId || undefined;
  const tasks = isRestDay ? restTasks() : allTasks();
  const tot = isRestDay ? restTotal() : total();
  const earned = tasks.filter(t => checked[t.id]).reduce((s, t) => s + t.points, 0);
  const pct = tot > 0 ? earned / tot : 0;
  const key = todayKey();
  if (!allHistory[key]) allHistory[key] = {};
  const w = isRestDay ? restSettings.win/100 : WIN;
  const isNowWon = pct >= w, isNowCrush = pct >= (isRestDay ? restSettings.crush/100 : CRUSH);
  if (!prevWonState && isNowWon && !adminClientId) {
    showCelebration = isNowCrush ? 'crush' : 'won';
    clearTimeout(celebrationTimeout);
    celebrationTimeout = setTimeout(() => { showCelebration = false; render(); }, 4000);
  }
  prevWonState = isNowWon;
  allHistory[key] = { ...allHistory[key], checked: {...checked}, earned, total: tot, pct, restDay: isRestDay, mood, winOfDay };
  await storage.set('wtd-history', JSON.stringify(allHistory), uid);
}

async function saveTasks() { await storage.set('wtd-tasks', JSON.stringify({timed:timedTasks,essential:essentialTasks}), adminClientId||undefined); }

function calcStreak() {
  let streak = 0; const d = new Date();
  while (true) {
    const key = dateKey(d), rec = allHistory[key], w = rec && rec.restDay ? restSettings.win/100 : WIN;
    if (rec && rec.pct >= w) streak++;
    else if (key === todayKey() && (!rec || rec.pct < w)) { d.setDate(d.getDate()-1); continue; }
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function calcDaysWon() { return Object.values(allHistory).filter(r => r.pct >= (r.restDay ? restSettings.win/100 : WIN)).length; }
function calcBestStreak() {
  let best = 0, cur = 0;
  Object.keys(allHistory).sort().forEach(k => {
    const r = allHistory[k], w = r.restDay ? restSettings.win/100 : WIN;
    if (r.pct >= w) { cur++; best = Math.max(best, cur); } else cur = 0;
  });
  return best;
}
function calcBestWeek() {
  const keys = Object.keys(allHistory).sort(); let best = 0;
  for (let i = 0; i < keys.length; i++) {
    const week = keys.slice(i, i+7).filter(k => !allHistory[k].restDay);
    if (!week.length) continue;
    const avg = week.reduce((s,k) => s + allHistory[k].pct, 0) / week.length;
    best = Math.max(best, avg);
  }
  return best;
}

function exportData() {

  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

async function doImport() {

    if (data.tasks?.essential) essentialTasks = data.tasks.essential;
    if (data.why) whyStatement = data.why;
    if (data.identity) identityStatement = data.identity;

// ── WEEK / MONTH ─────────────────────────────────────────────────────────────
function getWeekDates(offset) {
  const now = new Date(), day = now.getDay(), mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + (offset * 7));
  return Array.from({length:7}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

  const dates = getWeekDates(weekOffset), tk = todayKey();

  const hasData = dates.some(d => allHistory[dateKey(d)]);
  const streak = calcStreak();
  const activeDays = dates.filter(d => { const r = allHistory[dateKey(d)]; return r && !r.restDay; });
  const won = dates.filter(d => { const r = allHistory[dateKey(d)]; if (!r) return false; return r.pct >= (r.restDay?restSettings.win/100:WIN); }).length;
  const avg = activeDays.length ? activeDays.reduce((s,d) => s+(allHistory[dateKey(d)]?.pct||0), 0)/activeDays.length : 0;

  let h = `<div class="history-nav"><button class="nav-btn" onclick="shiftWeek(-1)">←</button><span class="nav-title">${label}</span><button class="nav-btn" onclick="shiftWeek(1)">→</button></div>`;

  h += `<div class="summary-row">
    <div class="summary-card"><div class="summary-val">${won}/7</div><div class="summary-lbl">Days won</div></div>

  </div><div class="day-grid">`;

  dates.forEach(d => {
    const key = dateKey(d), rec = allHistory[key], isToday = key===tk, isFuture = d>new Date()&&!isToday;
    const pct = rec?rec.pct:null, rest = rec&&rec.restDay;
    const col = pct!==null ? statusColor(pct,rest) : 'var(--border)';
    h += `<div class="day-cell${isToday?' today':''}${isFuture?' future':''}">
      <div class="day-label">${DAYS[d.getDay()]}</div>
      <div class="day-pct" style="color:${pct!==null?col:'var(--text3)'}">${rest?'R':pct!==null?Math.round(pct*100)+'%':'—'}</div>
      <div class="day-dot" style="background:${col}"></div>
      ${rec&&rec.reflection?`<div style="font-size:9px;color:var(--text3);margin-top:2px">note</div>`:''}
    </div>`;
  });

  h += `</div><div style="margin-bottom:1.25rem">`;
  dates.map(d=>({d,rec:allHistory[dateKey(d)]})).filter(e=>e.rec).forEach(({d,rec}) => {
    const pct = rec.pct||0, col = statusColor(pct,rec.restDay);
    h += `<div class="week-row">
      <span style="font-size:13px;color:var(--text2)">${d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}${rec.restDay?' <span style="font-size:10px;color:var(--blue)">R</span>':''}</span>
      <div class="week-bar-track"><div class="week-bar-fill" style="width:${Math.round(pct*100)}%;background:${col}"></div></div>
      <span style="font-size:13px;font-weight:500;color:${col};text-align:right">${Math.round(pct*100)}%</span>
    </div>`;
  });
  h += `</div><div style="border-top:.5px solid var(--border);padding-top:1.25rem">
    <div class="reflect-label" style="margin-bottom:1rem">Reflections this week</div>
    ${reflectionCards(dates.map(d=>({d,rec:allHistory[dateKey(d)]})))}
  </div>`;
  return h;
}

function getMonthDates(offset) {
  const now = new Date(), y = now.getFullYear(), m = now.getMonth()+offset;
  const first = new Date(y,m,1), last = new Date(y,m+1,0);
  return {first,last,year:first.getFullYear(),month:first.getMonth()};
}

function getStreakRanges() {
  const ranges = []; let start = null;
  const sorted = Object.keys(allHistory).sort();
  sorted.forEach((key,i) => {
    const rec = allHistory[key], w = rec&&rec.restDay?restSettings.win/100:WIN, counts = rec&&rec.pct>=w;
    if (counts&&!start) start=key;
    else if (!counts&&start) { ranges.push({start,end:sorted[i-1]}); start=null; }
  });
  if (start) ranges.push({start,end:sorted[sorted.length-1]});
  return ranges;
}

function renderMonth() {
  const {first,last,year,month} = getMonthDates(monthOffset);
  const tk = todayKey(), daysInMonth = last.getDate(), startDay = first.getDay();
  const daysData = Array.from({length:daysInMonth}, (_,i) => { const d=new Date(year,month,i+1); return {day:i+1,key:dateKey(d),rec:allHistory[dateKey(d)],d}; });
  const hasData = daysData.some(({rec})=>rec);
  const streak = calcStreak();
  const activeDays = daysData.filter(({rec})=>rec&&!rec.restDay);
  const won = daysData.filter(({rec})=>{if(!rec)return false;return rec.pct>=(rec.restDay?restSettings.win/100:WIN);}).length;
  const avg = activeDays.length ? activeDays.reduce((s,{rec})=>s+(rec?.pct||0),0)/activeDays.length : 0;
  const streakRanges = getStreakRanges();
  const isInStreak = key => streakRanges.some(r=>key>=r.start&&key<=r.end);

  let h = `<div class="history-nav"><button class="nav-btn" onclick="shiftMonth(-1)">←</button><span class="nav-title">${MONTHS[month]} ${year}</span><button class="nav-btn" onclick="shiftMonth(1)">→</button></div>`;
  if (!hasData) return h + `<div class="no-data"><p>No data for ${MONTHS[month]} yet.</p><button class="btn-ghost" onclick="setTab('today')">Go to Today</button></div>`;

  h += `<div class="summary-row">
    <div class="summary-card"><div class="summary-val">${won}</div><div class="summary-lbl">Days won</div></div>
    <div class="summary-card"><div class="summary-val">${activeDays.length?Math.round(avg*100)+'%':'—'}</div><div class="summary-lbl">Avg (${activeDays.length} active)</div></div>
    <div class="summary-card"><div class="summary-val">${streak} 🔥</div><div class="summary-lbl">Streak</div></div>
  </div><div class="month-grid">`;

  DAYS.forEach(d=>{h+=`<div class="month-hdr">${d[0]}</div>`;});
  for (let i=0;i<startDay;i++) h+=`<div class="month-cell empty"></div>`;

  daysData.forEach(({day,key,rec,d}) => {
    const isToday=key===tk, isFuture=d>new Date()&&!isToday;
    const pct=rec?rec.pct:null, rest=rec&&rec.restDay, inStreak=isInStreak(key);
    let bg='var(--bg2)', color='var(--text3)';
    if (pct!==null&&!isFuture) { const sc=statusColor(pct,rest); bg=sc+'22'; color=sc; }
    h += `<div class="month-cell${rec?' has-data':''}${isToday?' today-cell':''}" style="background:${bg};opacity:${isFuture?0.3:1}">
      <span style="color:${color}">${rest?'R':day}</span>
      ${inStreak&&!isFuture?`<div class="streak-dot"></div>`:''}
    </div>`;
  });

  h += `</div>
  <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem;row-gap:5px">
    <div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#2E9E5B22;border:.5px solid #2E9E5B"></div><span style="font-size:11px;color:var(--text3)">Crushing it</span></div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#3A7EC422;border:.5px solid #3A7EC4"></div><span style="font-size:11px;color:var(--text3)">Day won</span></div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:2px;background:#C8891A22;border:.5px solid #C8891A"></div><span style="font-size:11px;color:var(--text3)">Building</span></div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:4px;height:4px;border-radius:50%;background:#E8A020"></div><span style="font-size:11px;color:var(--text3)">Streak</span></div>
  </div>
  <div style="border-top:.5px solid var(--border);padding-top:1.25rem">
    <div class="reflect-label" style="margin-bottom:1rem">Reflections this month</div>
    ${reflectionCards(daysData.map(({d,rec})=>({d,rec})))}
  </div>`;
  return h;
}

function reflectionCards(entries) {
  const withR = entries.filter(({rec})=>rec&&(rec.reflection||rec.winOfDay));
  if (!withR.length) return `<p style="font-size:13px;color:var(--text3);padding:1rem 0">No reflections written yet.</p>`;
  return withR.map(({d,rec}) => {
    const timeStr = rec.reflectionTime ? new Date(rec.reflectionTime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) : '';
    return `<div class="reflect-card">
      <div class="reflect-card-date">
        <span>${d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}${timeStr?` · ${timeStr}`:''}${rec.restDay?' · Rest day':''}${rec.mood?` · Mood ${rec.mood}/5`:''}</span>
        <span style="font-weight:500;color:${statusColor(rec.pct||0,rec.restDay)}">${Math.round((rec.pct||0)*100)}%</span>
      </div>
      ${rec.winOfDay?`<div style="font-size:12px;color:var(--orange);font-weight:500;margin-bottom:4px">🏆 ${rec.winOfDay}</div>`:''}
      ${rec.reflection?`<div class="reflect-card-text">${rec.reflection}</div>`:''}
    </div>`;
  }).join('');
}

// ── OVERLAYS ─────────────────────────────────────────────────────────────────
function showOv(html) { const ov=document.getElementById('ov'); ov.style.display='block'; ov.innerHTML=html; }
function closeOv() { const ov=document.getElementById('ov'); ov.style.display='none'; ov.innerHTML=''; showEditor=false;showImport=false;showRestEditor=false; }
function renderOvContent() {
  if (showEditor) showOv(renderEditorModal());
  else if (showImport) showOv(renderImportModal());
  else if (showRestEditor) showOv(renderRestEditorModal());
}

function renderEditorModal() {
  const blocks = [...BLOCKS.map(b=>({label:b,tasks:timedTasks.filter(t=>t.block===b),type:'timed'})),{label:"Daily Essentials",tasks:essentialTasks,type:'essential'}];
  let h = `<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal">
    <div class="modal-title">Edit habits</div>
    <div style="margin-bottom:1rem">
      <div class="esec-label" style="margin-bottom:7px">Add task to block</div>
      <select class="block-sel" id="new-task-block">${BLOCKS.map(b=>`<option value="timed:${b}">${b}</option>`).join('')}<option value="essential:Daily Essentials">Daily Essentials</option></select>
      <button class="btn-ghost" style="width:auto" onclick="addTaskFromSelect()">+ Add task</button>
    </div>`;
  blocks.forEach(({label,tasks,type}) => {
    if (!tasks.length) return;
    h += `<div class="esec"><div class="esec-label">${label}</div>`;
    tasks.forEach(task => {
      h += `<div class="editor-row">
        <input class="e-inp" value="${task.name.replace(/"/g,'&quot;').replace(/'/g,"&#39;")}" onchange="updateTask(${task.id},'name',this.value,'${type}')">
        <input class="e-pts" type="number" value="${task.points}" min="1" max="30" onchange="updateTask(${task.id},'points',parseInt(this.value)||1,'${type}')">
        <select class="e-tier" onchange="updateTask(${task.id},'tier',this.value,'${type}')">
          <option${task.tier==='S'?' selected':''}>S</option>
          <option${task.tier==='A'?' selected':''}>A</option>
          <option${task.tier==='B'?' selected':''}>B</option>
        </select>
        <button class="del-btn" onclick="deleteTask(${task.id},'${type}')">×</button>
      </div>`;
    });
    h += `</div>`;
  });
  h += `<div class="modal-actions"><button class="btn-save" onclick="saveEdits()">Save changes</button><button class="btn-cancel" onclick="closeOv()">Cancel</button></div></div></div>`;
  return h;
}

function renderImportModal() {
  return `<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal">
    <div class="modal-title">Import data</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">Paste your previously exported JSON.</p>
    <textarea class="import-area" id="import-textarea" placeholder="Paste exported JSON here..."></textarea>
    ${importError?`<p style="font-size:12px;color:var(--red);margin-top:5px">${importError}</p>`:''}
    <div class="modal-actions"><button class="btn-save" onclick="doImport()">Import</button><button class="btn-cancel" onclick="closeOv()">Cancel</button></div>
  </div></div>`;
}

function renderRestEditorModal() {
  const grouped = [{label:"Daily Essentials",tasks:essentialTasks},...BLOCKS.map(b=>({label:b,tasks:timedTasks.filter(t=>t.block===b)})).filter(({tasks})=>tasks.length)];
  const rt = restSettings.taskIds.reduce((s,id)=>{const t=allTasks().find(t=>t.id===id);return s+(t?t.points:0);},0);
  return `<div class="overlay-bg" onclick="if(event.target===this)closeOv()"><div class="modal">
    <div class="modal-title">Customize rest day</div>
    <div class="modal-sub">Tasks and thresholds for lighter days.</div>
    <div class="esec">
      <div class="thresh-row"><label>Win at</label><input type="range" min="20" max="80" step="5" value="${restSettings.win}" oninput="restSettings.win=parseInt(this.value);document.getElementById('rv-win').textContent=this.value+'%';updateRestPreview()"><span class="thresh-val" id="rv-win">${restSettings.win}%</span></div>
      <div class="thresh-row"><label>Crush at</label><input type="range" min="40" max="95" step="5" value="${restSettings.crush}" oninput="restSettings.crush=parseInt(this.value);document.getElementById('rv-crush').textContent=this.value+'%';updateRestPreview()"><span class="thresh-val" id="rv-crush">${restSettings.crush}%</span></div>
      <div class="rest-preview-txt" id="rest-preview-txt"><strong>${restSettings.taskIds.length} tasks</strong> · <strong>${rt} pts total</strong> · Win at <strong>${Math.ceil(restSettings.win/100*rt)} pts</strong> · Crush at <strong>${Math.ceil(restSettings.crush/100*rt)} pts</strong></div>
    </div>
    <div class="esec">
      <div class="esec-label"><span>Active tasks on rest day</span><span>${restSettings.taskIds.length} selected</span></div>
      <div class="rest-task-list">${grouped.map(({label,tasks})=>`<div><div class="rtg-label">${label}</div>${tasks.map(t=>{const on=restSettings.taskIds.includes(t.id);return`<div class="rest-task-row" onclick="toggleRestTask(${t.id})"><div class="rest-cb${on?' on':''}">${on?'<svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5.5L7 1" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>':''}</div><span style="flex:1;font-size:13px">${t.name}</span><span style="font-size:11px;color:var(--text3)">+${t.points}</span></div>`;}).join('')}</div>`).join('')}</div>
    </div>
    <div class="modal-actions"><button class="btn-save" onclick="saveRestEditor()">Save</button><button class="btn-cancel" onclick="closeOv()">Cancel</button></div>
  </div></div>`;
}

function updateRestPreview() {
  const rt = restSettings.taskIds.reduce((s,id)=>{const t=allTasks().find(t=>t.id===id);return s+(t?t.points:0);},0);
  const el = document.getElementById('rest-preview-txt');
  if (el) el.innerHTML = `<strong>${restSettings.taskIds.length} tasks</strong> · <strong>${rt} pts total</strong> · Win at <strong>${Math.ceil(restSettings.win/100*rt)} pts</strong> · Crush at <strong>${Math.ceil(restSettings.crush/100*rt)} pts</strong>`;
}

function toggleRestTask(id) {
  if (restSettings.taskIds.includes(id)) restSettings.taskIds = restSettings.taskIds.filter(x=>x!==id);
  else restSettings.taskIds = [...restSettings.taskIds, id];
  renderOvContent();
}

function addTaskFromSelect() {
  const val = document.getElementById('new-task-block')?.value || 'timed:Morning';
  const [type,block] = val.split(':');
  const newTask = {id:nextId++,name:"New task",points:5,tier:"B"};
  if (type === 'essential') essentialTasks.push(newTask);
  else { newTask.block = block; timedTasks.push(newTask); }
  renderOvContent();
}

function deleteTask(id, type) {
  if (type === 'essential') essentialTasks = essentialTasks.filter(t=>t.id!==id);
  else timedTasks = timedTasks.filter(t=>t.id!==id);
  renderOvContent();
}

function updateTask(id, field, value, type) {
  const arr = type === 'essential' ? essentialTasks : timedTasks;
  const task = arr.find(t=>t.id===id); if (task) task[field] = value;
}

async function saveEdits() { await saveTasks(); closeOv(); render(); }
async function saveRestEditor() { await saveRest(); closeOv(); render(); }

function openEditor() { showEditor=true; showImport=false; showRestEditor=false; showOv(renderEditorModal()); }
function openImport() { showImport=true; showEditor=false; showRestEditor=false; showOv(renderImportModal()); }
function openRestEditor() { showRestEditor=true; showEditor=false; showImport=false; showOv(renderRestEditorModal()); }

async function toggle(id) {
  if (adminClientId) return;
  const tasks = isRestDay?restTasks():allTasks(), tot = isRestDay?restTotal():total();
  const earned = tasks.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  prevWonState = earned/tot >= (isRestDay?restSettings.win/100:WIN);
  checked[id] = !checked[id]; await saveDay(); render();
}

async function confirmReset() { if (confirm('Reset today?')) { checked={}; mood=0; winOfDay=''; await saveDay(); render(); } }
function setTab(t) { activeTab=t; render(); }
function shiftWeek(d) { weekOffset+=d; render(); }
function shiftMonth(d) { monthOffset+=d; render(); }

// ── BOOT ─────────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) { currentUser = session.user; await renderRoot(); }
  else { currentUser=null; currentProfile=null; resetAppState(); renderAuth(); }
});
</script>
